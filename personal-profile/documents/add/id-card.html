<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Добавить ID-карту — СФСРЮ</title>
  <!-- favicons -->
  <link rel="apple-touch-icon-precomposed" sizes="57x57" href="../../images/favicons/apple-touch-icon-57x57.png" />
  <!-- ... -->
  <link rel="stylesheet" href="../../css/style.css" />
  <style>
    /* те же стили формы, что и в модалке */
    .profile-main { padding: 2rem 0; background: white; min-height: 100vh; }
    .profile-container { max-width: 600px; margin: 0 auto; padding: 0 1.5rem; }
    .page-header { text-align: center; margin-bottom: 2rem; }
    .page-header h2 { font-size: 1.8rem; color: #7b091a; }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; margin-bottom: 0.4rem; font-weight: 500; }
    .form-input, .form-textarea { width: 100%; padding: 0.6rem 1rem; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
    .form-textarea { resize: vertical; min-height: 60px; }
    .btn { padding: 0.6rem 1.2rem; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
    .btn-primary { background: linear-gradient(135deg, #7b091a, #a83232); color: white; }
    .btn-secondary { background: #6c757d; color: white; }
    .actions { display: flex; justify-content: space-between; margin-top: 2rem; }
  </style>
</head>
<body>
  <header class="header">...</header>
  <main class="main-content profile-main">
    <div class="profile-container">
      <div class="page-header">
        <h2>Добавление ID-карты</h2>
        <p>Заполните все данные</p>
      </div>
      <form id="addForm">
        <!-- поля такие же, как в модалке -->
        <div class="form-group"><label>Фамилия</label><input type="text" id="surname" class="form-input"></div>
        <div class="form-group"><label>Имя</label><input type="text" id="name" class="form-input"></div>
        <div class="form-group"><label>Отчество</label><input type="text" id="patronymic" class="form-input"></div>
        <div class="form-group"><label>Дата рождения</label><input type="date" id="birth_date" class="form-input"></div>
        <div class="form-group"><label>Место рождения</label><input type="text" id="birth_place" class="form-input"></div>
        <div class="form-group"><label>Пол</label>
          <select id="gender" class="form-input">
            <option value="Мужской">Мужской</option>
            <option value="Женский">Женский</option>
          </select>
        </div>
        <div class="form-group"><label>Дата выдачи</label><input type="date" id="issue_date" class="form-input"></div>
        <div class="form-group"><label>Срок действия</label><input type="date" id="expiry_date" class="form-input"></div>
        <div class="form-group"><label>Номер карты</label><input type="text" id="card_number" class="form-input"></div>
        <div class="form-group"><label>Кем выдан</label><input type="text" id="issued_by" class="form-input"></div>
        <div class="form-group"><label>Код подразделения</label><input type="text" id="department_code" class="form-input"></div>
        <div class="form-group"><label>Личный код</label><input type="text" id="personal_code_ref" class="form-input" readonly></div>
        <div class="form-group"><label>Номер полиса ОМС</label><input type="text" id="oms_policy_number" class="form-input"></div>
        <div class="form-group"><label>Группа крови</label><input type="text" id="blood_group" class="form-input"></div>
        <div class="form-group"><label>Резус-фактор</label><input type="text" id="rh_factor" class="form-input"></div>
        <div class="form-group"><label>ИНН</label><input type="text" id="inn_number" class="form-input"></div>
        <div class="form-group"><label>Номер НСС</label><input type="text" id="nss_number" class="form-input"></div>
        <div class="form-group"><label>Адрес регистрации</label><textarea id="registration_address" class="form-textarea" rows="2"></textarea></div>
        <div class="actions">
          <button type="button" class="btn btn-secondary" onclick="history.back()">Отмена</button>
          <button type="submit" class="btn btn-primary">Сохранить</button>
        </div>
      </form>
    </div>
  </main>
  <footer class="footer">...</footer>

  <script type="importmap">
    { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
  </script>
  <script type="module" src="../../js/supabase-config.js"></script>
  <script src="../../js/mob-menu.js"></script>
  <script type="module">
    import { supabase } from '../../js/supabase-config.js'

    let userPersonalCode = null

    async function loadUserProfile() {
      const { data: { session } } = await supabase.auth.getSession()
      if (!session) { window.location.href = '../../login.html'; return }
      const { data, error } = await supabase.from('users').select('personal_code').eq('id', session.user.id).single()
      if (error) { console.error(error); return }
      userPersonalCode = data.personal_code
      document.getElementById('personal_code_ref').value = userPersonalCode || ''
    }

    document.getElementById('addForm').addEventListener('submit', async (e) => {
      e.preventDefault()
      const formData = {
        surname: document.getElementById('surname').value.trim(),
        name: document.getElementById('name').value.trim(),
        patronymic: document.getElementById('patronymic').value.trim(),
        birth_date: document.getElementById('birth_date').value,
        birth_place: document.getElementById('birth_place').value.trim(),
        gender: document.getElementById('gender').value,
        issue_date: document.getElementById('issue_date').value,
        expiry_date: document.getElementById('expiry_date').value,
        card_number: document.getElementById('card_number').value.trim(),
        issued_by: document.getElementById('issued_by').value.trim(),
        department_code: document.getElementById('department_code').value.trim(),
        personal_code_ref: document.getElementById('personal_code_ref').value.trim(),
        oms_policy_number: document.getElementById('oms_policy_number').value.trim(),
        blood_group: document.getElementById('blood_group').value.trim(),
        rh_factor: document.getElementById('rh_factor').value.trim(),
        inn_number: document.getElementById('inn_number').value.trim(),
        nss_number: document.getElementById('nss_number').value.trim(),
        registration_address: document.getElementById('registration_address').value.trim(),
        personal_code: userPersonalCode,
        status: 'oncheck',
        created_at: new Date().toISOString(),
        updated_at: new Date().toISOString()
      }
      if (!formData.card_number) { alert('Номер карты обязателен'); return }
      const { data, error } = await supabase.from('documents_id_card').insert([formData]).select()
      if (error) { alert('Ошибка: ' + error.message); return }
      window.location.href = `../documents/id-card.html?id=${data[0].id}`
    })

    loadUserProfile()
  </script>
</body>
</html>
