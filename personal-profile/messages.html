    <script type="module">
	import { supabase } from '../js/supabase-config.js';

let currentUserId = null;

async function loadUser() {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
        window.location.href = '../login.html';
        return false;
    }
    currentUserId = session.user.id;
    return true;
}

async function loadMessages() {
    const loading = document.getElementById('loading');
    const list = document.getElementById('messagesList');
    const noMessages = document.getElementById('noMessages');

    loading.style.display = 'block';
    list.innerHTML = '';

    const { data, error } = await supabase
        .schema('messages')
        .from('user_messages')
        .select('*')
        .eq('user_id', currentUserId)
        .order('created_at', { ascending: false });

    if (error) {
        console.error('Ошибка загрузки сообщений:', error);
        loading.style.display = 'none';
        list.innerHTML = '<p class="error">Ошибка загрузки</p>';
        return;
    }

    loading.style.display = 'none';

    if (!data || data.length === 0) {
        noMessages.style.display = 'block';
        return;
    }

    noMessages.style.display = 'none';

    list.innerHTML = data.map(msg => `
        <div class="message-item ${msg.is_read ? '' : 'unread'}" data-id="${msg.id}">
            <div class="message-header">
                <span class="message-title">${escapeHTML(msg.title)}</span>
                <span class="message-date">${new Date(msg.created_at).toLocaleString()}</span>
            </div>
            <div class="message-content">${escapeHTML(msg.content)}</div>
            <div class="message-footer">
                ${msg.comment ? `<p><strong>Комментарий:</strong> ${escapeHTML(msg.comment)}</p>` : ''}
                ${!msg.is_read ? '<button class="btn-mark-read" data-id="'+msg.id+'">Отметить прочитанным</button>' : ''}
            </div>
        </div>
    `).join('');

    // Обработчики для кнопок "Отметить прочитанным"
    document.querySelectorAll('.btn-mark-read').forEach(btn => {
        btn.addEventListener('click', async (e) => {
            const id = e.target.dataset.id;
            const { error } = await supabase
                .schema('messages')
                .from('user_messages')
                .update({ is_read: true })
                .eq('id', id)
                .eq('user_id', currentUserId); // дополнительная проверка

            if (error) {
                alert('Ошибка: ' + error.message);
            } else {
                // обновить вид сообщения
                const msgDiv = document.querySelector(`.message-item[data-id="${id}"]`);
                if (msgDiv) {
                    msgDiv.classList.remove('unread');
                    e.target.remove();
                }
            }
        });
    });
}

function escapeHTML(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
}

document.addEventListener('DOMContentLoaded', async () => {
    if (!await loadUser()) return;
    await loadMessages();
});
	</script>
