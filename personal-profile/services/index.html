    <script type="module">
import { supabase } from '../../js/supabase-config.js';

let currentUserId = null;

// Маппинг статусов для отображения
const statusMap = {
    'submitted': 'Отправлено в ведомство',
    'processing': 'В работе',
    'interim': 'Промежуточные результаты',
    'positive': 'Принято положительное решение',
    'completed': 'Результат выдан',
    'rejected': 'Отказано',
    'cancelled': 'Отменено'
};

// Загрузка профиля для получения user_id
async function loadUserProfile() {
    const { data: { session }, error: sessionError } = await supabase.auth.getSession();
    if (sessionError || !session) {
        window.location.href = '../login.html';
        return false;
    }

    const { data, error } = await supabase
        .from('users')
        .select('email')
        .eq('id', session.user.id)
        .single();

    if (error) {
        console.error('Ошибка загрузки профиля:', error);
        return false;
    }

    document.getElementById('userEmail').textContent = data.email || session.user.email;
    currentUserId = session.user.id;
    return true;
}

// Загрузка списка услуг
async function loadServices() {
    const loading = document.getElementById('loading');
    const list = document.getElementById('servicesList');
    loading.style.display = 'block';

    const { data, error } = await supabase
        .schema('services')
        .from('passport')
        .select('id, application_number, created_at, status')
        .eq('user_id', currentUserId)
        .order('created_at', { ascending: false });

    if (error) {
        console.error('Ошибка загрузки услуг:', error);
        list.innerHTML = '<p class="error">Ошибка загрузки данных</p>';
        loading.style.display = 'none';
        return;
    }

    if (!data || data.length === 0) {
        list.innerHTML = '<p class="no-data">У вас пока нет заявлений</p>';
        loading.style.display = 'none';
        return;
    }

    list.innerHTML = data.map(item => {
        const statusClass = `status-${item.status}`;
        const statusText = statusMap[item.status] || item.status;
        const date = new Date(item.created_at).toLocaleDateString('ru-RU');
        return `
            <a href="service-view.html?id=${item.id}" class="service-card">
                <div class="service-info">
                    <span class="service-number">№ ${item.application_number}</span>
                    <span class="service-status ${statusClass}">${statusText}</span>
                    <div class="service-date">от ${date}</div>
                </div>
                <i class="fas fa-chevron-right"></i>
            </a>
        `;
    }).join('');

    loading.style.display = 'none';
}

// Выход
document.getElementById('logoutBtn').addEventListener('click', async () => {
    await supabase.auth.signOut();
    window.location.href = '../login.html';
});

// Инициализация
document.addEventListener('DOMContentLoaded', async () => {
    if (!await loadUserProfile()) return;
    await loadServices();
});
	</script>
