    <script type="module">
import { supabase } from '../../js/supabase-config.js';

let currentUserId = null;
const statusMap = {
    'submitted': 'Отправлено в ведомство',
    'processing': 'В работе',
    'interim': 'Промежуточные результаты',
    'positive': 'Принято положительное решение',
    'completed': 'Результат выдан',
    'rejected': 'Отказано',
    'cancelled': 'Отменено'
};

const serviceTypeNames = {
    'passport': 'Получение паспорта гражданина СФСРЮ',
    'foreign_passport': 'Получение заграничного паспорта гражданина СФСРЮ'
};

function getStatusIcon(status) {
    switch (status) {
        case 'rejected':
            return '<i class="fas fa-times-circle"></i>';
        case 'cancelled':
            return '<i class="fas fa-ban"></i>';
        case 'positive':
        case 'completed':
            return '<i class="fas fa-check-circle"></i>';
	    case 'interim':
        case 'submitted':
        case 'processing':
        default:
            return '<i class="fas fa-hourglass-half"></i>';
    }
}

async function getSignedUrl(filePath) {
    if (!filePath) return null;
    try {
        const { data, error } = await supabase.storage
            .from('services-files')
            .createSignedUrl(filePath, 3600);
        if (error) throw error;
        return data.signedUrl;
    } catch (e) {
        console.error('Ошибка получения ссылки на файл:', e);
        return null;
    }
}

async function loadUserProfile() {
    const { data: { session }, error: sessionError } = await supabase.auth.getSession();
    if (sessionError || !session) {
        window.location.href = '../../login.html';
        return false;
    }
    currentUserId = session.user.id;
    return true;
}

async function loadService() {
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');
    if (!id) {
        showError('Не указан ID заявления');
        return;
    }

    try {
        const { data: app, error: appError } = await supabase
            .schema('services')
            .from('passport')
            .select('*')
            .eq('id', id)
            .eq('user_id', currentUserId)
            .single();

        if (appError || !app) {
            showError('Заявление не найдено');
            return;
        }

        const serviceName = serviceTypeNames[app.service_type] || 'Услуга';
        document.getElementById('serviceName').textContent = serviceName;
        document.getElementById('appNumber').textContent = `№ ${app.application_number}`;

        await loadHistory(id, app.photo_path, app.application_number);
    } catch (err) {
        console.error(err);
        showError('Ошибка загрузки данных');
    }
}

async function loadHistory(passportId, photoPath, appNumber) {
    const list = document.getElementById('historyList');
    const toggleBtn = document.getElementById('toggleHistoryBtn');
    if (!list) return;

    const { data, error } = await supabase
        .schema('services')
        .from('passport_status_history')
        .select('*')
        .eq('passport_id', passportId)
        .order('created_at', { ascending: false });

    if (error) {
        console.error('Ошибка загрузки истории:', error);
        list.innerHTML = '<p class="error">Ошибка загрузки истории</p>';
        return;
    }

    if (!data || data.length === 0) {
        list.innerHTML = '<p class="no-data">История отсутствует</p>';
        toggleBtn.style.display = 'none';
        return;
    }

    let html = '';
    for (const item of data) {
        const statusText = statusMap[item.status] || item.status;
        const iconHtml = getStatusIcon(item.status);
        const files = item.attachments || [];
        const fileLinks = [];

        // Для статуса "Отправлено в ведомство" добавляем фото и заявление
        if (item.status === 'submitted') {
            if (photoPath) {
                const photoUrl = await getSignedUrl(photoPath);
                if (photoUrl) {
                    const fileName = photoPath.split('/').pop() || 'photo.jpg';
                    fileLinks.push(`
                        <div class="file-item">
                            <span>📷</span>
                            <a href="${photoUrl}" target="_blank">${fileName}</a>
                        </div>
                    `);
                }
            }
            const statementPath = `passport/${appNumber}/statement.pdf`;
            const statementUrl = await getSignedUrl(statementPath);
            if (statementUrl) {
                fileLinks.push(`
                    <div class="file-item">
                        <span>📄</span>
                        <a href="${statementUrl}" target="_blank">statement.pdf</a>
                    </div>
                `);
            }
        }

        for (const f of files) {
            const url = await getSignedUrl(f);
            if (url) {
                const fileName = f.split('/').pop() || 'файл';
                fileLinks.push(`
                    <div class="file-item">
                        <span>📎</span>
                        <a href="${url}" target="_blank">${fileName}</a>
                    </div>
                `);
            }
        }

        html += `
            <div class="status-card">
                <div class="status-header">
                    <div class="status-icon">${iconHtml}</div>
                    <span class="status-name">${statusText}</span>
                    <span class="status-date">${new Date(item.created_at).toLocaleString()}</span>
                </div>
                <div class="status-comment">${item.comment || ''}</div>
                <div class="files-list">
                    ${fileLinks.join('')}
                </div>
            </div>
        `;
    }
    list.innerHTML = html;

    const statusCards = list.querySelectorAll('.status-card');
    if (statusCards.length > 1) {
        toggleBtn.style.display = 'inline-block';
        list.classList.remove('show-all');
        toggleBtn.textContent = 'Показать историю';
    } else {
        toggleBtn.style.display = 'none';
    }
}

function showError(msg) {
    const loading = document.getElementById('loading');
    if (loading) loading.style.display = 'none';
    const err = document.getElementById('error');
    if (err) {
        err.textContent = msg;
        err.style.display = 'block';
    }
    const content = document.getElementById('content');
    if (content) content.style.display = 'none';
}

document.addEventListener('DOMContentLoaded', async () => {
    if (!await loadUserProfile()) return;
    await loadService();
    const loading = document.getElementById('loading');
    if (loading) loading.style.display = 'none';
    const content = document.getElementById('content');
    if (content) content.style.display = 'block';

    const toggleBtn = document.getElementById('toggleHistoryBtn');
    if (toggleBtn) {
        toggleBtn.addEventListener('click', () => {
            const history = document.getElementById('historyList');
            if (history) {
                history.classList.toggle('show-all');
                toggleBtn.textContent = history.classList.contains('show-all') ? 'Скрыть историю' : 'Показать историю';
            }
        });
    }
});
    </script>
