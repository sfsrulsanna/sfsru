        .service-container {
            max-width: 700px;
            margin: 2rem auto;

        .service-number {
            font-size: 1rem;
            color: #6c757d;
            margin-bottom: 2rem;
        }
        .status-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #eee;
        }
        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .status-name {
            font-weight: 600;
            color: #7b091a;
        }
        .status-date {
            color: #666;
            font-size: 0.9rem;
        }
        .status-comment {
            color: #555;
            margin-bottom: 1rem;
        }
        .files-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .file-item {
            background: #e9ecef;
            border-radius: 6px;
            padding: 0.3rem 0.8rem;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        .file-item a {
            color: #007bff;
            text-decoration: none;
        }
        .file-item a:hover {
            text-decoration: underline;
        }
        .section-title {
            font-weight: 600;
            margin: 2rem 0 1rem;
            color: #333;
        }
        .documents-grid {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        .document-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid #dee2e6;
        }
        .document-row:last-child {
            border-bottom: none;
        }
        .doc-name {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .doc-download {
            background: #007bff;
            color: white;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
        }
        .doc-download:hover {
            background: #0056b3;
        }
        .back-link {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.5rem 1rem;
            background-color: #6c757d;
            color: white;
            border-radius: 4px;
            text-decoration: none;
            transition: background-color 0.2s;
        }
        .back-link:hover {
            background-color: #5a6268;
        }
        .back-link i {
            margin-right: 0.5rem;
        }
        .toggle-history {
            background-color: #e9ecef;
            border: 1px solid #ced4da;
            color: #495057;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            margin: 1rem 0;
            transition: background-color 0.2s;
            display: none; /* скрыта по умолчанию, показывается если есть доп. статусы */
        }
        .toggle-history:hover {
            background-color: #dee2e6;
        }
        /* По умолчанию показываем только первый статус */
        #historyList .status-card:not(:first-child) {
            display: none;
        }
        #historyList.show-all .status-card {
            display: block;
        }
        .loading, .no-data, .error {
            text-align: center;
            padding: 2rem;
            color: #666;

    <script src="../../js/mob-menu.js"></script>
    <script type="module">
        import { supabase } from '../../js/supabase-config.js';

        let currentUserId = null;
        const statusMap = {
            'submitted': 'Отправлено в ведомство',
            'processing': 'В работе',
            'interim': 'Промежуточные результаты',
            'positive': 'Принято положительное решение',
            'completed': 'Результат выдан',
            'rejected': 'Отказано',
            'cancelled': 'Отменено'
        };

        async function getSignedUrl(filePath) {
            if (!filePath) return null;
            try {
                const { data, error } = await supabase.storage
                    .from('services-files')
                    .createSignedUrl(filePath, 3600);
                if (error) throw error;
                return data.signedUrl;
            } catch (e) {
                console.error('Ошибка получения ссылки на файл:', e);
                return null;
            }
        }

        async function loadUserProfile() {
            const { data: { session }, error: sessionError } = await supabase.auth.getSession();
            if (sessionError || !session) {
                window.location.href = '../../login.html';
                return false;
            }
            currentUserId = session.user.id;
            return true;
        }

        async function loadService() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            if (!id) {
                showError('Не указан ID заявления');
                return;
            }

            try {
                const { data: app, error: appError } = await supabase
                    .schema('services')
                    .from('passport')
                    .select('*')
                    .eq('id', id)
                    .eq('user_id', currentUserId)
                    .single();

                if (appError || !app) {
                    showError('Заявление не найдено');
                    return;
                }

                document.getElementById('appNumber').textContent = `№ ${app.application_number}`;

                // Загружаем историю, передавая photo_path и application_number
                await loadHistory(id, app.photo_path, app.application_number);
            } catch (err) {
                console.error(err);
                showError('Ошибка загрузки данных');
            }
        }

        async function loadHistory(passportId, photoPath, appNumber) {
            const list = document.getElementById('historyList');
            const toggleBtn = document.getElementById('toggleHistoryBtn');
            if (!list) return;

            const { data, error } = await supabase
                .schema('services')
                .from('passport_status_history')
                .select('*')
                .eq('passport_id', passportId)
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Ошибка загрузки истории:', error);
                list.innerHTML = '<p class="error">Ошибка загрузки истории</p>';
                return;
            }

            if (!data || data.length === 0) {
                list.innerHTML = '<p class="no-data">История отсутствует</p>';
                toggleBtn.style.display = 'none';
                return;
            }

            let html = '';
            for (const item of data) {
                const statusText = statusMap[item.status] || item.status;
                const files = item.attachments || [];
                const fileLinks = [];

                // Для статуса "Отправлено в ведомство" добавляем statement.pdf и фото
                if (item.status === 'submitted') {
                    // Фото
                    if (photoPath) {
                        const photoUrl = await getSignedUrl(photoPath);
                        if (photoUrl) {
                            const fileName = photoPath.split('/').pop() || 'photo.jpg';
                            fileLinks.push(`
                                <div class="file-item">
                                    <span>📷</span>
                                    <a href="${photoUrl}" target="_blank">${fileName}</a>
                                </div>
                            `);
                        }
                    }
                    // PDF заявления
                    const statementPath = `passport/${appNumber}/statement.pdf`;
                    const statementUrl = await getSignedUrl(statementPath);
                    if (statementUrl) {
                        fileLinks.push(`
                            <div class="file-item">
                                <span>📄</span>
                                <a href="${statementUrl}" target="_blank">statement.pdf</a>
                            </div>
                        `);
                    }
                }

                // Добавляем файлы, прикреплённые к этому статусу в истории (дополнительные документы)
                for (const f of files) {
                    const url = await getSignedUrl(f);
                    if (url) {
                        const fileName = f.split('/').pop() || 'файл';
                        fileLinks.push(`
                            <div class="file-item">
                                <span>📎</span>
                                <a href="${url}" target="_blank">${fileName}</a>
                            </div>
                        `);
                    }
                }

                html += `
                    <div class="status-card">
                        <div class="status-header">
                            <span class="status-name">${statusText}</span>
                            <span class="status-date">${new Date(item.created_at).toLocaleString()}</span>
                        </div>
                        <div class="status-comment">${item.comment || ''}</div>
                        <div class="files-list">
                            ${fileLinks.join('')}
                        </div>
                    </div>
                `;
            }
            list.innerHTML = html;

            // Управление кнопкой показа истории
            const statusCards = list.querySelectorAll('.status-card');
            if (statusCards.length > 1) {
                toggleBtn.style.display = 'inline-block';
                // Сбрасываем класс show-all (вдруг остался от предыдущего просмотра)
                list.classList.remove('show-all');
                toggleBtn.textContent = 'Показать историю';
            } else {
                toggleBtn.style.display = 'none';
            }
        }

        function showError(msg) {
            const loading = document.getElementById('loading');
            if (loading) loading.style.display = 'none';
            const err = document.getElementById('error');
            if (err) {
                err.textContent = msg;
                err.style.display = 'block';
            }
            const content = document.getElementById('content');
            if (content) content.style.display = 'none';
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (!await loadUserProfile()) return;
            await loadService();
            const loading = document.getElementById('loading');
            if (loading) loading.style.display = 'none';
            const content = document.getElementById('content');
            if (content) content.style.display = 'block';

            // Обработчик кнопки "Показать/Скрыть историю"
            const toggleBtn = document.getElementById('toggleHistoryBtn');
            if (toggleBtn) {
                toggleBtn.addEventListener('click', () => {
                    const history = document.getElementById('historyList');
                    if (history) {
                        history.classList.toggle('show-all');
                        if (history.classList.contains('show-all')) {
                            toggleBtn.textContent = 'Скрыть историю';
                        } else {
                            toggleBtn.textContent = 'Показать историю';
                        }
                    }
                });
            }
        });
    </script>
