    <script type="module">
import { supabase } from '../../js/supabase-config.js';

let currentUserId = null;
const statusMap = {
    'submitted': 'Отправлено в ведомство',
    'processing': 'В работе',
    'interim': 'Промежуточные результаты',
    'positive': 'Принято положительное решение',
    'completed': 'Результат выдан',
    'rejected': 'Отказано',
    'cancelled': 'Отменено'
};

const serviceTypeNames = {
    'passport': 'Получение паспорта гражданина СФСРЮ'
    // в будущем можно добавить другие: 'driver_license': 'Получение водительского удостоверения' и т.д.
};

// Получение подписанной ссылки
async function getSignedUrl(filePath) {
    if (!filePath) return null;
    try {
        const { data, error } = await supabase.storage
            .from('services-files')
            .createSignedUrl(filePath, 3600);
        if (error) throw error;
        return data.signedUrl;
    } catch (e) {
        console.error('Ошибка получения ссылки на файл:', e);
        return null;
    }
}

// Загрузка данных пользователя
async function loadUserProfile() {
    const { data: { session }, error: sessionError } = await supabase.auth.getSession();
    if (sessionError || !session) {
        window.location.href = '../login.html';
        return false;
    }
    const { data, error } = await supabase
        .from('users')
        .select('email')
        .eq('id', session.user.id)
        .single();
    if (error) {
        console.error('Ошибка загрузки профиля:', error);
        return false;
    }
    document.getElementById('userEmail').textContent = data.email || session.user.email;
    currentUserId = session.user.id;
    return true;
}

// Загрузка деталей услуги
async function loadService() {
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');
    if (!id) {
        showError('Не указан ID заявления');
        return;
    }

    try {
        const { data: app, error: appError } = await supabase
            .schema('services')
            .from('passport')
            .select('*')
            .eq('id', id)
            .eq('user_id', currentUserId)
            .single();

        if (appError || !app) {
            showError('Заявление не найдено');
            return;
        }

        // Устанавливаем название услуги
        const serviceNameEl = document.getElementById('serviceName');
        serviceNameEl.textContent = serviceTypeNames[app.service_type] || 'Услуга';

        document.getElementById('appNumber').textContent = `№ ${app.application_number}`;

        // Загружаем файлы и историю
        await renderFiles(app.photo_path, app.application_number);
        await loadHistory(id);
    } catch (err) {
        console.error(err);
        showError('Ошибка загрузки данных');
    }
}

// Отображение файлов (фото и statement.pdf) в верхнем блоке
async function renderFiles(photoPath, appNumber) {
    const section = document.getElementById('filesSection');
    if (!section) return;

    const fileList = [];

    if (photoPath) {
        const photoUrl = await getSignedUrl(photoPath);
        if (photoUrl) {
            // Извлекаем имя файла из пути
            const fileName = photoPath.split('/').pop() || 'photo.jpg';
            fileList.push({
                name: fileName,
                url: photoUrl,
                size: '—' // размер не храним
            });
        }
    }

    const statementPath = `passport/${appNumber}/statement.pdf`;
    const statementUrl = await getSignedUrl(statementPath);
    if (statementUrl) {
        fileList.push({
            name: 'statement.pdf',
            url: statementUrl,
            size: '—'
        });
    }

    if (fileList.length === 0) {
        section.innerHTML = '<p class="no-data">Нет доступных файлов</p>';
        return;
    }

    let html = '';
    fileList.forEach(file => {
        html += `
            <div class="document-row">
                <div class="doc-name">
                    <span>📄 ${file.name}</span>
                    <span class="doc-size">${file.size}</span>
                </div>
                <a href="${file.url}" target="_blank" class="doc-download">Скачать</a>
            </div>
        `;
    });
    section.innerHTML = html;
}

// Загрузка истории статусов
async function loadHistory(passportId) {
    const list = document.getElementById('historyList');
    if (!list) return;

    const { data, error } = await supabase
        .schema('services')
        .from('passport_status_history')
        .select('*')
        .eq('passport_id', passportId)
        .order('created_at', { ascending: false });

    if (error) {
        console.error('Ошибка загрузки истории:', error);
        list.innerHTML = '<p class="error">Ошибка загрузки истории</p>';
        return;
    }

    if (!data || data.length === 0) {
        list.innerHTML = '<p class="no-data">История отсутствует</p>';
        return;
    }

    let html = '';
    for (const item of data) {
        const statusText = statusMap[item.status] || item.status;
        const files = item.attachments || [];
        const fileLinks = [];
        for (const f of files) {
            const url = await getSignedUrl(f);
            if (url) {
                const fileName = f.split('/').pop() || 'файл';
                fileLinks.push(`
                    <div class="file-item">
                        <span>📎</span>
                        <a href="${url}" target="_blank">${fileName}</a>
                    </div>
                `);
            }
        }
        html += `
            <div class="status-card">
                <div class="status-header">
                    <span class="status-name">${statusText}</span>
                    <span class="status-date">${new Date(item.created_at).toLocaleString()}</span>
                </div>
                <div class="status-comment">${item.comment || ''}</div>
                <div class="files-list">
                    ${fileLinks.join('')}
                </div>
            </div>
        `;
    }
    list.innerHTML = html;
}

function showError(msg) {
    const loading = document.getElementById('loading');
    if (loading) loading.style.display = 'none';
    const err = document.getElementById('error');
    if (err) {
        err.textContent = msg;
        err.style.display = 'block';
    }
    const content = document.getElementById('content');
    if (content) content.style.display = 'none';
}

// Инициализация
document.addEventListener('DOMContentLoaded', async () => {
    if (!await loadUserProfile()) return;
    await loadService();
    const loading = document.getElementById('loading');
    if (loading) loading.style.display = 'none';
    const content = document.getElementById('content');
    if (content) content.style.display = 'block';

    document.getElementById('logoutBtn').addEventListener('click', async () => {
        await supabase.auth.signOut();
        window.location.href = '../login.html';
    });

    // Кнопка "Скрыть историю"
    const toggleBtn = document.getElementById('toggleHistoryBtn');
    if (toggleBtn) {
        toggleBtn.addEventListener('click', () => {
            const history = document.getElementById('historyList');
            if (history) {
                if (history.style.display === 'none') {
                    history.style.display = 'block';
                    toggleBtn.textContent = 'Скрыть историю';
                } else {
                    history.style.display = 'none';
                    toggleBtn.textContent = 'Показать историю';
                }
            }
        });
    }
});
	</script>
