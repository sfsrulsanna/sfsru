<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель эксперта ГИА — СФСРЮ</title>
    <link rel="stylesheet" href="../../../css/style.css">
    <link rel="stylesheet" href="gia-common.css">
    <style>
        .expert-info {
            background: #e8f0fe;
            border-radius: 28px;
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            border-left: 8px solid #4a6fa5;
        }
        .exam-card {
            background: white;
            border-radius: 24px;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid #ffcece;
        }
        .exam-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }
        .btn {
            background: #4a6fa5;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 6px 16px;
            cursor: pointer;
            margin-left: 0.5rem;
        }
        .btn-secondary { background: #6c757d; }
        .task-table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }
        .task-table th, .task-table td {
            border: 1px solid #ffcece;
            padding: 6px 8px;
            text-align: center;
            vertical-align: middle;
        }
        .task-input, .answer-input {
            width: 80px;
            text-align: center;
            border: 1px solid #ccc;
            border-radius: 12px;
            padding: 4px;
        }
        .answer-input { width: 120px; }
        .info-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 0.5rem;
            background: #f0f4f8;
            padding: 0.5rem;
            border-radius: 16px;
        }
        .grade-section {
            margin-top: 1rem;
            padding: 0.5rem;
            background: #f8f9fa;
            border-radius: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
        }
        .file-list {
            margin: 0.5rem 0;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .file-item {
            background: #e8e8e8;
            border-radius: 20px;
            padding: 0.2rem 0.6rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
    </style>
</head>
<body>
<div class="gia-header">
    <div class="container">
        <h1>👩‍🏫 Панель эксперта ГИА</h1>
        <div class="header-buttons"><a href="./index.html" class="header-btn" id="logoutBtn">🚪 Выйти</a></div>
    </div>
</div>
<main class="main-container">
    <div id="expertInfo" class="expert-info">Загрузка...</div>
    <div class="card">
        <h2>📋 Экзамены для проверки</h2>
        <div id="examsList"></div>
    </div>
</main>

<div id="scoreModal" class="modal">
    <div class="modal-content" style="max-width: 95%; width: 1000px;">
        <span class="close-modal">&times;</span>
        <div id="scoreModalBody"></div>
    </div>
</div>

<footer class="gia-footer"><p>© 2026 СФСРЮ. Все права защищены пролетариатом11.</p></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://qeewwoklmjysactfhrum.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlZXd3b2tsbWp5c2FjdGZocnVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MTI2MTEsImV4cCI6MjA4NjQ4ODYxMX0.gWzqku1cS08v17kfJHJbOWbm-DRpzwQ9omlQsKxc96A';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { db: { schema: 'education_gia' } });

    (function checkExaminer() {
        const user = JSON.parse(sessionStorage.getItem('gia_user') || '{}');
        if (user.role !== 'examiner') window.location.href = './index.html';
    })();
    let currentUser = JSON.parse(sessionStorage.getItem('gia_user'));
    let gradingScales = {};
    let taskMaxScores = {};      // { subjectCode_gradeType: { taskNumber: { max, type } } }
    let currentAssignments = [];

    async function loadExpertInfo() {
        const { data: expert, error } = await supabaseClient
            .from('examiners')
            .select('*, ppe(name)')
            .eq('personal_code', currentUser.personal_code)
            .single();
        if (error) {
            document.getElementById('expertInfo').innerHTML = '<p>Информация об эксперте не найдена</p>';
            return;
        }
        document.getElementById('expertInfo').innerHTML = `
            <p><strong>👤 ФИО:</strong> ${currentUser.full_name}</p>
            <p><strong>📌 Роль:</strong> Эксперт</p>
            <p><strong>🏫 ППЭ:</strong> ${expert.ppe?.name || 'не привязан'}</p>
        `;
    }

    async function loadScales() {
        const { data } = await supabaseClient.from('grading_scales').select('*');
        if (data) {
            gradingScales = {};
            data.forEach(s => {
                const key = `${s.subject_code}_${s.grade_type}`;
                if (!gradingScales[key]) gradingScales[key] = [];
                gradingScales[key].push({ min: s.primary_min, max: s.primary_max, grade: s.grade });
            });
        }
    }

    async function loadMaxScores() {
        const { data } = await supabaseClient.from('task_max_scores').select('*');
        if (data) {
            taskMaxScores = {};
            data.forEach(t => {
                const key = `${t.subject_code}_${t.grade_type}`;
                if (!taskMaxScores[key]) taskMaxScores[key] = {};
                taskMaxScores[key][t.task_number] = { max: t.max_score, type: t.task_type || 'short_answer' };
            });
        }
    }

    async function loadExams() {
        const { data: results, error } = await supabaseClient
            .from('resultats')
            .select('*, exam_assignments(subject, exam_date, ppe_name, audience, place, registered(full_name, personal_code), id)')
            .eq('status', 'processing')
            .order('id', { ascending: false });
        if (error) {
            document.getElementById('examsList').innerHTML = '<p>Ошибка загрузки экзаменов</p>';
            return;
        }
        if (!results.length) {
            document.getElementById('examsList').innerHTML = '<p>Нет экзаменов, ожидающих проверки.</p>';
            return;
        }
        let html = '';
        for (const res of results) {
            const assign = res.exam_assignments;
            const student = assign.registered;
            const assignmentId = assign.id;
            html += `
                <div class="exam-card" data-result-id="${res.id}" data-assignment-id="${assignmentId}">
                    <div class="exam-header">
                        <div class="exam-title">${assign.subject} (${new Date(assign.exam_date).toLocaleDateString()})</div>
                        <div>
                            <button class="btn btn-secondary view-files-btn" data-assignment-id="${assignmentId}">📂 Просмотреть бланки</button>
                            <button class="btn score-btn" data-result-id="${res.id}" data-assignment-id="${assignmentId}" data-subject="${assign.subject}">📝 Выставить баллы</button>
                        </div>
                    </div>
                    <div><strong>Участник:</strong> ${student.full_name} (${student.personal_code})</div>
                    <div><strong>ППЭ:</strong> ${assign.ppe_name || '—'} | <strong>Ауд.:</strong> ${assign.audience || '?'} | <strong>Место:</strong> ${assign.place || '?'}</div>
                    ${res.score ? `<div><strong>Текущий балл:</strong> ${res.score} | <strong>Оценка:</strong> ${res.grade}</div>` : ''}
                </div>
            `;
        }
        document.getElementById('examsList').innerHTML = html;

        document.querySelectorAll('.view-files-btn').forEach(btn => {
            btn.addEventListener('click', () => viewFiles(btn.dataset.assignmentId));
        });
        document.querySelectorAll('.score-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const resultId = btn.dataset.resultId;
                const assignmentId = btn.dataset.assignmentId;
                const subject = btn.dataset.subject;
                showScoringModal(resultId, assignmentId, subject);
            });
        });
    }

    // Просмотр бланков с подписями
    async function viewFiles(assignmentId) {
        const { data: sheets, error } = await supabaseClient
            .from('answer_sheets')
            .select('*')
            .eq('assignment_id', assignmentId);
        if (error) {
            alert('Ошибка загрузки бланков: ' + error.message);
            return;
        }
        if (!sheets || sheets.length === 0) {
            alert('Бланки для этого экзамена не найдены.');
            return;
        }
        let html = `<h3>Бланки экзамена</h3><div class="file-list">`;
        const labels = {
            registration: '📄 Бланк регистрации',
            answer1: '📝 Бланк ответов №1',
            'answer2-1': '📑 Бланк ответов №2 (лист 1)',
            'answer2-2': '📑 Бланк ответов №2 (лист 2)',
            'extra-c': '📎 Дополнительный бланк C',
            'audio-d': '🎤 Аудиозапись (тип D)'
        };
        for (const f of sheets) {
            const { data: { publicUrl } } = supabaseClient.storage.from('answer_sheets').getPublicUrl(f.file_path);
            const label = labels[f.file_type] || `📄 ${f.file_name}`;
            html += `<div class="file-item"><a href="${publicUrl}" target="_blank">${label}</a></div>`;
        }
        html += `</div>`;
        const modal = document.getElementById('scoreModal');
        const modalBody = document.getElementById('scoreModalBody');
        modalBody.innerHTML = html;
        modal.style.display = 'flex';
    }

    async function showScoringModal(resultId, assignmentId, subject) {
        // Получаем данные экзамена (только для чтения)
        const { data: assign } = await supabaseClient
            .from('exam_assignments')
            .select('subject, exam_date, ppe_name, audience, place, registered(full_name)')
            .eq('id', assignmentId)
            .single();
        if (!assign) return;

        // Получаем уже сохранённые детали (ответы, баллы за части и т.д.)
        let examDetails = {};
        let existingShortAnswers = []; // массив { task_number, answer, score }
        let existingTypeB = '', existingTypeBScore = '';
        let existingTypeC = '', existingTypeCScore = '';
        let existingTypeDScore = '';
        let existingVariant = '';
        let existingFiles = [];

        const { data: details } = await supabaseClient
            .from('exam_details')
            .select('*')
            .eq('result_id', resultId)
            .maybeSingle();
        if (details) {
            existingShortAnswers = details.short_answers || [];
            existingTypeB = details.type_b || '';
            existingTypeBScore = details.type_b_score || '';
            existingTypeC = details.type_c || '';
            existingTypeCScore = details.type_c_score || '';
            existingTypeDScore = details.type_d_score || '';
            existingVariant = details.variant || '';
            existingFiles = details.files || [];
            examDetails = details;
        }

        // Парсим предмет и тип
        const parts = subject.split('-');
        const subjectCode = parts[0];
        const gradeType = parts[1];
        const key = `${subjectCode}_${gradeType}`;
        const tasksMap = taskMaxScores[key] || {};
        const taskNumbers = Object.keys(tasksMap).map(Number).sort((a,b)=>a-b);

        // Загружаем ранее сохранённые баллы за задания (из task_scores)
        const { data: existingScores } = await supabaseClient
            .from('task_scores')
            .select('*')
            .eq('result_id', resultId);
        const scoresMap = {};
        if (existingScores) existingScores.forEach(s => { scoresMap[s.task_number] = s.score; });

        // Строим таблицу заданий
        let tasksHtml = `<table class="task-table"><thead><tr><th>№</th><th>Макс. балл</th><th>Тип</th><th>Ответ участника</th><th>Балл</th></tr></thead><tbody>`;
        for (const tn of taskNumbers) {
            const taskInfo = tasksMap[tn];
            const maxScore = taskInfo.max;
            const taskType = taskInfo.type;
            const currentScore = scoresMap[tn] !== undefined ? scoresMap[tn] : '';
            // Ищем существующий ответ участника для этого задания (только для short_answer)
            let currentAnswer = '';
            if (taskType === 'short_answer') {
                const found = existingShortAnswers.find(a => a.task_number == tn);
                currentAnswer = found ? (found.answer || '') : '';
            }
            tasksHtml += `<tr>
                <td>${tn}</td>
                <td>${maxScore}</td>
                <td>${taskType === 'short_answer' ? 'Краткий ответ' : 'Развёрнутый (C/D)'}</td>`;
            if (taskType === 'short_answer') {
                tasksHtml += `<td><input type="text" class="answer-input" data-task="${tn}" value="${escapeHtml(currentAnswer)}" placeholder="ответ участника"></td>`;
            } else {
                tasksHtml += `<td>—</td>`;
            }
            tasksHtml += `<td><input type="number" class="task-input" data-task="${tn}" value="${currentScore}" min="0" max="${maxScore}" step="1"></td>
            </tr>`;
        }
        tasksHtml += `</tbody></table>`;

        // Информационная строка (данные экзамена, только для чтения)
        const infoHtml = `
            <div class="info-row">
                <div><strong>📌 Вариант:</strong> ${existingVariant || 'не указан'}</div>
                <div><strong>🏫 ППЭ:</strong> ${assign.ppe_name || '—'}</div>
                <div><strong>🏢 Аудитория:</strong> ${assign.audience || '?'}</div>
                <div><strong>📍 Место:</strong> ${assign.place || '?'}</div>
            </div>
        `;

        // Блок для баллов за части B, C, D (только если они есть в задании)
        let extraBlocks = '';
        if (taskNumbers.some(t => tasksMap[t].type !== 'short_answer')) {
            extraBlocks = `
                <div class="extra-info">
                    <label><strong>📝 Задания типа B (строка, если есть):</strong></label>
                    <input type="text" id="typeBInput" value="${escapeHtml(existingTypeB)}" style="width:250px;">
                    <label><strong>Балл за B:</strong></label>
                    <input type="text" id="typeBScoreInput" value="${escapeHtml(existingTypeBScore)}" style="width:80px;">
                    <hr>
                    <label><strong>📝 Задания типа C (строка, если есть):</strong></label>
                    <input type="text" id="typeCInput" value="${escapeHtml(existingTypeC)}" style="width:250px;">
                    <label><strong>Балл за C:</strong></label>
                    <input type="text" id="typeCScoreInput" value="${escapeHtml(existingTypeCScore)}" style="width:80px;">
                    <hr>
                    <label><strong>🎤 Балл за устную часть (D):</strong></label>
                    <input type="text" id="typeDScoreInput" value="${escapeHtml(existingTypeDScore)}" style="width:80px;">
                </div>
            `;
        }

        // Блок с итоговыми баллами и оценкой
        const gradeSection = `
            <div class="grade-section">
                <div><strong>📊 Первичный балл (авто):</strong> <span id="primaryScoreDisplay">0</span></div>
                <div><strong>🎯 Вторичный балл (авто):</strong> <span id="secondaryScoreDisplay">0</span></div>
                <div><strong>⭐ Оценка (авто):</strong> <span id="autoGradeDisplay"></span></div>
                <div><label>✏️ Скорректировать оценку: <input type="text" id="manualGradeInput" placeholder="2,3,4,5"></label></div>
                <button id="saveScoresBtn" class="btn">💾 Сохранить результаты</button>
            </div>
        `;

        const modalHtml = `
            <h3>Выставление баллов: ${subject}</h3>
            <div><strong>Участник:</strong> ${assign.registered.full_name}</div>
            <div><strong>Дата экзамена:</strong> ${new Date(assign.exam_date).toLocaleDateString()}</div>
            ${infoHtml}
            ${tasksHtml}
            ${extraBlocks}
            ${gradeSection}
        `;

        const modal = document.getElementById('scoreModal');
        const modalBody = document.getElementById('scoreModalBody');
        modalBody.innerHTML = modalHtml;
        modal.style.display = 'flex';

        // Функция обновления первичного балла и оценки
        function updateTotals() {
            let total = 0;
            document.querySelectorAll('.task-input').forEach(inp => {
                const val = parseInt(inp.value) || 0;
                const max = parseInt(inp.max);
                total += Math.min(val, max);
            });
            document.getElementById('primaryScoreDisplay').innerText = total;
            const scaleKey = `${subjectCode}_${gradeType}`;
            const scales = gradingScales[scaleKey] || [];
            let secondary = total;
            let autoGrade = '—';
            for (const s of scales) {
                if (total >= s.min && total <= s.max) {
                    secondary = total;
                    autoGrade = s.grade;
                    break;
                }
            }
            document.getElementById('secondaryScoreDisplay').innerText = secondary;
            document.getElementById('autoGradeDisplay').innerText = autoGrade;
        }

        document.querySelectorAll('.task-input').forEach(inp => inp.addEventListener('input', updateTotals));
        updateTotals();

        // Сохранение
        document.getElementById('saveScoresBtn').onclick = async () => {
            const totalPrimary = parseInt(document.getElementById('primaryScoreDisplay').innerText);
            const autoGrade = document.getElementById('autoGradeDisplay').innerText;
            const manualGrade = document.getElementById('manualGradeInput').value.trim();
            const finalGrade = manualGrade !== '' ? manualGrade : autoGrade;

            // Собираем баллы за задания и ответы на краткие ответы
            const tasksData = [];
            const shortAnswersData = []; // для exam_details
            document.querySelectorAll('.task-input').forEach(inp => {
                const taskNum = parseInt(inp.dataset.task);
                const score = parseInt(inp.value) || 0;
                tasksData.push({ result_id: resultId, task_number: taskNum, score });
            });
            document.querySelectorAll('.answer-input').forEach(inp => {
                const taskNum = parseInt(inp.dataset.task);
                const answer = inp.value.trim();
                if (answer) {
                    shortAnswersData.push({ task_number: taskNum, answer: answer, score: null });
                }
            });

            // Сохраняем баллы заданий
            await supabaseClient.from('task_scores').delete().eq('result_id', resultId);
            const { error: taskErr } = await supabaseClient.from('task_scores').insert(tasksData);
            if (taskErr) { alert('Ошибка сохранения баллов заданий: ' + taskErr.message); return; }

            // Собираем остальные данные для exam_details
            const typeB = document.getElementById('typeBInput')?.value || '';
            const typeBScore = document.getElementById('typeBScoreInput')?.value || '';
            const typeC = document.getElementById('typeCInput')?.value || '';
            const typeCScore = document.getElementById('typeCScoreInput')?.value || '';
            const typeDScore = document.getElementById('typeDScoreInput')?.value || '';

            // Обновляем exam_details
            const { error: detailsErr } = await supabaseClient
                .from('exam_details')
                .upsert({
                    result_id: resultId,
                    short_answers: shortAnswersData,
                    type_b: typeB || null,
                    type_b_score: typeBScore || null,
                    type_c: typeC || null,
                    type_c_score: typeCScore || null,
                    type_d_score: typeDScore || null,
                    primary_score: totalPrimary,
                    secondary_score: parseInt(document.getElementById('secondaryScoreDisplay').innerText) || totalPrimary,
                    grade: finalGrade,
                    updated_at: new Date()
                }, { onConflict: 'result_id' });

            if (detailsErr) { alert('Ошибка сохранения деталей экзамена: ' + detailsErr.message); return; }

            // Обновляем resultats
            const { error: resErr } = await supabaseClient
                .from('resultats')
                .update({ score: totalPrimary, grade: finalGrade, status: 'active', updated_at: new Date() })
                .eq('id', resultId);
            if (resErr) { alert('Ошибка обновления результата: ' + resErr.message); return; }

            alert('Результаты успешно сохранены!');
            modal.style.display = 'none';
            loadExams(); // обновить список
        };
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    document.querySelector('.close-modal').addEventListener('click', () => {
        document.getElementById('scoreModal').style.display = 'none';
    });
    window.addEventListener('click', (e) => {
        if (e.target === document.getElementById('scoreModal')) document.getElementById('scoreModal').style.display = 'none';
    });
    document.getElementById('logoutBtn').onclick = () => { sessionStorage.clear(); window.location.href = './index.html'; };

    (async () => {
        await loadExpertInfo();
        await loadScales();
        await loadMaxScores();
        await loadExams();
    })();
</script>
</body>
</html>
