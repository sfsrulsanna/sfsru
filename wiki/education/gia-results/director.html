<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель руководителя ППЭ — СФСРЮ</title>
    <link rel="stylesheet" href="../../../css/style.css">
    <link rel="stylesheet" href="gia-common.css">
    <style>
        .ppe-info {
            background: #f0f8ff;
            border-radius: 24px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
        .exam-row {
            border: 1px solid #ffe0e0;
            border-radius: 20px;
            margin-bottom: 1rem;
            padding: 1rem;
            background: white;
        }
        .exam-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .room-inputs {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-top: 0.5rem;
        }
        .room-inputs input {
            width: 120px;
            padding: 4px 8px;
            border: 1px solid #ffcece;
            border-radius: 16px;
        }
        .save-room-btn {
            background: #44aa44;
            border: none;
            border-radius: 20px;
            padding: 4px 12px;
            color: white;
            cursor: pointer;
        }
        .sheet-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .sheet-btn {
            background: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .sheet-btn:hover { background: #e0e0e0; transform: translateY(-2px); }
        .sheet-btn.reg { background: #d4e0ff; }
        .sheet-btn.ans1 { background: #d4f0d4; }
        .sheet-btn.ans2 { background: #fff0c0; }
        .sheet-btn.extra { background: #ffe0d0; }
        .sheet-btn.audio { background: #e0d0ff; }
        .file-list {
            margin-top: 0.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
        }
        .file-item {
            background: #f0f0f0;
            border-radius: 16px;
            padding: 0.2rem 0.5rem;
            font-size: 0.75rem;
        }
        .delete-file {
            background: none;
            border: none;
            color: red;
            cursor: pointer;
            margin-left: 0.3rem;
        }
        .modal-large .modal-content {
            max-width: 95%;
            width: auto;
        }
    </style>
</head>
<body>
<div class="gia-header">
    <div class="container">
        <h1>🏛 Панель руководителя ППЭ</h1>
        <div class="header-buttons"><a href="./index.html" class="header-btn" id="logoutBtn">🚪 Выйти</a></div>
    </div>
</div>
<main class="main-container">
    <div class="card">
        <h2>📋 Информация о ППЭ</h2>
        <div id="ppeInfo" class="ppe-info">Загрузка...</div>
    </div>

    <div class="card">
        <h2>📝 Участники экзаменов в ППЭ</h2>
        <div id="participantsList"></div>
    </div>
</main>

<!-- Модальное окно загрузки бланков -->
<div id="uploadModal" class="modal modal-large">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div id="uploadModalBody"></div>
    </div>
</div>

<footer class="gia-footer"><p>© 2026 СФСРЮ. Все права защищены пролетариатом.</p></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://qeewwoklmjysactfhrum.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlZXd3b2tsbWp5c2FjdGZocnVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MTI2MTEsImV4cCI6MjA4NjQ4ODYxMX0.gWzqku1cS08v17kfJHJbOWbm-DRpzwQ9omlQsKxc96A';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { db: { schema: 'education_gia' } });

    (function checkDirector() {
        const user = JSON.parse(sessionStorage.getItem('gia_user') || '{}');
        if (user.role !== 'director') window.location.href = './index.html';
    })();
    let currentUser = JSON.parse(sessionStorage.getItem('gia_user'));
    let currentPPE = null;

    async function loadDirectorData() {
        // Найти ППЭ руководителя
        const { data: examinerData, error: examError } = await supabaseClient
            .from('examiners')
            .select('ppe_id')
            .eq('personal_code', currentUser.personal_code)
            .eq('role', 'director')
            .single();
        if (examError || !examinerData || !examinerData.ppe_id) {
            document.getElementById('ppeInfo').innerHTML = '<p>Вы не назначены руководителем ППЭ. Обратитесь к администратору.</p>';
            return;
        }
        const ppeId = examinerData.ppe_id;
        const { data: ppe, error: ppeError } = await supabaseClient.from('ppe').select('*').eq('id', ppeId).single();
        if (ppeError) {
            document.getElementById('ppeInfo').innerHTML = '<p>Ошибка загрузки ППЭ.</p>';
            return;
        }
        currentPPE = ppe;
        document.getElementById('ppeInfo').innerHTML = `
            <div><strong>Код ППЭ:</strong> ${ppe.code}</div>
            <div><strong>Название:</strong> ${ppe.name}</div>
            <div><strong>Адрес:</strong> ${ppe.address || 'не указан'}</div>
            <div><strong>Принимаемые типы ГИА:</strong> 9, 11, СПО, ВО, ГВЭ (все формы)</div>
        `;

        // Загрузить назначения экзаменов в этом ППЭ с данными участников
        const { data: assignments, error: assignError } = await supabaseClient
            .from('exam_assignments')
            .select('*, registered(full_name, personal_code)')
            .eq('ppe_id', ppeId)
            .order('exam_date', { ascending: true });
        if (assignError) {
            document.getElementById('participantsList').innerHTML = '<p>Ошибка загрузки участников.</p>';
            return;
        }
        if (!assignments.length) {
            document.getElementById('participantsList').innerHTML = '<p>Нет назначенных экзаменов в этом ППЭ.</p>';
            return;
        }
        // Группировка по участнику + экзамен
        const participantsMap = new Map();
        assignments.forEach(ass => {
            const code = ass.registered.personal_code;
            const key = `${code}_${ass.id}`; // уникальный ключ для возможности отдельной настройки аудитории/места
            if (!participantsMap.has(key)) {
                participantsMap.set(key, {
                    personal_code: code,
                    full_name: ass.registered.full_name,
                    assignment_id: ass.id,
                    subject: ass.subject,
                    exam_date: ass.exam_date,
                    audience: ass.audience || '',
                    place: ass.place || ''
                });
            }
        });
        let html = `<div style="display:flex; flex-direction:column; gap:1rem;">`;
        for (let [key, data] of participantsMap.entries()) {
            const examDate = new Date(data.exam_date).toLocaleDateString('ru-RU');
            html += `
                <div class="exam-row" data-assignment-id="${data.assignment_id}">
                    <div class="exam-header">
                        <div><strong>${data.full_name}</strong> (${data.personal_code})<br>${data.subject}, ${examDate}</div>
                        <div class="room-inputs">
                            <input type="text" class="audience-input" placeholder="Аудитория" value="${escapeHtml(data.audience)}" style="width:100px">
                            <input type="text" class="place-input" placeholder="Место" value="${escapeHtml(data.place)}" style="width:100px">
                            <button class="save-room-btn" data-id="${data.assignment_id}">Сохранить</button>
                        </div>
                    </div>
                    <div class="sheet-buttons">
                        <button class="sheet-btn reg" data-type="registration">📄 Бланк регистрации</button>
                        <button class="sheet-btn ans1" data-type="answer1">📝 Бланк ответов №1</button>
                        <button class="sheet-btn ans2" data-type="answer2_1">📑 Бланк ответов №2 (лист 1)</button>
                        <button class="sheet-btn ans2" data-type="answer2_2">📑 Бланк ответов №2 (лист 2)</button>
                        <button class="sheet-btn extra" data-type="extra_c">📎 Доп. бланк C</button>
                        <button class="sheet-btn audio" data-type="type_d">🎤 Ответы типа D (аудио)</button>
                    </div>
                    <div id="files-${data.assignment_id}" class="file-list"></div>
                </div>
            `;
        }
        html += `</div>`;
        document.getElementById('participantsList').innerHTML = html;

        // Привязать сохранение аудитории/места
        document.querySelectorAll('.save-room-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const assignmentId = btn.dataset.id;
                const row = document.querySelector(`.exam-row[data-assignment-id="${assignmentId}"]`);
                const audience = row.querySelector('.audience-input').value;
                const place = row.querySelector('.place-input').value;
                const { error } = await supabaseClient
                    .from('exam_assignments')
                    .update({ audience, place })
                    .eq('id', assignmentId);
                if (error) alert('Ошибка сохранения: ' + error.message);
                else alert('Данные сохранены');
            });
        });

        // Привязать кнопки загрузки бланков
        document.querySelectorAll('.sheet-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const assignmentId = btn.closest('.exam-row').dataset.assignmentId;
                const sheetType = btn.dataset.type;
                uploadSheet(assignmentId, sheetType);
            });
        });

        // Загрузить списки файлов для каждого assignment
        for (let [key, data] of participantsMap.entries()) {
            await loadFilesList(data.assignment_id);
        }
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    async function uploadSheet(assignmentId, sheetType) {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.pdf,.jpg,.jpeg,.png,.mp3,.wav,.m4a';
        input.multiple = (sheetType === 'type_d'); // для аудио можно несколько файлов
        input.onchange = async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            for (const file of files) {
                await uploadFile(assignmentId, file, sheetType);
            }
            await loadFilesList(assignmentId);
        };
        input.click();
    }

    async function uploadFile(assignmentId, file, sheetType) {
        const fileExt = file.name.split('.').pop();
        const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
        const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}_${safeName}`;
        const filePath = `answer_sheets/assignment_${assignmentId}/${sheetType}/${fileName}`;
        const { error: uploadError } = await supabaseClient.storage
            .from('answer_sheets')
            .upload(filePath, file);
        if (uploadError) {
            alert('Ошибка загрузки: ' + uploadError.message);
            return;
        }
        const { error: dbError } = await supabaseClient
            .from('answer_sheets')
            .insert([{
                assignment_id: assignmentId,
                file_path: filePath,
                file_name: file.name,
                file_type: file.type,
                sheet_type: sheetType,
                uploaded_by: currentUser.personal_code
            }]);
        if (dbError) {
            console.error(dbError);
            alert('Ошибка сохранения метаданных');
        } else {
            // alert(`Файл "${file.name}" загружен`);
        }
    }

    async function loadFilesList(assignmentId) {
        const { data, error } = await supabaseClient
            .from('answer_sheets')
            .select('*')
            .eq('assignment_id', assignmentId);
        if (error) return;
        const container = document.getElementById(`files-${assignmentId}`);
        if (!container) return;
        if (!data.length) {
            container.innerHTML = '<span class="file-item">Нет загруженных бланков</span>';
            return;
        }
        let html = '';
        for (const file of data) {
            const publicUrl = supabaseClient.storage.from('answer_sheets').getPublicUrl(file.file_path).data.publicUrl;
            let typeLabel = '';
            switch (file.sheet_type) {
                case 'registration': typeLabel = '📄 Регистрация'; break;
                case 'answer1': typeLabel = '📝 №1'; break;
                case 'answer2_1': typeLabel = '📑 №2 л.1'; break;
                case 'answer2_2': typeLabel = '📑 №2 л.2'; break;
                case 'extra_c': typeLabel = '📎 Доп. C'; break;
                case 'type_d': typeLabel = '🎤 Аудио D'; break;
                default: typeLabel = '📎 Файл';
            }
            html += `<div class="file-item">
                        ${typeLabel}: <a href="${publicUrl}" target="_blank">${escapeHtml(file.file_name)}</a>
                        <button class="delete-file" data-id="${file.id}" data-path="${file.file_path}">❌</button>
                     </div>`;
        }
        container.innerHTML = html;
        document.querySelectorAll('.delete-file').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const fileId = btn.dataset.id;
                const filePath = btn.dataset.path;
                if (confirm('Удалить файл?')) {
                    await supabaseClient.storage.from('answer_sheets').remove([filePath]);
                    await supabaseClient.from('answer_sheets').delete().eq('id', fileId);
                    loadFilesList(assignmentId);
                }
            });
        });
    }

    document.querySelector('.close-modal').addEventListener('click', () => {
        document.getElementById('uploadModal').style.display = 'none';
    });
    window.addEventListener('click', (e) => {
        if (e.target === document.getElementById('uploadModal')) {
            document.getElementById('uploadModal').style.display = 'none';
        }
    });

    document.getElementById('logoutBtn').onclick = () => { sessionStorage.clear(); window.location.href = './index.html'; };
    loadDirectorData();
</script>
</body>
</html>
