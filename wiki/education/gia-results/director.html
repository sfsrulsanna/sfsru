<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель руководителя ППЭ — СФСРЮ</title>
    <link rel="stylesheet" href="../../../css/style.css">
    <link rel="stylesheet" href="gia-common.css">
    <style>
        .ppe-info-card { background: #f8f9fa; border-radius: 20px; padding: 1rem 1.5rem; margin-bottom: 2rem; border: 1px solid #e0e0e0; }
        .action-btn { background: #4a6fa5; color: white; border: none; border-radius: 40px; padding: 6px 16px; min-width: 130px; cursor: pointer; transition: 0.2s; }
        .action-btn:hover { transform: translateY(-2px); filter: brightness(0.95); }
        .send-review-btn { background: #28a745; color: white; border: none; border-radius: 40px; padding: 6px 16px; margin-top: 0.5rem; cursor: pointer; }
        .file-upload-area { border: 2px dashed #c44; border-radius: 20px; padding: 0.8rem; text-align: center; cursor: pointer; margin: 0.5rem 0; background: #fffaf0; }
        .file-upload-area:hover { background: #fff0e0; }
        .sheet-type { background: #f9f2f2; padding: 1rem; border-radius: 20px; margin-bottom: 1rem; }
        [contenteditable="true"] { background: #fff8e7; border-radius: 12px; padding: 2px 6px; min-width: 50px; display: inline-block; cursor: text; }
        [contenteditable="true"]:hover { background: #fff0c0; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ffcece; padding: 8px; vertical-align: top; }
        th { background: #ffe0e0; }
        .exam-item { margin-bottom: 6px; }
        .file-list { margin-top: 0.5rem; display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .file-item { background: #e8e8e8; border-radius: 20px; padding: 0.2rem 0.6rem; display: inline-flex; align-items: center; gap: 0.3rem; }
        .delete-file { background: none; border: none; color: red; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
<div class="gia-header">
    <div class="container">
        <h1>🏛 Панель руководителя ППЭ</h1>
        <div class="header-buttons"><a href="./index.html" class="header-btn" id="logoutBtn">🚪 Выйти</a></div>
    </div>
</div>
<main class="main-container">
    <div class="ppe-info-card" id="ppeInfo">Загрузка...</div>
    <div class="card">
        <h2>📝 Участники экзаменов в ППЭ</h2>
        <div id="participantsList" class="table-wrapper"></div>
    </div>
</main>

<div id="uploadModal" class="modal">
    <div class="modal-content" style="max-width: 800px;">
        <span class="close-modal">&times;</span>
        <div id="uploadModalBody"></div>
    </div>
</div>

<footer class="gia-footer"><p>© 2026 СФСРЮ. Все права защищены пролетариатом.</p></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://qeewwoklmjysactfhrum.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlZXd3b2tsbWp5c2FjdGZocnVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MTI2MTEsImV4cCI6MjA4NjQ4ODYxMX0.gWzqku1cS08v17kfJHJbOWbm-DRpzwQ9omlQsKxc96A';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { db: { schema: 'education_gia' } });

    (function checkDirector() {
        const user = JSON.parse(sessionStorage.getItem('gia_user') || '{}');
        if (user.role !== 'director') window.location.href = './index.html';
    })();
    let currentUser = JSON.parse(sessionStorage.getItem('gia_user'));
    let currentAssignments = [];

    function formatDate(dateStr) {
        if (!dateStr) return '—';
        const parts = dateStr.split('-');
        if (parts.length === 3) return `${parts[2]}.${parts[1]}.${parts[0]}`;
        return dateStr;
    }

    async function loadDirectorData() {
        try {
            const { data: examiner } = await supabaseClient
                .from('examiners')
                .select('ppe_id')
                .eq('personal_code', currentUser.personal_code)
                .eq('role', 'director')
                .single();
            if (!examiner?.ppe_id) {
                document.getElementById('ppeInfo').innerHTML = '<p>❌ Вы не назначены руководителем ППЭ.</p>';
                return;
            }
            const { data: ppe } = await supabaseClient.from('ppe').select('*').eq('id', examiner.ppe_id).single();
            document.getElementById('ppeInfo').innerHTML = `
                <p><strong>Код ППЭ:</strong> ${ppe.code} | <strong>Название:</strong> ${ppe.name} | <strong>Адрес:</strong> ${ppe.address || 'не указан'}</p>
                <p><strong>Типы ГИА:</strong> 9, 11, СПО, ВО, ГВЭ-9, ГВЭ-11, ГВЭ-СПО, ГВЭ-ВО</p>
            `;

            const { data: assignments } = await supabaseClient
                .from('exam_assignments')
                .select('*, registered(full_name, personal_code)')
                .eq('ppe_id', ppe.id)
                .order('exam_date');
            currentAssignments = assignments || [];
            if (!currentAssignments.length) {
                document.getElementById('participantsList').innerHTML = '<p>Нет назначенных экзаменов.</p>';
                return;
            }

            // Получаем result_id и варианты
            const resultIds = [];
            for (const a of assignments) {
                const { data: res } = await supabaseClient.from('resultats').select('id').eq('assignment_id', a.id).maybeSingle();
                if (res) resultIds.push(res.id);
            }
            let variantMap = {};
            if (resultIds.length) {
                const { data: details } = await supabaseClient.from('exam_details').select('result_id, variant').in('result_id', resultIds);
                if (details) details.forEach(d => { variantMap[d.result_id] = d.variant; });
            }

            // Группировка по участникам
            const participantsMap = new Map();
            for (const a of assignments) {
                const code = a.registered.personal_code;
                if (!participantsMap.has(code)) {
                    participantsMap.set(code, {
                        full_name: a.registered.full_name,
                        exams: [],
                        audience: a.audience || '',
                        place: a.place || ''
                    });
                }
                const { data: res } = await supabaseClient.from('resultats').select('id').eq('assignment_id', a.id).maybeSingle();
                const resultId = res?.id;
                const variant = resultId ? (variantMap[resultId] || '') : '';
                participantsMap.get(code).exams.push({
                    id: a.id,
                    subject: a.subject,
                    date: a.exam_date,
                    variant: variant,
                    resultId: resultId
                });
            }

            // Построение таблицы
            let html = `<table><thead><tr><th>Участник</th><th>Экзамены (предмет, дата, вариант)</th><th>Аудитория / Место</th><th>Действия</th></tr></thead><tbody>`;
            for (let [code, data] of participantsMap.entries()) {
                const examsHtml = data.exams.map(exam => {
                    const formattedDate = formatDate(exam.date);
                    return `<div class="exam-item">
                        ${exam.subject} (${formattedDate}) — вар. 
                        <span class="editable-variant" contenteditable="true" data-result-id="${exam.resultId || ''}" data-assignment-id="${exam.id}" data-pcode="${code}">${exam.variant || '?'}</span>
                    </div>`;
                }).join('');

                const safeCode = code.replace(/-/g, '');
                html += `<tr>
                    <td><strong>${data.full_name}</strong><br><small>${code}</small></td>
                    <td class="exam-list">${examsHtml}</td>
                    <td>
                        <span class="editable-audience" contenteditable="true" data-pcode="${code}" data-field="audience">${data.audience || '?'}</span> / 
                        <span class="editable-place" contenteditable="true" data-pcode="${code}" data-field="place">${data.place || '?'}</span>
                    </td>
                    <td><button class="action-btn upload" data-code="${code}">📤 Загрузить бланки</button></td>
                </tr>`;
            }
            html += `</tbody></table>`;
            document.getElementById('participantsList').innerHTML = html;

            // Обработчики для аудитории и места
            document.querySelectorAll('.editable-audience, .editable-place').forEach(el => {
                el.addEventListener('blur', async (e) => {
                    const pcode = e.target.dataset.pcode;
                    const field = e.target.dataset.field;
                    let newValue = e.target.innerText.trim();
                    if (newValue === '?' || newValue === '') newValue = null;
                    const toUpdate = currentAssignments.filter(a => a.registered.personal_code === pcode);
                    for (const ass of toUpdate) {
                        await supabaseClient.from('exam_assignments').update({ [field]: newValue }).eq('id', ass.id);
                    }
                });
            });

            // Обработчики для варианта (создаёт resultats и exam_details)
            document.querySelectorAll('.editable-variant').forEach(el => {
                el.addEventListener('blur', async (e) => {
                    let resultId = e.target.dataset.resultId;
                    const assignmentId = e.target.dataset.assignmentId;
                    let newVariant = e.target.innerText.trim();
                    if (newVariant === '?' || newVariant === '') newVariant = null;
                    if (!assignmentId) return;

                    // Если нет resultId, создаём запись в resultats
                    if (!resultId || resultId === 'null' || resultId === 'undefined') {
                        const { data: newResult, error: insertErr } = await supabaseClient
                            .from('resultats')
                            .insert({ assignment_id: parseInt(assignmentId), status: 'pending', details: {} })
                            .select('id')
                            .single();
                        if (insertErr) {
                            console.error('Ошибка создания resultats:', insertErr);
                            alert('Не удалось создать запись результата.');
                            return;
                        }
                        resultId = newResult.id;
                        e.target.dataset.resultId = resultId;
                    }

                    // Сохраняем вариант в exam_details (с проверкой существования)
                    const { data: existingDetail } = await supabaseClient
                        .from('exam_details')
                        .select('id')
                        .eq('result_id', parseInt(resultId))
                        .maybeSingle();

                    if (existingDetail) {
                        const { error: updateErr } = await supabaseClient
                            .from('exam_details')
                            .update({ variant: newVariant })
                            .eq('result_id', parseInt(resultId));
                        if (updateErr) console.error('Ошибка обновления варианта:', updateErr);
                    } else {
                        const { error: insertErr } = await supabaseClient
                            .from('exam_details')
                            .insert({ result_id: parseInt(resultId), variant: newVariant });
                        if (insertErr) console.error('Ошибка вставки варианта:', insertErr);
                    }
                });
            });

            // Кнопки загрузки бланков
            document.querySelectorAll('.action-btn.upload').forEach(btn => btn.addEventListener('click', () => showUploadModal(btn.dataset.code)));
        } catch (err) {
            console.error(err);
            document.getElementById('ppeInfo').innerHTML = '<p>Ошибка загрузки данных</p>';
        }
    }

    async function showUploadModal(personalCode) {
        const userAssignments = currentAssignments.filter(a => a.registered.personal_code === personalCode);
        const modal = document.getElementById('uploadModal');
        const modalBody = document.getElementById('uploadModalBody');
        let html = `<h3>📎 Загрузка бланков для ${userAssignments[0]?.registered.full_name}</h3>`;
        for (const ass of userAssignments) {
            const examDate = formatDate(ass.exam_date);
            html += `
                <div class="sheet-type">
                    <h4>${ass.subject} (${examDate})</h4>
                    <div><strong>Аудитория:</strong> ${ass.audience || 'не указана'} | <strong>Место:</strong> ${ass.place || 'не указано'}</div>
                    <div class="file-upload-area" data-assignment="${ass.id}" data-sheet-type="registration">📄 Бланк регистрации</div>
                    <div id="files-reg-${ass.id}" class="file-list"></div>
                    <div class="file-upload-area" data-assignment="${ass.id}" data-sheet-type="answer1">📝 Бланк ответов №1</div>
                    <div id="files-ans1-${ass.id}" class="file-list"></div>
                    <div class="file-upload-area" data-assignment="${ass.id}" data-sheet-type="answer2-1">📑 Бланк ответов №2 (лист 1)</div>
                    <div id="files-ans2-1-${ass.id}" class="file-list"></div>
                    <div class="file-upload-area" data-assignment="${ass.id}" data-sheet-type="answer2-2">📑 Бланк ответов №2 (лист 2)</div>
                    <div id="files-ans2-2-${ass.id}" class="file-list"></div>
                    <div class="file-upload-area" data-assignment="${ass.id}" data-sheet-type="extra-c">📎 Дополнительный бланк C</div>
                    <div id="files-extra-${ass.id}" class="file-list"></div>
                    <div class="file-upload-area" data-assignment="${ass.id}" data-sheet-type="audio-d">🎤 Аудиозапись</div>
                    <div id="files-audio-${ass.id}" class="file-list"></div>
                    <button class="send-review-btn" data-assignment-id="${ass.id}">📨 Отправить на проверку</button>
                </div>
            `;
        }
        modalBody.innerHTML = html;
        modal.style.display = 'flex';
        attachUploadHandlers();

        document.querySelectorAll('.send-review-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const assignmentId = parseInt(btn.dataset.assignmentId);
                let { data: result, error } = await supabaseClient
                    .from('resultats')
                    .select('id')
                    .eq('assignment_id', assignmentId)
                    .maybeSingle();

                if (error) {
                    alert('Ошибка при поиске результата: ' + error.message);
                    return;
                }

                if (result) {
                    const { error: updateErr } = await supabaseClient
                        .from('resultats')
                        .update({ status: 'processing' })
                        .eq('id', result.id);
                    if (updateErr) {
                        alert('Ошибка обновления статуса: ' + updateErr.message);
                        return;
                    }
                } else {
                    const { error: insertErr } = await supabaseClient
                        .from('resultats')
                        .insert({ assignment_id: assignmentId, status: 'processing', details: {} });
                    if (insertErr) {
                        alert('Ошибка создания результата: ' + insertErr.message);
                        return;
                    }
                }

                alert('✅ Экзамен отправлен на проверку эксперту');
                btn.disabled = true;
                btn.textContent = '✓ Отправлено';
                btn.style.background = '#6c757d';
            });
        });
    }

    function attachUploadHandlers() {
        document.querySelectorAll('.file-upload-area').forEach(area => {
            const assignmentId = area.dataset.assignment;
            const sheetType = area.dataset.sheetType;
            const input = document.createElement('input');
            input.type = 'file';
            input.multiple = (sheetType === 'extra-c' || sheetType === 'audio-d');
            input.accept = sheetType === 'audio-d' ? 'audio/*' : '.pdf,.jpg,.jpeg,.png';
            area.appendChild(input);
            input.style.display = 'none';
            area.addEventListener('click', () => input.click());
            input.addEventListener('change', async (e) => {
                const files = Array.from(e.target.files);
                for (const file of files) await uploadFile(assignmentId, sheetType, file);
                input.value = '';
            });
            area.addEventListener('dragover', e => { e.preventDefault(); area.style.background = '#e8f0fe'; });
            area.addEventListener('dragleave', () => { area.style.background = ''; });
            area.addEventListener('drop', async e => {
                e.preventDefault();
                area.style.background = '';
                const files = Array.from(e.dataTransfer.files);
                for (const file of files) await uploadFile(assignmentId, sheetType, file);
            });
            loadFilesForAssignment(assignmentId, sheetType);
        });
    }

    async function uploadFile(assignmentId, sheetType, file) {
        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}_${Math.random().toString(36).substr(2, 8)}.${fileExt}`;
        const folder = `assignment_${assignmentId}/${sheetType}`;
        const filePath = `${folder}/${fileName}`;
        const { error: uploadErr } = await supabaseClient.storage.from('answer_sheets').upload(filePath, file);
        if (uploadErr) { alert('Ошибка загрузки: ' + uploadErr.message); return; }
        const { error: dbErr } = await supabaseClient.from('answer_sheets').insert([{
            assignment_id: assignmentId,
            file_path: filePath,
            file_name: file.name,
            file_type: sheetType,
            uploaded_by: currentUser.personal_code
        }]);
        if (dbErr) {
            alert('Ошибка сохранения информации о файле');
            await supabaseClient.storage.from('answer_sheets').remove([filePath]);
        } else {
            alert(`Файл ${file.name} загружен`);
            loadFilesForAssignment(assignmentId, sheetType);
        }
    }

    async function loadFilesForAssignment(assignmentId, sheetType) {
        const { data } = await supabaseClient.from('answer_sheets').select('*').eq('assignment_id', assignmentId).eq('file_type', sheetType);
        const typeMap = { registration: 'reg', answer1: 'ans1', 'answer2-1': 'ans2-1', 'answer2-2': 'ans2-2', 'extra-c': 'extra', 'audio-d': 'audio' };
        const container = document.getElementById(`files-${typeMap[sheetType]}-${assignmentId}`);
        if (!container) return;
        if (!data?.length) { container.innerHTML = '<span style="color:#999;">Нет файлов</span>'; return; }
        let html = '';
        for (const f of data) {
            const url = supabaseClient.storage.from('answer_sheets').getPublicUrl(f.file_path).data.publicUrl;
            html += `<div class="file-item"><a href="${url}" download>📄 ${f.file_name}</a><button class="delete-file" data-id="${f.id}" data-path="${f.file_path}">❌</button></div>`;
        }
        container.innerHTML = html;
        document.querySelectorAll('.delete-file').forEach(btn => {
            btn.addEventListener('click', async () => {
                if (confirm('Удалить файл?')) {
                    await supabaseClient.storage.from('answer_sheets').remove([btn.dataset.path]);
                    await supabaseClient.from('answer_sheets').delete().eq('id', btn.dataset.id);
                    loadFilesForAssignment(assignmentId, sheetType);
                }
            });
        });
    }

    document.querySelector('.close-modal').addEventListener('click', () => {
        document.getElementById('uploadModal').style.display = 'none';
    });
    window.addEventListener('click', (e) => {
        if (e.target === document.getElementById('uploadModal')) document.getElementById('uploadModal').style.display = 'none';
    });
    document.getElementById('logoutBtn').onclick = () => { sessionStorage.clear(); window.location.href = './index.html'; };
    loadDirectorData();
</script>
</body>
</html>
