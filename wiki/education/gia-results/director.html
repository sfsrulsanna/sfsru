<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель руководителя ППЭ — СФСРЮ</title>
    <link rel="stylesheet" href="../../../css/style.css">
    <link rel="stylesheet" href="gia-common.css">
    <style>
        .ppe-info {
            background: #f0f8ff;
            border-radius: 24px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
        .upload-area {
            border: 2px dashed #ffcece;
            border-radius: 20px;
            padding: 1rem;
            text-align: center;
            margin-top: 0.5rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .upload-area:hover { background: #fff5f5; }
        .file-list { margin-top: 0.5rem; }
        .file-item {
            background: #f0f0f0;
            border-radius: 16px;
            padding: 0.3rem 0.6rem;
            margin: 0.2rem;
            display: inline-block;
        }
        .delete-file {
            background: none;
            border: none;
            color: red;
            cursor: pointer;
            margin-left: 0.5rem;
        }
    </style>
</head>
<body>
<div class="gia-header">
    <div class="container">
        <h1>🏛 Панель руководителя ППЭ</h1>
        <div class="header-buttons"><a href="./index.html" class="header-btn" id="logoutBtn">🚪 Выйти</a></div>
    </div>
</div>
<main class="main-container">
    <div class="card">
        <h2>📋 Информация о ППЭ</h2>
        <div id="ppeInfo" class="ppe-info">Загрузка...</div>
    </div>

    <div class="card">
        <h2>📝 Список участников экзаменов в ППЭ</h2>
        <div id="participantsList" class="table-wrapper"></div>
    </div>
</main>

<!-- Модальное окно для загрузки бланков -->
<div id="uploadModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div id="uploadModalBody"></div>
    </div>
</div>

<footer class="gia-footer"><p>© 2026 СФСРЮ. Все права защищены пролетариатом.</p></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://qeewwoklmjysactfhrum.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlZXd3b2tsbWp5c2FjdGZocnVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MTI2MTEsImV4cCI6MjA4NjQ4ODYxMX0.gWzqku1cS08v17kfJHJbOWbm-DRpzwQ9omlQsKxc96A';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { db: { schema: 'education_gia' } });

    // Проверка роли (только director)
    (function checkDirector() {
        const user = JSON.parse(sessionStorage.getItem('gia_user') || '{}');
        if (user.role !== 'director') window.location.href = './index.html';
    })();

    let currentUser = JSON.parse(sessionStorage.getItem('gia_user'));
    let currentPPE = null;

    async function loadDirectorData() {
        // Находим ППЭ, где currentUser является руководителем
        const { data: examinerData, error: examError } = await supabaseClient
            .from('examiners')
            .select('ppe_id')
            .eq('personal_code', currentUser.personal_code)
            .eq('role', 'director')
            .single();
        if (examError || !examinerData || !examinerData.ppe_id) {
            document.getElementById('ppeInfo').innerHTML = '<p>Вы не назначены руководителем ни одного ППЭ. Обратитесь к администратору.</p>';
            return;
        }
        const ppeId = examinerData.ppe_id;
        // Загружаем данные ППЭ
        const { data: ppe, error: ppeError } = await supabaseClient
            .from('ppe')
            .select('*')
            .eq('id', ppeId)
            .single();
        if (ppeError) {
            document.getElementById('ppeInfo').innerHTML = '<p>Ошибка загрузки ППЭ.</p>';
            return;
        }
        currentPPE = ppe;
        document.getElementById('ppeInfo').innerHTML = `
            <div><strong>Код ППЭ:</strong> ${ppe.code}</div>
            <div><strong>Название:</strong> ${ppe.name}</div>
            <div><strong>Адрес:</strong> ${ppe.address || 'не указан'}</div>
            <div><strong>Принимаемые типы ГИА:</strong> 9, 11, СПО, ВО, ГВЭ (все формы)</div>
        `;

        // Загружаем список участников, у которых есть экзамены в этом ППЭ
        const { data: assignments, error: assignError } = await supabaseClient
            .from('exam_assignments')
            .select('*, registered(full_name, personal_code)')
            .eq('ppe_id', ppeId)
            .order('exam_date', { ascending: true });
        if (assignError) {
            document.getElementById('participantsList').innerHTML = '<p>Ошибка загрузки участников.</p>';
            return;
        }
        if (!assignments.length) {
            document.getElementById('participantsList').innerHTML = '<p>Нет назначенных экзаменов в этом ППЭ.</p>';
            return;
        }
        // Группируем по участникам
        const participantsMap = new Map();
        assignments.forEach(ass => {
            const code = ass.registered.personal_code;
            if (!participantsMap.has(code)) {
                participantsMap.set(code, {
                    full_name: ass.registered.full_name,
                    exams: []
                });
            }
            participantsMap.get(code).exams.push({
                id: ass.id,
                subject: ass.subject,
                exam_date: ass.exam_date,
                status: ass.status
            });
        });
        let html = `<table><thead><tr><th>Участник</th><th>Экзамены</th><th>Действия</th></tr></thead><tbody>`;
        for (let [code, data] of participantsMap.entries()) {
            const examsList = data.exams.map(e => `${e.subject} (${new Date(e.exam_date).toLocaleDateString('ru-RU')})`).join(', ');
            html += `<tr>
                <td>${data.full_name} (${code})</td>
                <td>${examsList}</td>
                <td><button class="upload-btn" data-personal-code="${code}">📤 Загрузить бланки</button></td>
            </tr>`;
        }
        html += `</tbody></tr>`;
        document.getElementById('participantsList').innerHTML = html;
        // Добавляем обработчики на кнопки загрузки
        document.querySelectorAll('.upload-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const personalCode = btn.dataset.personalCode;
                showUploadModal(personalCode, assignments.filter(a => a.registered.personal_code === personalCode));
            });
        });
    }

    async function showUploadModal(personalCode, userAssignments) {
        const modal = document.getElementById('uploadModal');
        const modalBody = document.getElementById('uploadModalBody');
        let examsHtml = '<h3>Выберите экзамен для загрузки бланков</h3>';
        for (const ass of userAssignments) {
            const examDate = new Date(ass.exam_date).toLocaleDateString('ru-RU');
            examsHtml += `
                <div class="exam-item" style="margin-bottom: 1rem; border:1px solid #ccc; padding:0.5rem; border-radius:16px;">
                    <strong>${ass.subject}</strong> (${examDate})<br>
                    <div class="upload-area" data-assignment-id="${ass.id}" data-personal-code="${personalCode}">
                        📎 Нажмите или перетащите файлы для загрузки (PDF, JPG, PNG)
                        <input type="file" multiple accept=".pdf,.jpg,.jpeg,.png" style="display:none;">
                    </div>
                    <div id="files-${ass.id}" class="file-list"></div>
                </div>
            `;
        }
        modalBody.innerHTML = examsHtml;
        modal.style.display = 'flex';

        // Настраиваем загрузку для каждого экзамена
        document.querySelectorAll('.upload-area').forEach(area => {
            const assignmentId = area.dataset.assignmentId;
            const fileInput = area.querySelector('input[type="file"]');
            area.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', async (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;
                for (const file of files) {
                    await uploadFile(assignmentId, file);
                }
                await loadFilesList(assignmentId);
                e.target.value = '';
            });
            area.addEventListener('dragover', (e) => { e.preventDefault(); area.style.background = '#e0e0e0'; });
            area.addEventListener('dragleave', () => { area.style.background = ''; });
            area.addEventListener('drop', async (e) => {
                e.preventDefault();
                area.style.background = '';
                const files = Array.from(e.dataTransfer.files);
                for (const file of files) {
                    await uploadFile(assignmentId, file);
                }
                await loadFilesList(assignmentId);
            });
            loadFilesList(assignmentId);
        });
    }

    async function uploadFile(assignmentId, file) {
        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
        const filePath = `answer_sheets/assignment_${assignmentId}/${fileName}`;
        const { error: uploadError } = await supabaseClient.storage
            .from('answer_sheets')
            .upload(filePath, file);
        if (uploadError) {
            alert('Ошибка загрузки файла: ' + uploadError.message);
            return;
        }
        const { error: dbError } = await supabaseClient
            .from('answer_sheets')
            .insert([{
                assignment_id: assignmentId,
                file_path: filePath,
                file_name: file.name,
                file_type: file.type,
                uploaded_by: currentUser.personal_code
            }]);
        if (dbError) {
            console.error(dbError);
            alert('Ошибка сохранения информации о файле');
        } else {
            alert(`Файл ${file.name} загружен`);
        }
    }

    async function loadFilesList(assignmentId) {
        const { data, error } = await supabaseClient
            .from('answer_sheets')
            .select('*')
            .eq('assignment_id', assignmentId);
        if (error) return;
        const container = document.getElementById(`files-${assignmentId}`);
        if (!container) return;
        if (data.length === 0) {
            container.innerHTML = '<span class="file-item">Нет загруженных бланков</span>';
            return;
        }
        let html = '';
        for (const file of data) {
            const publicUrl = supabaseClient.storage.from('answer_sheets').getPublicUrl(file.file_path).data.publicUrl;
            html += `<div class="file-item">
                        <a href="${publicUrl}" target="_blank">📄 ${file.file_name}</a>
                        <button class="delete-file" data-id="${file.id}">❌</button>
                     </div>`;
        }
        container.innerHTML = html;
        document.querySelectorAll('.delete-file').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const fileId = btn.dataset.id;
                if (confirm('Удалить файл?')) {
                    const { data: fileData } = await supabaseClient.from('answer_sheets').select('file_path').eq('id', fileId).single();
                    if (fileData) {
                        await supabaseClient.storage.from('answer_sheets').remove([fileData.file_path]);
                        await supabaseClient.from('answer_sheets').delete().eq('id', fileId);
                        loadFilesList(assignmentId);
                    }
                }
            });
        });
    }

    document.querySelector('.close-modal').addEventListener('click', () => {
        document.getElementById('uploadModal').style.display = 'none';
    });
    window.addEventListener('click', (e) => {
        if (e.target === document.getElementById('uploadModal')) {
            document.getElementById('uploadModal').style.display = 'none';
        }
    });

    document.getElementById('logoutBtn').onclick = () => { sessionStorage.clear(); window.location.href = './index.html'; };
    loadDirectorData();
</script>
</body>
</html>
