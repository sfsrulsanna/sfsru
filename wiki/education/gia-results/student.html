<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Личный кабинет участника ГИА — СФСРЮ</title>
  <link rel="stylesheet" href="../../../css/style.css">
  <link rel="stylesheet" href="gia-common.css">
  <style>
    .info-vertical {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      background: #fffaf5;
      padding: 1.2rem;
      border-radius: 24px;
      margin-bottom: 1.5rem;
    }
    .info-item {
      border-bottom: 1px dashed #ffe0e0;
      padding-bottom: 0.4rem;
    }
    .info-label {
      font-weight: 700;
      color: #a33;
      display: inline-block;
      width: 180px;
    }
    .tasks-table, .results-table, .exams-table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      font-size: 0.85rem;
    }
    .tasks-table th, .tasks-table td,
    .results-table th, .results-table td,
    .exams-table th, .exams-table td {
      border: 1px solid #ffcece;
      padding: 8px 6px;
      text-align: center;
      background: white;
    }
    .tasks-table th, .results-table th, .exams-table th {
      background: #ffe0e0;
      font-weight: 600;
    }
    .type-block {
      margin: 1rem 0;
      padding: 0.75rem;
      background: #fef7e0;
      border-radius: 20px;
    }
    .file-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-top: 0.5rem;
    }
    .file-list a {
      background: #e0e0ff;
      padding: 5px 12px;
      border-radius: 30px;
      text-decoration: none;
      color: #225;
      font-weight: 500;
    }
    .appeal-btn {
      background: #ffaa44;
      color: #552200;
      border: none;
      border-radius: 40px;
      padding: 6px 16px;
      cursor: pointer;
      margin-top: 1rem;
    }
    hr { margin: 1rem 0; }
    .modal-content { max-width: 950px; }
  </style>
</head>
<body>
<div class="gia-header">
  <div class="container">
    <h1>📘 Личный кабинет участника ГИА</h1>
    <div class="header-buttons"><a href="./index.html" class="header-btn" id="logoutBtn">🚪 Выйти</a></div>
  </div>
</div>

<main class="main-container">
  <div class="card">
    <h2>📋 Данные об участнике экзаменов</h2>
    <div id="userInfo" class="info-vertical"></div>
    <h3>📅 Назначенные экзамены</h3>
    <div id="examsTable"></div>
  </div>
  <div class="card">
    <h2>📊 Результаты экзаменов</h2>
    <div id="resultsTable"></div>
  </div>
</main>

<div id="detailModal" class="modal">
  <div class="modal-content">
    <span class="close-modal">&times;</span>
    <div id="modalBody"></div>
  </div>
</div>

<footer class="gia-footer"><p>© 2026 СФСРЮ. Все права защищены пролетариатом.</p></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://qeewwoklmjysactfhrum.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlZXd3b2tsbWp5c2FjdGZocnVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MTI2MTEsImV4cCI6MjA4NjQ4ODYxMX0.gWzqku1cS08v17kfJHJbOWbm-DRpzwQ9omlQsKxc96A';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { db: { schema: 'education_gia' } });

  // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
  function formatDate(dateStr) {
    if (!dateStr) return '—';
    const parts = dateStr.split('-');
    if (parts.length === 3) return `${parts[2]}.${parts[1]}.${parts[0]}`;
    return dateStr;
  }
  function formatValue(v) {
    return (v === null || v === undefined || v === '') ? '—' : v;
  }
  function statusText(status) {
    const map = {
      'active': 'Активный результат',
      'processing': 'Обработка не завершена',
      'annulled': 'Результат аннулирован',
      'hidden': 'Результат скрыт',
      'appeal': 'Апелляция'
    };
    return map[status] || status;
  }
  function getFileUrl(path) {
    if (!path) return '#';
    const { data } = supabaseClient.storage.from('gia_files').getPublicUrl(path);
    return data.publicUrl;
  }

  // ========== ГЛОБАЛЬНЫЕ ДАННЫЕ ==========
  let currentUser = null;
  try {
    currentUser = JSON.parse(sessionStorage.getItem('gia_user'));
    if (!currentUser || currentUser.role !== 'student') window.location.href = './index.html';
  } catch(e) { window.location.href = './index.html'; }
  const personalCode = currentUser.personal_code;

  // ========== ОСНОВНАЯ ЗАГРУЗКА ==========
  async function loadData() {
    try {
      // 1. Данные участника
      const { data: user, error: uErr } = await supabaseClient
        .from('registered')
        .select('full_name, municipality, educational_org, class_name, birth_date, gia_type')
        .eq('personal_code', personalCode).single();
      if (uErr) throw uErr;
      document.getElementById('userInfo').innerHTML = `
        <div class="info-item"><span class="info-label">Муниципалитет:</span> ${formatValue(user.municipality)}</div>
        <div class="info-item"><span class="info-label">Образовательная организация:</span> ${formatValue(user.educational_org)}</div>
        <div class="info-item"><span class="info-label">Класс:</span> ${formatValue(user.class_name)}</div>
        <div class="info-item"><span class="info-label">ФИО:</span> ${user.full_name}</div>
        <div class="info-item"><span class="info-label">Дата рождения:</span> ${formatDate(user.birth_date)}</div>
        <div class="info-item"><span class="info-label">Тип ГИА:</span> ${user.gia_type}</div>
      `;

      // 2. Назначенные экзамены
      const { data: assignments, error: aErr } = await supabaseClient
        .from('exam_assignments')
        .select('*')
        .eq('personal_code', personalCode)
        .order('exam_date', { ascending: true });
      if (aErr) throw aErr;
      let examsHtml = '<table class="exams-table"><thead><tr><th>№</th><th>Экзамен</th><th>ППЭ</th><th>Аудитория*</th><th>Место*</th></tr></thead><tbody>';
      if (assignments.length) {
        assignments.forEach((ex, idx) => {
          examsHtml += `<tr>
            <td>${idx+1}</td>
            <td>${ex.subject}, ${formatDate(ex.exam_date)}, ${ex.exam_time}</td>
            <td>${formatValue(ex.ppe_name)}</td>
            <td>${formatValue(ex.audience)}</td>
            <td>${formatValue(ex.place)}</td>
          </tr>`;
        });
      } else {
        examsHtml += '<tr><td colspan="5">Нет назначенных экзаменов</td></tr>';
      }
      examsHtml += '</tbody></table><p class="form-hint">* Данные об аудитории и месте уточняются на входе в ППЭ.</p>';
      document.getElementById('examsTable').innerHTML = examsHtml;

      // 3. Результаты экзаменов
      if (!assignments.length) {
        document.getElementById('resultsTable').innerHTML = '<p>Нет результатов</p>';
        return;
      }
      const { data: results, error: rErr } = await supabaseClient
        .from('resultats')
        .select('*, exam_assignments!inner(subject, exam_date, ppe_name, audience, place)')
        .in('assignment_id', assignments.map(a => a.id));
      if (rErr) throw rErr;
      if (!results.length) {
        document.getElementById('resultsTable').innerHTML = '<p>Результаты ещё не опубликованы.</p>';
        return;
      }

      // Соберём вторичные баллы из exam_details
      const resultIds = results.map(r => r.id);
      let secMap = {};
      if (resultIds.length) {
        const { data: details } = await supabaseClient
          .from('exam_details')
          .select('result_id, secondary_score')
          .in('result_id', resultIds);
        if (details) details.forEach(d => { secMap[d.result_id] = d.secondary_score; });
      }

      let resHtml = '<table class="results-table"><thead><tr><th>#</th><th>Экзамен</th><th>Вариант</th><th>Первичный балл</th><th>Вторичный балл</th><th>Отметка</th><th>Статус</th><th>Апелляция</th><th>Подробно</th></tr></thead><tbody>';
      results.forEach((res, idx) => {
        const examSubject = res.exam_assignments.subject;
        const examDate = formatDate(res.exam_assignments.exam_date);
        resHtml += `<tr>
          <td>${idx+1}</td>
          <td>${examSubject}, ${examDate}</td>
          <td>${res.variant || '—'}</td>
          <td>${res.score !== null ? res.score : '—'}</td>
          <td>${secMap[res.id] ?? '—'}</td>
          <td>${res.grade || '—'}</td>
          <td>${statusText(res.status)}</td>
          <td>${res.appeal || 'нет'}</td>
          <td><button class="details-btn" data-result-id="${res.id}" data-assignment-id="${res.assignment_id}">👁️ Просмотреть</button></td>
        </tr>`;
      });
      resHtml += '</tbody></table>';
      document.getElementById('resultsTable').innerHTML = resHtml;

      document.querySelectorAll('.details-btn').forEach(btn => {
        btn.addEventListener('click', () => showModal(btn.dataset.resultId, btn.dataset.assignmentId));
      });
    } catch (err) {
      console.error(err);
      document.getElementById('examsTable').innerHTML = '<p style="color:red;">Ошибка загрузки данных</p>';
    }
  }

  // ========== АПЕЛЛЯЦИЯ ==========
  async function submitAppeal(resultId, currentStatus) {
    if (currentStatus === 'appeal') {
      alert('Апелляция уже подана.');
      return;
    }
    const reason = prompt('Укажите причину апелляции:');
    if (!reason?.trim()) return;
    const { error: insErr } = await supabaseClient.from('appeals').insert([{
      result_id: resultId,
      student_personal_code: personalCode,
      reason: reason.trim(),
      status: 'pending'
    }]);
    if (insErr) {
      alert('Ошибка подачи апелляции: ' + insErr.message);
      return;
    }
    const { error: updErr } = await supabaseClient
      .from('resultats')
      .update({ status: 'appeal', appeal: 'подана' })
      .eq('id', resultId);
    if (updErr) alert('Ошибка обновления статуса: ' + updErr.message);
    else alert('Апелляция подана. Статус обновлён.');
    loadData(); // перезагрузить таблицу
  }

  // ========== МОДАЛЬНОЕ ОКНО С ДЕТАЛЯМИ ==========
  async function showModal(resultId, assignmentId) {
    // Загружаем детали из exam_details
    const { data: details, error: dErr } = await supabaseClient
      .from('exam_details')
      .select('*')
      .eq('result_id', resultId)
      .maybeSingle();
    if (dErr || !details) {
      alert('Детали экзамена не найдены');
      return;
    }
    // Основная информация об экзамене
    const { data: assign, error: aErr } = await supabaseClient
      .from('exam_assignments')
      .select('subject, exam_date, ppe_name, audience, place')
      .eq('id', assignmentId)
      .single();
    if (aErr) return;

    // Получаем текущий статус для кнопки апелляции
    const { data: resStatus } = await supabaseClient
      .from('resultats')
      .select('status')
      .eq('id', resultId)
      .single();
    const canAppeal = resStatus?.status === 'active';

    // Таблица кратких ответов
    let shortHtml = '';
    if (details.short_answers && details.short_answers.length) {
      shortHtml = `
        <div><strong>📝 Ответы на задания с кратким ответом</strong></div>
        <table class="tasks-table">
          <thead><tr><th>Задание</th><th>Ответ</th><th>Балл</th></tr></thead>
          <tbody>
            ${details.short_answers.map(item => `
              <tr><td>${item.num} ${item.type ? `(${item.type})` : ''}</td><td>${item.answer ?? '—'}</td><td>${item.score || ''}</td></tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    let typeBhtml = details.type_b ? `<div class="type-block"><strong>📌 Задания типа B</strong><br>${details.type_b} ${details.type_b_score || ''}</div>` : '';
    let typeChtml = details.type_c ? `<div class="type-block"><strong>📌 Задания типа C</strong><br>${details.type_c} ${details.type_c_score || ''}</div>` : '';
    let typeDhtml = '';
    if (details.type_d_score && details.type_d_score !== '0' && details.type_d_score !== 0) {
      typeDhtml = `<div class="type-block"><strong>🎤 Задания типа D (устная часть)</strong><br>${details.type_d_score}</div>`;
    }

    // Бланки (из поля files, которое может быть массивом путей в storage)
    let filesHtml = '';
    if (details.files && Array.isArray(details.files) && details.files.length) {
      const labels = ['Бланк ответов №1', 'Бланк ответов №2 лист 1', 'Бланк ответов №2 лист 2', 'Дополнительный бланк C'];
      filesHtml = '<div><strong>📎 Бланки:</strong><div class="file-list">';
      details.files.forEach((path, idx) => {
        const url = getFileUrl(path);
        const label = labels[idx] || `Файл ${idx+1}`;
        filesHtml += `<a href="${url}" target="_blank" download>📄 ${label}</a>`;
      });
      filesHtml += '</div></div>';
    }

    const appealButton = canAppeal
      ? `<button class="appeal-btn" id="appealBtn">⚖️ Подать апелляцию</button>`
      : '';

    const modalHtml = `
      <h3>🔍 Подробно об экзамене</h3>
      <div><strong>Экзамен:</strong> ${assign.subject}, ${formatDate(assign.exam_date)}</div>
      <div><strong>ППЭ:</strong> ${formatValue(assign.ppe_name)}</div>
      <div><strong>Аудитория:</strong> ${formatValue(assign.audience)}</div>
      <div><strong>Место:</strong> ${formatValue(assign.place)}</div>
      <div><strong>Вариант:</strong> ${formatValue(details.variant)}</div>
      <hr>
      ${shortHtml}
      ${typeBhtml}
      ${typeChtml}
      ${typeDhtml}
      <div><strong>🎯 Первичный балл:</strong> ${details.primary_score ?? '—'}</div>
      <div><strong>🎯 Вторичный балл:</strong> ${details.secondary_score ?? '—'}</div>
      <div><strong>⭐ Отметка (результат):</strong> ${details.grade || '—'}</div>
      ${filesHtml}
      ${appealButton}
    `;
    const modal = document.getElementById('detailModal');
    document.getElementById('modalBody').innerHTML = modalHtml;
    modal.style.display = 'flex';
    if (document.getElementById('appealBtn')) {
      document.getElementById('appealBtn').onclick = () => submitAppeal(resultId, resStatus?.status);
    }
  }

  // Закрытие модалки
  document.querySelector('.close-modal').addEventListener('click', () => {
    document.getElementById('detailModal').style.display = 'none';
  });
  window.addEventListener('click', (e) => {
    if (e.target === document.getElementById('detailModal')) document.getElementById('detailModal').style.display = 'none';
  });
  document.getElementById('logoutBtn').addEventListener('click', (e) => {
    e.preventDefault();
    sessionStorage.clear();
    window.location.href = './index.html';
  });

  loadData();
</script>
</body>
</html>
