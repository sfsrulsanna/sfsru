<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кабинет участника ГИА — СФСРЮ</title>
  <link rel="stylesheet" href="../../../css/style.css">
  <link rel="stylesheet" href="gia-common.css">
  <style>
    .info-vertical {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      background: #fffaf5;
      padding: 1.2rem;
      border-radius: 24px;
      margin-bottom: 1.5rem;
    }
    .info-item {
      font-size: 1rem;
      border-bottom: 1px dashed #ffe0e0;
      padding-bottom: 0.4rem;
    }
    .info-label {
      font-weight: 700;
      color: #a33;
      display: inline-block;
      width: 180px;
    }
    @media (max-width: 600px) { .info-label { width: 140px; } }
    .tasks-table {
      width: 100%;
      border-collapse: collapse;
      margin: 0.5rem 0;
    }
    .tasks-table th, .tasks-table td {
      border: 1px solid #ffcece;
      padding: 6px 8px;
      text-align: center;
      background: white;
    }
    .tasks-table th { background: #ffe0e0; font-weight: 600; }
    .appeal-btn {
      background: #ffaa44;
      color: #552200;
      border: none;
      border-radius: 40px;
      padding: 8px 20px;
      margin-top: 1rem;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
    }
    .appeal-btn:hover { background: #ff9933; transform: scale(1.02); }
    .hidden { display: none; }
  </style>
</head>
<body>
<div class="gia-header">
  <div class="container">
    <h1>📘 Личный кабинет участника ГИА</h1>
    <div class="header-buttons">
      <a href="./index.html" class="header-btn" id="logoutBtn">🚪 Выйти</a>
    </div>
  </div>
</div>

<main class="main-container">
  <div class="card">
    <h2>📋 Данные об участнике экзаменов</h2>
    <div id="userInfo" class="info-vertical"></div>
    <h3>📅 Назначенные экзамены</h3>
    <div id="examsTable" class="table-wrapper"></div>
  </div>

  <div class="card">
    <h2>📊 Результаты экзаменов</h2>
    <div id="resultsTable" class="table-wrapper"></div>
  </div>
</main>

<footer class="gia-footer">
  <p>© 2026 СФСРЮ. Все права защищены пролетариатом.</p>
  <p>Телефон: +7 (993) 609-81-26 | Почта: <a href="mailto:sfsr.ulsanna@gmail.com">sfsr.ulsanna@gmail.com</a></p>
</footer>

<div id="detailModal" class="modal">
  <div class="modal-content">
    <span class="close-modal">&times;</span>
    <div id="modalBody"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://qeewwoklmjysactfhrum.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlZXd3b2tsbWp5c2FjdGZocnVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MTI2MTEsImV4cCI6MjA4NjQ4ODYxMX0.gWzqku1cS08v17kfJHJbOWbm-DRpzwQ9omlQsKxc96A';

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    db: { schema: 'education_gia' }
  });

  function getFileUrl(filePath) {
    if (!filePath) return '#';
    const { data } = supabaseClient.storage.from('gia_files').getPublicUrl(filePath);
    return data.publicUrl;
  }

  function formatDate(dateStr) {
    if (!dateStr) return '—';
    const date = new Date(dateStr);
    if (isNaN(date.getTime())) return dateStr;
    const day = date.getDate().toString().padStart(2, '0');
    const month = (date.getMonth() + 1).toString().padStart(2, '0');
    const year = date.getFullYear();
    return `${day}.${month}.${year}`;
  }

  function statusText(status) {
    const map = {
      'active': 'Активный результат',
      'processing': 'Обработка не завершена',
      'annulled': 'Результат аннулирован',
      'hidden': 'Результат скрыт',
      'appeal': 'Апелляция'
    };
    return map[status] || status;
  }

  let currentUser = null;
  try {
    currentUser = JSON.parse(sessionStorage.getItem('gia_user'));
    if (!currentUser || currentUser.role !== 'student') window.location.href = './index.html';
  } catch(e) { window.location.href = './index.html'; }

  const personalCode = currentUser.personal_code;

  async function loadData() {
    try {
      const { data: userData, error: userErr } = await supabaseClient
        .from('registered')
        .select('full_name, municipality, educational_org, class_name, birth_date, gia_type')
        .eq('personal_code', personalCode)
        .single();
      if (userErr) throw userErr;
      renderUserInfo(userData);

      const { data: assignments, error: assignErr } = await supabaseClient
        .from('exam_assignments')
        .select('*')
        .eq('personal_code', personalCode)
        .order('exam_date', { ascending: true });
      if (assignErr) throw assignErr;
      renderExamsTable(assignments);

      if (assignments.length) {
        const { data: results, error: resErr } = await supabaseClient
          .from('resultats')
          .select('*, exam_assignments!inner(subject, exam_date, ppe_name, audience)')
          .in('assignment_id', assignments.map(a => a.id));
        if (resErr) throw resErr;
        renderResultsTable(results);
      } else {
        document.getElementById('resultsTable').innerHTML = '<p>Нет данных о результатах.</p>';
      }
    } catch(err) {
      console.error(err);
      document.getElementById('examsTable').innerHTML = '<p style="color:red;">Ошибка загрузки. Проверьте подключение к базе.</p>';
    }
  }

  function renderUserInfo(user) {
    document.getElementById('userInfo').innerHTML = `
      <div class="info-item"><span class="info-label">Муниципалитет:</span> ${user.municipality || '—'}</div>
      <div class="info-item"><span class="info-label">Образовательная организация:</span> ${user.educational_org || '—'}</div>
      <div class="info-item"><span class="info-label">Класс:</span> ${user.class_name || '—'}</div>
      <div class="info-item"><span class="info-label">ФИО:</span> ${user.full_name}</div>
      <div class="info-item"><span class="info-label">Дата рождения:</span> ${formatDate(user.birth_date)}</div>
      <div class="info-item"><span class="info-label">Тип ГИА:</span> ${user.gia_type}</div>
    `;
  }

  function renderExamsTable(assignments) {
    if (!assignments.length) {
      document.getElementById('examsTable').innerHTML = '<p>Нет назначенных экзаменов.</p>';
      return;
    }
    let html = '<table class="exams-table"><thead><tr><th>№</th><th>Экзамен</th><th>ППЭ</th><th>Аудитория*</th><th>Место*</th></tr></thead><tbody>';
    assignments.forEach((ex, idx) => {
      const examName = `${ex.subject}, ${new Date(ex.exam_date).toLocaleDateString('ru-RU')}, ${ex.exam_time}`;
      html += `<tr>
        <td>${idx+1}</td>
        <td>${examName}</td>
        <td>${ex.ppe_name || 'н/д'}</td>
        <td>${ex.audience || 'н/д'}</td>
        <td>${ex.place || 'н/д'}</td>
      </tr>`;
    });
    html += '</tbody></table><p class="form-hint" style="margin-top: 0.5rem;">* Данные об аудитории и месте уточняются на входе в ППЭ.</p>';
    document.getElementById('examsTable').innerHTML = html;
  }

  function renderResultsTable(results) {
    if (!results.length) {
      document.getElementById('resultsTable').innerHTML = '<p>Результаты ещё не опубликованы.</p>';
      return;
    }
    let html = '<table class="results-table"><thead><tr>' +
      '<th>#</th><th>Экзамен</th><th>Вариант</th><th>Балл</th><th>Отметка</th><th>Статус</th><th>Апелляция</th><th>Подробно</th>' +
      '</tr></thead><tbody>';
    results.forEach((res, idx) => {
      const examSubject = res.exam_assignments.subject;
      const examDate = new Date(res.exam_assignments.exam_date).toLocaleDateString('ru-RU');
      const examFull = `${examSubject}-${currentUser.gia_type}, ${examDate}`;
      html += `<tr>
        <td>${idx+1}</td>
        <td>${examFull}</td>
        <td>${res.variant || '—'}</td>
        <td>${res.score}</td>
        <td>${res.grade}</td>
        <td>${statusText(res.status)}</td>
        <td>${res.appeal || 'нет'}</td>
        <td><button class="details-btn" data-result='${JSON.stringify(res)}'>👁️ Просмотреть</button></td>
      </tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('resultsTable').innerHTML = html;
    document.querySelectorAll('.details-btn').forEach(btn => {
      btn.addEventListener('click', () => showModal(JSON.parse(btn.dataset.result)));
    });
  }

  async function submitAppeal(resultId, reason, modalBodyDiv) {
    if (!reason.trim()) {
      alert('Пожалуйста, укажите причину апелляции.');
      return;
    }
    try {
      const { error } = await supabaseClient
        .from('appeals')
        .insert([{
          result_id: resultId,
          student_personal_code: personalCode,
          reason: reason.trim(),
          status: 'pending'
        }]);
      if (error) throw error;
      
      await supabaseClient
        .from('resultats')
        .update({ status: 'appeal', appeal: 'подана' })
        .eq('id', resultId);
      
      alert('Апелляция успешно подана. Статус результата обновлён.');
      document.getElementById('detailModal').style.display = 'none';
      loadData();
    } catch(err) {
      console.error(err);
      alert('Ошибка при подаче апелляции. Попробуйте позже.');
    }
  }

  function showModal(result) {
    const details = result.details || {};
    const examDate = new Date(result.exam_assignments.exam_date).toLocaleDateString('ru-RU');
    const examSubject = result.exam_assignments.subject;
    
    let tasksHtml = '';
    if (details.short_answers && details.short_answers.length) {
      tasksHtml = `
        <div class="detail-block"><strong>📝 Ответы на задания (краткий ответ):</strong></div>
        <table class="tasks-table">
          <thead><tr><th>№ задания</th><th>Ответ</th><th>Балл</th></tr></thead>
          <tbody>
            ${details.short_answers.map(item => `<tr><td>${item.num}</td><td>—</td><td>${item.score}</td></tr>`).join('')}
          </tbody>
        </table>
      `;
    }
    
    let typeBhtml = details.type_b ? `<div class="detail-block"><strong>📌 Задания типа B:</strong><br>${details.type_b} ${details.type_b_score || ''}</div>` : '';
    let typeChtml = details.type_c ? `<div class="detail-block"><strong>📌 Задания типа C:</strong><br>${details.type_c} ${details.type_c_score || ''}</div>` : '';
    
    let filesHtml = '';
    if (details.files && details.files.length) {
      const labels = ['Скачать бланк ответов №1', 'Скачать бланк ответов №2 лист 1', 'Скачать бланк ответов №2 лист 2', 'Скачать дополнительный бланк С'];
      filesHtml = '<div class="detail-block"><strong>📎 Бланки ответов:</strong><div class="file-list">';
      details.files.forEach((filePath, idx) => {
        const fileUrl = getFileUrl(filePath);
        const label = labels[idx] || `Скачать файл ${idx+1}`;
        filesHtml += `<a href="${fileUrl}" target="_blank" download>📄 ${label}</a>`;
      });
      filesHtml += '</div></div>';
    }
    
    const showAppeal = result.status === 'active';
    const appealHtml = showAppeal ? `
      <div class="detail-block">
        <button class="appeal-btn" id="showAppealFormBtn">⚖️ Подать апелляцию</button>
        <div id="appealFormContainer" class="hidden">
          <textarea id="appealReason" rows="3" placeholder="Укажите причину апелляции..."></textarea>
          <button id="submitAppealBtn" class="appeal-btn" style="background:#44aa44;">Отправить апелляцию</button>
        </div>
      </div>
    ` : '';
    
    document.getElementById('modalBody').innerHTML = `
      <h3>🔍 Подробно об экзамене</h3>
      <div class="detail-block"><strong>Экзамен:</strong> ${examSubject}-${currentUser.gia_type}, ${examDate}</div>
      <div class="detail-block"><strong>ППЭ:</strong> ${details.ppe || result.exam_assignments.ppe_name || '—'}</div>
      <div class="detail-block"><strong>Аудитория:</strong> ${details.audience || result.exam_assignments.audience || '—'}</div>
      <div class="detail-block"><strong>Вариант:</strong> ${result.variant || '—'}</div>
      <div class="detail-block"><strong>Статус:</strong> ${statusText(result.status)}</div>
      <hr>
      ${tasksHtml}
      ${typeBhtml}
      ${typeChtml}
      <div class="detail-block"><strong>🎯 Первичный балл:</strong> ${details.primary_score !== undefined ? details.primary_score : result.score}</div>
      <div class="detail-block"><strong>⭐ Отметка (результат):</strong> ${result.grade}</div>
      <div class="detail-block"><strong>⚖️ Апелляция:</strong> ${result.appeal || 'нет'}</div>
      ${filesHtml}
      ${appealHtml}
    `;
    
    if (showAppeal) {
      const btn = document.getElementById('showAppealFormBtn');
      const container = document.getElementById('appealFormContainer');
      if (btn && container) {
        btn.onclick = () => container.classList.toggle('hidden');
        const submitBtn = document.getElementById('submitAppealBtn');
        if (submitBtn) submitBtn.onclick = () => submitAppeal(result.id, document.getElementById('appealReason').value);
      }
    }
    
    document.getElementById('detailModal').style.display = 'flex';
  }

  document.querySelector('.close-modal').addEventListener('click', () => {
    document.getElementById('detailModal').style.display = 'none';
  });
  window.addEventListener('click', (e) => {
    if (e.target === document.getElementById('detailModal')) 
      document.getElementById('detailModal').style.display = 'none';
  });
  document.getElementById('logoutBtn').addEventListener('click', (e) => {
    e.preventDefault();
    sessionStorage.clear();
    window.location.href = './index.html';
  });

  loadData();
</script>
</body>
</html>
