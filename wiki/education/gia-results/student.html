<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Личный кабинет участника ГИА — СФСРЮ</title>
  <link rel="stylesheet" href="../../../css/style.css">
  <link rel="stylesheet" href="gia-common.css">
  <style>
    /* Скругление углов таблиц */
    .table-wrapper {
      overflow-x: auto;
      border-radius: 20px;
      margin: 1rem 0;
    }
    .table-wrapper table {
      border-radius: 20px;
      border-collapse: separate;
      border-spacing: 0;
      width: 100%;
      overflow: hidden;
    }
    .table-wrapper table th:first-child { border-top-left-radius: 20px; }
    .table-wrapper table th:last-child { border-top-right-radius: 20px; }
    .table-wrapper table tr:last-child td:first-child { border-bottom-left-radius: 20px; }
    .table-wrapper table tr:last-child td:last-child { border-bottom-right-radius: 20px; }

    .info-vertical {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      background: #fffaf5;
      padding: 1.2rem;
      border-radius: 24px;
      margin-bottom: 1.5rem;
    }
    .info-item {
      border-bottom: 1px dashed #ffe0e0;
      padding-bottom: 0.4rem;
    }
    .info-label {
      font-weight: 700;
      color: #a33;
      display: inline-block;
      width: 180px;
    }
    .tasks-table, .results-table, .exams-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    .tasks-table th, .tasks-table td,
    .results-table th, .results-table td,
    .exams-table th, .exams-table td {
      border: 1px solid #ffcece;
      padding: 8px 6px;
      text-align: center;
      background: white;
    }
    .tasks-table th, .results-table th, .exams-table th {
      background: #ffe0e0;
      font-weight: 600;
    }
    .info-table {
      width: 100%;
      margin: 1rem 0;
      border-collapse: collapse;
      background: #f9f9f9;
      border-radius: 16px;
      overflow: hidden;
    }
    .info-table td {
      border: 1px solid #ffcece;
      padding: 8px 12px;
    }
    .info-table td:first-child {
      background: #ffe0e0;
      font-weight: 600;
      width: 130px;
    }
    .type-block {
      margin: 1rem 0;
      padding: 0.75rem;
      background: #fef7e0;
      border-radius: 20px;
    }
    .file-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-top: 0.5rem;
    }
    .file-list a {
      background: #e0e0ff;
      padding: 5px 12px;
      border-radius: 30px;
      text-decoration: none;
      color: #225;
      font-weight: 500;
    }
    .appeal-btn {
      background: #ffaa44;
      color: #552200;
      border: none;
      border-radius: 40px;
      padding: 6px 16px;
      cursor: pointer;
      margin-top: 1rem;
    }
    hr { margin: 1rem 0; }
    .modal-content { max-width: 950px; }
    .appeal-form textarea {
      width: 100%;
      border-radius: 16px;
      border: 1px solid #ccc;
      padding: 8px;
      margin: 10px 0;
    }
  </style>
</head>
<body>
<div class="gia-header">
  <div class="container">
    <h1>📘 Личный кабинет участника ГИА</h1>
    <div class="header-buttons"><a href="./index.html" class="header-btn" id="logoutBtn">🚪 Выйти</a></div>
  </div>
</div>

<main class="main-container">
  <div class="card">
    <h2>📋 Данные об участнике экзаменов</h2>
    <div id="userInfo" class="info-vertical"></div>
    <h3>📅 Назначенные экзамены</h3>
    <div id="examsTable" class="table-wrapper"></div>
  </div>
  <div class="card">
    <h2>📊 Результаты экзаменов</h2>
    <div id="resultsTable" class="table-wrapper"></div>
  </div>
</main>

<div id="detailModal" class="modal">
  <div class="modal-content">
    <span class="close-modal">&times;</span>
    <div id="modalBody"></div>
  </div>
</div>

<div id="appealModal" class="modal">
  <div class="modal-content" style="max-width: 500px;">
    <span class="close-modal" id="closeAppealModal">&times;</span>
    <h3>📝 Подача апелляции</h3>
    <div class="appeal-form">
      <label><strong>Причина апелляции:</strong></label>
      <textarea id="appealReason" rows="4" placeholder="Опишите причину несогласия с результатами..."></textarea>
      <button id="submitAppealBtn" class="appeal-btn" style="background:#44aa44;">Отправить</button>
      <button id="cancelAppealBtn" class="appeal-btn" style="background:#aaa;">Отмена</button>
    </div>
  </div>
</div>

<footer class="gia-footer"><p>© 2026 СФСРЮ. Все права защищены пролетариатом.</p></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://qeewwoklmjysactfhrum.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlZXd3b2tsbWp5c2FjdGZocnVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MTI2MTEsImV4cCI6MjA4NjQ4ODYxMX0.gWzqku1cS08v17kfJHJbOWbm-DRpzwQ9omlQsKxc96A';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { db: { schema: 'education_gia' } });

  let currentUser = null;
  let currentAppealResultId = null;
  let maxScoresCache = {};

  try {
    currentUser = JSON.parse(sessionStorage.getItem('gia_user'));
    if (!currentUser || currentUser.role !== 'student') window.location.href = './index.html';
  } catch(e) { window.location.href = './index.html'; }
  const personalCode = currentUser.personal_code;

  function formatDate(dateStr) {
    if (!dateStr) return '—';
    const parts = dateStr.split('-');
    if (parts.length === 3) return `${parts[2]}.${parts[1]}.${parts[0]}`;
    return dateStr;
  }
  function formatValue(v) {
    return (v === null || v === undefined || v === '') ? '—' : v;
  }
  function statusText(status) {
    const map = {
      'active': 'Активный результат',
      'processing': 'Обработка не завершена',
      'annulled': 'Результат аннулирован',
      'hidden': 'Результат скрыт',
      'appeal': 'Апелляция'
    };
    return map[status] || status;
  }
  function getFileUrl(filePath) {
    if (!filePath) return '#';
    const { data } = supabaseClient.storage.from('answer_sheets').getPublicUrl(filePath);
    return data.publicUrl;
  }

  async function loadMaxScores() {
    const { data } = await supabaseClient.from('task_max_scores').select('subject_code, grade_type, task_number, max_score');
    if (data) {
      data.forEach(item => {
        const key = `${item.subject_code}_${item.grade_type}_${item.task_number}`;
        maxScoresCache[key] = item.max_score;
      });
    }
  }
  function getMaxScore(subjectCode, gradeType, taskNumber) {
    const key = `${subjectCode}_${gradeType}_${taskNumber}`;
    return maxScoresCache[key] || 0;
  }
  function formatScore(scoreStr, maxScore) {
    if (!scoreStr) return '—';
    if (typeof scoreStr === 'string' && scoreStr.includes('/')) return scoreStr;
    const numeric = parseInt(scoreStr);
    if (isNaN(numeric)) return scoreStr;
    return `${numeric} / ${maxScore}`;
  }

  async function loadData() {
    try {
      // 1. Информация об участнике
      const { data: user, error: uErr } = await supabaseClient
        .from('registered')
        .select('full_name, municipality, educational_org, class_name, birth_date, gia_type')
        .eq('personal_code', personalCode).single();
      if (uErr) throw uErr;
      document.getElementById('userInfo').innerHTML = `
        <div class="info-item"><span class="info-label">Муниципалитет:</span> ${formatValue(user.municipality)}</div>
        <div class="info-item"><span class="info-label">Образовательная организация:</span> ${formatValue(user.educational_org)}</div>
        <div class="info-item"><span class="info-label">Класс:</span> ${formatValue(user.class_name)}</div>
        <div class="info-item"><span class="info-label">ФИО:</span> ${user.full_name}</div>
        <div class="info-item"><span class="info-label">Дата рождения:</span> ${formatDate(user.birth_date)}</div>
        <div class="info-item"><span class="info-label">Тип ГИА:</span> ${user.gia_type}</div>
      `;

      // 2. Назначенные экзамены
      const { data: assignments, error: aErr } = await supabaseClient
        .from('exam_assignments')
        .select('*')
        .eq('personal_code', personalCode)
        .order('exam_date', { ascending: true });
      if (aErr) throw aErr;
      let examsHtml = '<table class="exams-table"><thead><tr><th>№</th><th>Экзамен</th><th>ППЭ</th><th>Аудитория</th><th>Место</th></tr></thead><tbody>';
      if (assignments.length) {
        assignments.forEach((ex, idx) => {
          examsHtml += `<tr>
            <td>${idx+1}</td>
            <td>${ex.subject}<br>${formatDate(ex.exam_date)} ${ex.exam_time}</td>
            <td>${formatValue(ex.ppe_name)}</td>
            <td>${formatValue(ex.audience)}</td>
            <td>${formatValue(ex.place)}</td>
          </tr>`;
        });
      } else {
        examsHtml += '<tr><td colspan="5">Нет назначенных экзаменов</td></tr>';
      }
      examsHtml += '</tbody></table>';
      document.getElementById('examsTable').innerHTML = examsHtml;

      // 3. Результаты экзаменов
      if (!assignments.length) {
        document.getElementById('resultsTable').innerHTML = '<p>Нет результатов</p>';
        return;
      }
      const { data: results, error: rErr } = await supabaseClient
        .from('resultats')
        .select('*, exam_assignments!inner(subject, exam_date)')
        .in('assignment_id', assignments.map(a => a.id));
      if (rErr) throw rErr;
      if (!results.length) {
        document.getElementById('resultsTable').innerHTML = '<p>Результаты ещё не опубликованы.</p>';
        return;
      }

      // Вторичные баллы
      const resultIds = results.map(r => r.id);
      let secMap = {};
      if (resultIds.length) {
        const { data: details } = await supabaseClient
          .from('exam_details')
          .select('result_id, secondary_score')
          .in('result_id', resultIds);
        if (details) details.forEach(d => { secMap[d.result_id] = d.secondary_score; });
      }

      let resHtml = '<table class="results-table"><thead><tr><th>#</th><th>Экзамен</th><th>Вариант</th><th>Первичный балл</th><th>Вторичный балл</th><th>Отметка</th><th>Статус</th><th>Апелляция</th><th></th><tr></thead><tbody>';
      results.forEach((res, idx) => {
        resHtml += `<tr>
          <td>${idx+1}</td>
          <td>${res.exam_assignments.subject}<br>${formatDate(res.exam_assignments.exam_date)}</td>
          <td>${res.variant || '—'}</td>
          <td>${res.score !== null ? res.score : '—'}</td>
          <td>${secMap[res.id] ?? '—'}</td>
          <td>${res.grade || '—'}</td>
          <td>${statusText(res.status)}</td>
          <td>${res.appeal || 'нет'}</td>
          <td><button class="details-btn" data-result-id="${res.id}" data-assignment-id="${res.assignment_id}">👁️</button></td>
        </tr>`;
      });
      resHtml += '</tbody></table>';
      document.getElementById('resultsTable').innerHTML = resHtml;

      document.querySelectorAll('.details-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const resultId = parseInt(btn.dataset.resultId);
          const assignmentId = parseInt(btn.dataset.assignmentId);
          showModal(resultId, assignmentId);
        });
      });
    } catch (err) {
      console.error(err);
      document.getElementById('examsTable').innerHTML = '<p style="color:red;">Ошибка загрузки</p>';
    }
  }

  async function showModal(resultId, assignmentId) {
    // Загружаем детали из exam_details
    const { data: details, error: dErr } = await supabaseClient
      .from('exam_details')
      .select('*')
      .eq('result_id', resultId)
      .maybeSingle();
    if (dErr || !details) {
      alert('Детали экзамена не найдены');
      return;
    }
    // Основная информация об экзамене
    const { data: assign, error: aErr } = await supabaseClient
      .from('exam_assignments')
      .select('subject, exam_date, ppe_name, audience, place')
      .eq('id', assignmentId)
      .single();
    if (aErr) return;

    const subjectParts = assign.subject.split('-');
    const subjectCode = subjectParts[0];
    const gradeType = subjectParts[1] || '9';

    // Статус для апелляции
    const { data: resStatus } = await supabaseClient
      .from('resultats')
      .select('status')
      .eq('id', resultId)
      .single();
    const canAppeal = resStatus?.status === 'active';

    // Информационная таблица (ППЭ, аудитория, место, вариант)
    const infoTable = `
      <table class="info-table">
        <tr><td>ППЭ</td><td>${formatValue(assign.ppe_name)}</td></tr>
        <tr><td>Аудитория</td><td>${formatValue(assign.audience)}</td></tr>
        <tr><td>Место</td><td>${formatValue(assign.place)}</td></tr>
        <tr><td>Вариант</td><td>${formatValue(details.variant)}</td></tr>
      能得到
    `;

    // Таблица кратких ответов
    let shortHtml = '';
    if (details.short_answers && details.short_answers.length) {
      let rows = '';
      for (const item of details.short_answers) {
        const taskNum = item.num || item.task_number;
        if (!taskNum) continue;
        const maxScore = getMaxScore(subjectCode, gradeType, parseInt(taskNum));
        let scoreDisplay = '—';
        if (item.score) {
          if (typeof item.score === 'string' && item.score.includes('/')) {
            scoreDisplay = item.score;
          } else {
            const numeric = parseInt(item.score);
            if (!isNaN(numeric)) scoreDisplay = `${numeric} / ${maxScore}`;
            else scoreDisplay = item.score;
          }
        }
        rows += `<tr>
          <td>${taskNum} ${item.type ? `(${item.type})` : ''}</td>
          <td>${item.answer ?? '—'}</td>
          <td>${scoreDisplay}</td>
        <tr>`;
      }
      if (rows) {
        shortHtml = `
          <div><strong>📝 Ответы на задания с кратким ответом</strong></div>
          <div class="table-wrapper"><table class="tasks-table"><thead><tr><th>Задание</th><th>Ответ</th><th>Балл</th></tr></thead><tbody>${rows}</tbody></table></div>
        `;
      }
    }

    // Блоки B, C, D
    let typeBhtml = details.type_b ? `<div class="type-block"><strong>📌 Задания типа B</strong><br>${details.type_b} ${details.type_b_score || ''}</div>` : '';
    let typeChtml = details.type_c ? `<div class="type-block"><strong>📌 Задания типа C</strong><br>${details.type_c} ${details.type_c_score || ''}</div>` : '';
    let typeDhtml = '';
    const dScore = details.type_d_score;
    if (dScore && dScore !== '0' && dScore !== 0) {
      typeDhtml = `<div class="type-block"><strong>🎤 Задания типа D (устная часть)</strong><br>${dScore}</div>`;
    }

    // Таблица с баллами
    const scoreTable = `
      <div><strong>📊 Результаты</strong></div>
      <table class="info-table" style="margin-top:0;">
        <tr><td>Первичный балл</td><td>${details.primary_score ?? '—'}</td></tr>
        <tr><td>Вторичный балл</td><td>${details.secondary_score ?? '—'}</td></tr>
        <tr><td>Оценка</td><td>${details.grade || '—'}</td></tr>
      能得到
    `;

    // Бланки – берём из answer_sheets по assignment_id (как у эксперта)
    let filesHtml = '';
    const { data: sheets, error: sheetsErr } = await supabaseClient
      .from('answer_sheets')
      .select('file_path, file_type')
      .eq('assignment_id', assignmentId);
    if (!sheetsErr && sheets && sheets.length) {
      const labels = {
        registration: '📄 Бланк регистрации',
        answer1: '📝 Бланк ответов №1',
        'answer2-1': '📑 Бланк ответов №2 (лист 1)',
        'answer2-2': '📑 Бланк ответов №2 (лист 2)',
        'extra-c': '📎 Дополнительный бланк C',
        'audio-d': '🎤 Аудиозапись'
      };
      filesHtml = '<div><strong>📎 Бланки:</strong><div class="file-list">';
      sheets.forEach(sheet => {
        const url = getFileUrl(sheet.file_path);
        const label = labels[sheet.file_type] || `📄 ${sheet.file_path.split('/').pop()}`;
        filesHtml += `<a href="${url}" target="_blank" download>${label}</a>`;
      });
      filesHtml += '</div></div>';
    }

    const appealButton = canAppeal
      ? `<button class="appeal-btn" id="openAppealFromModal" data-result-id="${resultId}" data-status="${resStatus.status}">⚖️ Подать апелляцию</button>`
      : '';

    const modalHtml = `
      <h3>🔍 Подробно об экзамене</h3>
      <div><strong>Экзамен:</strong> ${assign.subject}, ${formatDate(assign.exam_date)}</div>
      ${infoTable}
      <hr>
      ${shortHtml}
      ${typeBhtml}
      ${typeChtml}
      ${typeDhtml}
      ${scoreTable}
      ${filesHtml}
      ${appealButton}
    `;
    const modal = document.getElementById('detailModal');
    document.getElementById('modalBody').innerHTML = modalHtml;
    modal.style.display = 'flex';

    const openAppealBtn = document.getElementById('openAppealFromModal');
    if (openAppealBtn) {
      openAppealBtn.addEventListener('click', () => {
        const rid = parseInt(openAppealBtn.dataset.resultId);
        const st = openAppealBtn.dataset.status;
        showAppealModal(rid, st);
      });
    }
  }

  function showAppealModal(resultId, currentStatus) {
    if (currentStatus === 'appeal') {
      alert('Апелляция уже подана.');
      return;
    }
    currentAppealResultId = resultId;
    document.getElementById('appealModal').style.display = 'flex';
    document.getElementById('appealReason').value = '';
  }

  async function submitAppealFromModal() {
    const reason = document.getElementById('appealReason').value.trim();
    if (!reason) {
      alert('Пожалуйста, укажите причину апелляции.');
      return;
    }
    const { error: insErr } = await supabaseClient.from('appeals').insert([{
      result_id: currentAppealResultId,
      student_personal_code: personalCode,
      reason: reason,
      status: 'pending'
    }]);
    if (insErr) {
      alert('Ошибка подачи апелляции: ' + insErr.message);
      return;
    }
    await supabaseClient.from('resultats')
      .update({ status: 'appeal', appeal: 'подана' })
      .eq('id', currentAppealResultId);
    alert('Апелляция подана.');
    document.getElementById('appealModal').style.display = 'none';
    loadData();
  }

  document.querySelectorAll('.close-modal').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById('detailModal').style.display = 'none';
      document.getElementById('appealModal').style.display = 'none';
    });
  });
  window.addEventListener('click', (e) => {
    if (e.target === document.getElementById('detailModal')) document.getElementById('detailModal').style.display = 'none';
    if (e.target === document.getElementById('appealModal')) document.getElementById('appealModal').style.display = 'none';
  });
  document.getElementById('closeAppealModal')?.addEventListener('click', () => {
    document.getElementById('appealModal').style.display = 'none';
  });
  document.getElementById('cancelAppealBtn')?.addEventListener('click', () => {
    document.getElementById('appealModal').style.display = 'none';
  });
  document.getElementById('submitAppealBtn')?.addEventListener('click', () => {
    submitAppealFromModal();
  });
  document.getElementById('logoutBtn').addEventListener('click', (e) => {
    e.preventDefault();
    sessionStorage.clear();
    window.location.href = './index.html';
  });

  (async () => {
    await loadMaxScores();
    await loadData();
  })();
</script>
</body>
</html>
