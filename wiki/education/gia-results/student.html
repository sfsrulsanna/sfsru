<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Личный кабинет участника ГИА</title>
  <link rel="stylesheet" href="../../../css/style.css">
  <style>
    body { background: #fef8f8; }
    .gia-header { background: linear-gradient(135deg, #ff6666, #cc0000); padding: 1rem 0; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
    .gia-header h1 { color: white; margin: 0; font-size: 1.6rem; }
    .header-btn { background: rgba(255,255,255,0.25); border-radius: 40px; padding: 0.5rem 1.2rem; color: white; text-decoration: none; transition: 0.2s; }
    .header-btn:hover { background: rgba(255,255,255,0.45); transform: translateY(-2px); }
    .main-container { max-width: 1300px; margin: 2rem auto; padding: 0 1.5rem; }
    .card { background: white; border-radius: 28px; padding: 1.5rem; margin-bottom: 2rem; box-shadow: 0 6px 18px rgba(0,0,0,0.05); border: 1px solid #ffcccc; overflow-x: auto; }
    .card h2 { color: #a00; border-left: 5px solid #c44; padding-left: 1rem; margin-bottom: 1.5rem; }
    .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px,1fr)); gap: 1rem; margin-bottom: 2rem; background: #fff9f0; padding: 1rem; border-radius: 20px; }
    .info-item { font-size: 1rem; }
    .info-label { font-weight: bold; color: #a33; min-width: 140px; display: inline-block; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { border: 1px solid #ffcece; padding: 10px 8px; text-align: left; vertical-align: top; }
    th { background: #ffe0e0; color: #a33; font-weight: 600; }
    tr:hover { background: #fff5f5; }
    .details-btn { background: none; border: none; color: #c44; cursor: pointer; font-weight: bold; text-decoration: underline; }
    .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000; justify-content: center; align-items: center; }
    .modal-content { background: white; max-width: 900px; width: 90%; max-height: 85vh; border-radius: 32px; overflow-y: auto; padding: 1.5rem; position: relative; }
    .close-modal { position: absolute; right: 1.5rem; top: 1rem; font-size: 1.8rem; cursor: pointer; color: #999; }
    .close-modal:hover { color: #c00; }
    .modal h3 { color: #a00; margin-bottom: 1rem; }
    .detail-block { margin-bottom: 1rem; }
    .task-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px,auto)); gap: 6px; margin: 10px 0; }
    .task-item { background: #f2ecec; padding: 4px 8px; border-radius: 16px; font-size: 0.8rem; }
    .file-list a { display: inline-block; margin: 5px 10px 5px 0; background: #e0e0ff; padding: 5px 12px; border-radius: 20px; text-decoration: none; color: #225; }
    .file-list a:hover { background: #c4c4ff; }
    hr { margin: 1rem 0; }
    @media (max-width: 700px) { th,td { font-size: 0.75rem; } .info-label { min-width: 100px; } }
  </style>
</head>
<body>
<div class="gia-header">
  <div class="container">
    <h1>📘 Результаты ГИА — участник</h1>
    <div><a href="./index.html" class="header-btn" id="logoutBtn">Выйти</a></div>
  </div>
</div>

<main class="main-container" id="app">
  <div class="card">
    <h2>📋 Данные об участнике экзаменов</h2>
    <div id="userInfo" class="info-grid"></div>
    <h3>📅 Назначенные экзамены</h3>
    <div id="examsTable"></div>
  </div>

  <div class="card">
    <h2>📊 Результаты экзаменов</h2>
    <div id="resultsTable"></div>
  </div>
</main>

<div id="detailModal" class="modal">
  <div class="modal-content">
    <span class="close-modal">&times;</span>
    <div id="modalBody"></div>
  </div>
</div>

<footer class="footer" style="margin-top: 2rem;">
  <p>© 2026 СФСРЮ. Все права защищены.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ========== НАСТРОЙКИ SUPABASE (ЗАМЕНИТЕ НА СВОИ) ==========
    const SUPABASE_URL = 'https://qeewwoklmjysactfhrum.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlZXd3b2tsbWp5c2FjdGZocnVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MTI2MTEsImV4cCI6MjA4NjQ4ODYxMX0.gWzqku1cS08v17kfJHJbOWbm-DRpzwQ9omlQsKxc96A';
  // ============================================================
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Функция получения публичного URL из бакета gia_files
  function getFileUrl(filePath) {
    if (!filePath) return '#';
    const { data } = supabase.storage.from('gia_files').getPublicUrl(filePath);
    return data.publicUrl;
  }

  let currentUser = null;
  try {
    currentUser = JSON.parse(sessionStorage.getItem('gia_user'));
    if (!currentUser || currentUser.role !== 'student') window.location.href = './index.html';
  } catch(e) { window.location.href = './index.html'; }

  const personalCode = currentUser.personal_code;

  async function loadData() {
    try {
      const { data: userData, error: userErr } = await supabase
        .from('registered')
        .select('full_name, municipality, educational_org, class_name, birth_date, gia_type')
        .eq('personal_code', personalCode)
        .single();
      if (userErr) throw userErr;
      renderUserInfo(userData);

      const { data: assignments, error: assignErr } = await supabase
        .from('exam_assignments')
        .select('*')
        .eq('personal_code', personalCode)
        .order('exam_date', { ascending: true });
      if (assignErr) throw assignErr;
      renderExamsTable(assignments);

      const { data: results, error: resErr } = await supabase
        .from('resultats')
        .select('*, exam_assignments!inner(subject, exam_date, ppe_name, audience)')
        .in('assignment_id', assignments.map(a => a.id));
      if (resErr) throw resErr;
      renderResultsTable(results, assignments);
    } catch(err) {
      console.error(err);
      document.getElementById('examsTable').innerHTML = '<p style="color:red;">Ошибка загрузки данных.</p>';
    }
  }

  function renderUserInfo(user) {
    const container = document.getElementById('userInfo');
    container.innerHTML = `
      <div class="info-item"><span class="info-label">Муниципалитет:</span> ${user.municipality || '—'}</div>
      <div class="info-item"><span class="info-label">Образовательная организация:</span> ${user.educational_org || '—'}</div>
      <div class="info-item"><span class="info-label">Класс:</span> ${user.class_name || '—'}</div>
      <div class="info-item"><span class="info-label">ФИО:</span> ${user.full_name}</div>
      <div class="info-item"><span class="info-label">Дата рождения:</span> ${user.birth_date}</div>
      <div class="info-item"><span class="info-label">Тип ГИА:</span> ${user.gia_type}</div>
    `;
  }

  function renderExamsTable(assignments) {
    if (!assignments.length) {
      document.getElementById('examsTable').innerHTML = '<p>Нет назначенных экзаменов.</p>';
      return;
    }
    let html = '能able<thead><tr><th>№ п/п</th><th>Экзамен</th><th>ППЭ</th><th>Аудитория*</th><th>Место*</th></tr></thead><tbody>';
    assignments.forEach((ex, idx) => {
      const examName = `${ex.subject}, ${new Date(ex.exam_date).toLocaleDateString('ru-RU')}, ${ex.exam_time}`;
      html += `<tr>
        <td>${idx+1}</td>
        <td>${examName}</td>
        <td>${ex.ppe_name || 'н/д'}</td>
        <td>${ex.audience || 'н/д'}</td>
        <td>${ex.place || 'н/д'}</td>
      </tr>`;
    });
    html += '</tbody></table><p class="form-hint" style="font-size:0.75rem;">* Данные об аудитории и месте сообщаются на входе в ППЭ.</p>';
    document.getElementById('examsTable').innerHTML = html;
  }

  function renderResultsTable(results, assignments) {
    if (!results.length) {
      document.getElementById('resultsTable').innerHTML = '<p>Результаты ещё не опубликованы.</p>';
      return;
    }
    let html = '能able<thead><tr><th>#</th><th>Экзамен</th><th>Вариант</th><th>Балл</th><th>Отметка</th><th>Статус</th><th>Апелляция</th><th>Подробно</th></tr></thead><tbody>';
    results.forEach((res, idx) => {
      const examSubject = res.exam_assignments.subject;
      const examDate = new Date(res.exam_assignments.exam_date).toLocaleDateString('ru-RU');
      const examFull = `${examSubject}-${currentUser.gia_type}, ${examDate}`;
      html += `<tr>
        <td>${idx+1}</td>
        <td>${examFull}</td>
        <td>${res.variant || '—'}</td>
        <td>${res.score}</td>
        <td>${res.grade}</td>
        <td>${res.status === 'active' ? 'Активный результат' : res.status}</td>
        <td>${res.appeal || 'нет'}</td>
        <td><button class="details-btn" data-result='${JSON.stringify(res)}'>Просмотреть</button></td>
      </tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('resultsTable').innerHTML = html;
    document.querySelectorAll('.details-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const result = JSON.parse(btn.dataset.result);
        showModal(result);
      });
    });
  }

  function showModal(result) {
    const modal = document.getElementById('detailModal');
    const modalBody = document.getElementById('modalBody');
    const details = result.details || {};
    const examDate = new Date(result.exam_assignments.exam_date).toLocaleDateString('ru-RU');
    const examSubject = result.exam_assignments.subject;
    
    let shortAnswersHtml = '';
    if (details.short_answers && details.short_answers.length) {
      shortAnswersHtml = '<div class="detail-block"><strong>Ответы на задания с кратким ответом:</strong><div class="task-list">';
      details.short_answers.forEach(ans => {
        shortAnswersHtml += `<div class="task-item">${ans.num} [${ans.score}]</div>`;
      });
      shortAnswersHtml += '</div></div>';
    }
    
    let typeBHtml = details.type_b ? `<div class="detail-block"><strong>Задания типа B:</strong><br>${details.type_b} ${details.type_b_score ? details.type_b_score : ''}</div>` : '';
    let typeCHtml = details.type_c ? `<div class="detail-block"><strong>Задания типа C:</strong><br>${details.type_c} ${details.type_c_score ? details.type_c_score : ''}</div>` : '';
    
    let filesHtml = '';
    if (details.files && details.files.length) {
      filesHtml = '<div class="detail-block"><strong>Бланки:</strong><div class="file-list">';
      details.files.forEach((filePath) => {
        const fileName = filePath.split('/').pop();
        const fileUrl = getFileUrl(filePath);
        filesHtml += `<a href="${fileUrl}" target="_blank" download>📄 ${fileName}</a>`;
      });
      filesHtml += '</div></div>';
    }
    
    modalBody.innerHTML = `
      <h3>Подробно об экзамене</h3>
      <div class="detail-block"><strong>Экзамен:</strong> ${examSubject}-${currentUser.gia_type}, ${examDate}</div>
      <div class="detail-block"><strong>ППЭ:</strong> ${details.ppe || result.exam_assignments.ppe_name || '—'}</div>
      <div class="detail-block"><strong>Аудитория:</strong> ${details.audience || result.exam_assignments.audience || '—'}</div>
      <div class="detail-block"><strong>Вариант:</strong> ${result.variant || '—'}</div>
      <div class="detail-block"><strong>Статус:</strong> ${result.status === 'active' ? 'Активный результат' : result.status}</div>
      <hr>
      ${shortAnswersHtml}
      ${typeBHtml}
      ${typeCHtml}
      <div class="detail-block"><strong>Первичный балл:</strong> ${details.primary_score !== undefined ? details.primary_score : result.score}</div>
      <div class="detail-block"><strong>Отметка (результат):</strong> ${result.grade}</div>
      <div class="detail-block"><strong>Апелляция:</strong> ${result.appeal || 'нет'}</div>
      ${filesHtml}
    `;
    modal.style.display = 'flex';
  }

  document.querySelector('.close-modal').addEventListener('click', () => {
    document.getElementById('detailModal').style.display = 'none';
  });
  window.addEventListener('click', (e) => {
    const modal = document.getElementById('detailModal');
    if (e.target === modal) modal.style.display = 'none';
  });

  document.getElementById('logoutBtn').addEventListener('click', (e) => {
    e.preventDefault();
    sessionStorage.clear();
    window.location.href = './index.html';
  });

  loadData();
</script>
</body>
</html>
