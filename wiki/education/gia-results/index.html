<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход в систему ГИА — СФСРЮ</title>
  <link rel="stylesheet" href="../../../css/style.css">
  <link rel="stylesheet" href="gia-common.css">
</head>
<body>
<div class="gia-header">
  <div class="container">
    <h1>📊 Результаты ГИА</h1>
    <div class="header-buttons">
      <a href="../index.html" class="header-btn">← К образованию</a>
      <a href="../../../index.html" class="header-btn">На главный портал</a>
    </div>
  </div>
</div>

<main>
  <div class="login-container">
    <h2>🔐 Вход в систему</h2>
    <div id="errorBox" class="error-message"></div>
    <form id="loginForm">
      <div class="form-group">
        <label>Личный код</label>
        <input type="text" id="personalCode" placeholder="XXXX-XXXX" autocomplete="off" required>
        <div class="form-hint">Пример: 1234-5678</div>
      </div>
      <div class="form-group">
        <label>Код регистрации ГИА</label>
        <input type="text" id="giaCode" placeholder="XYYZZZZUU" autocomplete="off" required>
        <div class="form-hint">9 цифр, первая: 0‑участник, 1‑проверяющий, 2‑руководитель, 3‑админ</div>
      </div>
      <button type="submit" class="login-btn">Войти →</button>
    </form>
  </div>
</main>

<footer class="gia-footer">
  <p>© 2026 СФСРЮ. Все права защищены.</p>
  <p>Телефон: +7 (993) 609-81-26 | Почта: <a href="mailto:sfsr.ulsanna@gmail.com">sfsr.ulsanna@gmail.com</a></p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // === НАСТРОЙКИ (замените на свои, но URL уже ваш) ===
    const SUPABASE_URL = 'https://qeewwoklmjysactfhrum.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlZXd3b2tsbWp5c2FjdGZocnVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MTI2MTEsImV4cCI6MjA4NjQ4ODYxMX0.gWzqku1cS08v17kfJHJbOWbm-DRpzwQ9omlQsKxc96A';
  // ===================================================

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    db: { schema: 'education_gia' }
  });

  function validatePersonalCode(code) { return /^\d{4}-\d{4}$/.test(code); }
  function validateGiaCode(code) { return /^[0-3]\d{2}\d{4}\d{2}$/.test(code); }
  function getRoleFromGiaCode(giaCode) {
    const map = { '0': 'student', '1': 'examiner', '2': 'director', '3': 'admin' };
    return map[giaCode[0]] || null;
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorDiv = document.getElementById('errorBox');
    errorDiv.style.display = 'none';
    const personalCode = document.getElementById('personalCode').value.trim();
    const giaCode = document.getElementById('giaCode').value.trim();

    if (!validatePersonalCode(personalCode)) {
      errorDiv.innerText = '❌ Неверный формат личного кода (XXXX-XXXX)';
      errorDiv.style.display = 'block';
      return;
    }
    if (!validateGiaCode(giaCode)) {
      errorDiv.innerText = '❌ Неверный формат кода ГИА (9 цифр, первая 0-3)';
      errorDiv.style.display = 'block';
      return;
    }

    try {
      const { data, error } = await supabaseClient
        .from('registered')
        .select('*')
        .eq('personal_code', personalCode)
        .eq('gia_code', giaCode);

      if (error) throw error;
      if (!data || data.length === 0) {
        errorDiv.innerText = '❌ Неверная пара кодов. Доступ запрещён.';
        errorDiv.style.display = 'block';
        return;
      }
      const user = data[0];
      const role = getRoleFromGiaCode(giaCode);
      if (!role) throw new Error('Роль не определена');
      sessionStorage.setItem('gia_user', JSON.stringify({
        personal_code: user.personal_code,
        gia_code: user.gia_code,
        full_name: user.full_name,
        birth_date: user.birth_date,
        gia_type: user.gia_type,
        role: role
      }));
      window.location.href = `./${role}.html`;
    } catch (err) {
      console.error(err);
      errorDiv.innerText = '⚠️ Ошибка соединения с сервером. Попробуйте позже.';
      errorDiv.style.display = 'block';
    }
  });
</script>
</body>
</html>
