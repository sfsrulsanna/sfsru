<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Панель администратора ГИА — СФСРЮ</title>
  <link rel="stylesheet" href="../../../css/style.css">
  <link rel="stylesheet" href="gia-common.css">
  <style>
    .admin-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 2rem;
      border-bottom: 2px solid #ffcece;
      padding-bottom: 0.5rem;
    }
    .tab-btn {
      background: #fff0f0;
      border: none;
      border-radius: 40px;
      padding: 0.6rem 1.2rem;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: #c44;
      color: white;
    }
    .tab-pane {
      display: none;
      animation: fadeIn 0.3s ease;
    }
    .tab-pane.active {
      display: block;
    }
    .admin-form {
      background: #fffaf5;
      border-radius: 32px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .admin-form h3 {
      margin-bottom: 1rem;
      color: #a33;
    }
    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .form-group {
      flex: 1;
      min-width: 200px;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ffcece;
      border-radius: 20px;
    }
    button[type="submit"] {
      background: #44aa44;
      color: white;
      border: none;
      border-radius: 40px;
      padding: 8px 24px;
      cursor: pointer;
    }
    .list-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }
    .list-table th, .list-table td {
      border: 1px solid #ffcece;
      padding: 8px;
      text-align: left;
    }
    .list-table th {
      background: #ffe0e0;
    }
    .delete-btn {
      background: #c44;
      color: white;
      border: none;
      border-radius: 20px;
      padding: 4px 12px;
      cursor: pointer;
    }
    .success-msg {
      background: #ccffcc;
      color: #2a662a;
      padding: 0.5rem;
      border-radius: 20px;
      margin-top: 1rem;
      display: none;
    }
  </style>
</head>
<body>
<div class="gia-header">
  <div class="container">
    <h1>⚙ Панель администратора ГИА</h1>
    <div class="header-buttons">
      <a href="./index.html" class="header-btn" id="logoutBtn">🚪 Выйти</a>
    </div>
  </div>
</div>

<main class="main-container">
  <div class="card">
    <div class="admin-tabs">
      <button class="tab-btn active" data-tab="ppe">ППЭ</button>
      <button class="tab-btn" data-tab="participants">Участники</button>
      <button class="tab-btn" data-tab="experts">Эксперты</button>
      <button class="tab-btn" data-tab="register">Регистрация на экзамены</button>
    </div>

    <!-- Вкладка ППЭ -->
    <div id="ppeTab" class="tab-pane active">
      <div class="admin-form">
        <h3>➕ Добавить ППЭ</h3>
        <form id="ppeForm">
          <div class="form-row">
            <div class="form-group">
              <label>Код ППЭ</label>
              <input type="text" id="ppeCode" required>
            </div>
            <div class="form-group">
              <label>Название</label>
              <input type="text" id="ppeName" required>
            </div>
            <div class="form-group">
              <label>Адрес</label>
              <input type="text" id="ppeAddress">
            </div>
          </div>
          <button type="submit">Создать ППЭ</button>
        </form>
        <div id="ppeSuccess" class="success-msg"></div>
      </div>
      <div>
        <h3>📋 Список ППЭ</h3>
        <div id="ppeList"></div>
      </div>
    </div>

    <!-- Вкладка Участники -->
    <div id="participantsTab" class="tab-pane">
      <div class="admin-form">
        <h3>👤 Добавить участника</h3>
        <form id="participantForm">
          <div class="form-row">
            <div class="form-group"><label>Личный код (XXXX-XXXX)</label><input type="text" id="partPersonalCode" required></div>
            <div class="form-group"><label>Код ГИА (9 цифр)</label><input type="text" id="partGiaCode" required></div>
            <div class="form-group"><label>ФИО</label><input type="text" id="partFullName" required></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Дата рождения</label><input type="date" id="partBirthDate" required></div>
            <div class="form-group"><label>Тип ГИА</label>
              <select id="partGiaType">
                <option>9</option><option>11</option><option>СПО</option><option>ВО</option>
                <option>ГВЭ-9</option><option>ГВЭ-11</option><option>ГВЭ-СПО</option><option>ГВЭ-ВО</option>
              </select>
            </div>
            <div class="form-group"><label>Муниципалитет</label><input type="text" id="partMunicipality"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Образовательная организация</label><input type="text" id="partEduOrg"></div>
            <div class="form-group"><label>Класс/группа</label><input type="text" id="partClass"></div>
          </div>
          <button type="submit">Добавить участника</button>
        </form>
        <div id="participantSuccess" class="success-msg"></div>
      </div>
      <div>
        <h3>📋 Список участников</h3>
        <div id="participantsList"></div>
      </div>
    </div>

    <!-- Вкладка Эксперты -->
    <div id="expertsTab" class="tab-pane">
      <div class="admin-form">
        <h3>🧑‍🏫 Добавить эксперта</h3>
        <form id="expertForm">
          <div class="form-row">
            <div class="form-group"><label>Личный код</label><input type="text" id="expPersonalCode" required></div>
            <div class="form-group"><label>ФИО</label><input type="text" id="expFullName" required></div>
            <div class="form-group"><label>Роль</label>
              <select id="expRole"><option>examiner</option><option>director</option><option>admin</option></select>
            </div>
            <div class="form-group"><label>ППЭ (ID)</label><input type="number" id="expPpeId" placeholder="ID ППЭ"></div>
          </div>
          <button type="submit">Добавить эксперта</button>
        </form>
        <div id="expertSuccess" class="success-msg"></div>
      </div>
      <div>
        <h3>📋 Список экспертов</h3>
        <div id="expertsList"></div>
      </div>
    </div>

    <!-- Вкладка Регистрация на экзамены -->
    <div id="registerTab" class="tab-pane">
      <div class="admin-form">
        <h3>📝 Зарегистрировать участника на экзамен</h3>
        <form id="registerExamForm">
          <div class="form-row">
            <div class="form-group"><label>Личный код участника</label><input type="text" id="regPersonalCode" required></div>
            <div class="form-group"><label>Предмет</label>
              <select id="regSubject">
                <option>Русский язык</option><option>Юльсанниский язык</option><option>Математика</option>
                <option>География</option><option>Биология</option><option>Химия</option><option>Информатика</option>
                <option>История</option><option>Обществознание</option><option>Физика</option><option>Литература</option>
                <option>Английский язык</option><option>Немецкий язык</option><option>Китайский язык</option>
              </select>
            </div>
            <div class="form-group"><label>Дата экзамена</label><input type="date" id="regExamDate" required></div>
            <div class="form-group"><label>Время</label><input type="time" id="regExamTime" required></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>ППЭ (ID)</label><input type="number" id="regPpeId" placeholder="ID ППЭ"></div>
            <div class="form-group"><label>Аудитория</label><input type="text" id="regAudience"></div>
            <div class="form-group"><label>Место</label><input type="text" id="regPlace"></div>
          </div>
          <button type="submit">Зарегистрировать</button>
        </form>
        <div id="registerSuccess" class="success-msg"></div>
      </div>
      <div>
        <h3>📋 Назначенные экзамены</h3>
        <div id="assignmentsList"></div>
      </div>
    </div>
  </div>
</main>

<footer class="gia-footer">
  <p>© 2026 СФСРЮ. Все права защищены пролетариатом.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://qeewwoklmjysactfhrum.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlZXd3b2tsbWp5c2FjdGZocnVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MTI2MTEsImV4cCI6MjA4NjQ4ODYxMX0.gWzqku1cS08v17kfJHJbOWbm-DRpzwQ9omlQsKxc96A';

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    db: { schema: 'education_gia' }
  });

  // Проверка прав доступа (только admin)
  let currentUser = null;
  try {
    currentUser = JSON.parse(sessionStorage.getItem('gia_user'));
    if (!currentUser || currentUser.role !== 'admin') window.location.href = './index.html';
  } catch(e) { window.location.href = './index.html'; }

  // Переключение вкладок
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
      document.getElementById(btn.dataset.tab + 'Tab').classList.add('active');
      loadDataForTab(btn.dataset.tab);
    });
  });

  function loadDataForTab(tab) {
    if (tab === 'ppe') loadPpe();
    if (tab === 'participants') loadParticipants();
    if (tab === 'experts') loadExperts();
    if (tab === 'register') loadAssignments();
  }

  // === ППЭ ===
  async function loadPpe() {
    const { data, error } = await supabase.from('ppe').select('*');
    if (error) return;
    const html = `<table><thead><tr><th>ID</th><th>Код</th><th>Название</th><th>Адрес</th><th>Действие</th></tr></thead><tbody>${
      data.map(p => `<tr><td>${p.id}</td><td>${p.code}</td><td>${p.name}</td><td>${p.address || ''}</td><td><button class="delete-btn" data-id="${p.id}" data-table="ppe">Удалить</button></td></tr>`).join('')
    }</tbody></table>`;
    document.getElementById('ppeList').innerHTML = html;
    attachDeleteHandlers();
  }
  document.getElementById('ppeForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const { error } = await supabase.from('ppe').insert([{
      code: document.getElementById('ppeCode').value,
      name: document.getElementById('ppeName').value,
      address: document.getElementById('ppeAddress').value
    }]);
    if (error) alert('Ошибка: ' + error.message);
    else {
      showSuccess('ppeSuccess', 'ППЭ добавлен');
      loadPpe();
      e.target.reset();
    }
  });

  // === Участники ===
  async function loadParticipants() {
    const { data, error } = await supabase.from('registered').select('*');
    if (error) return;
    const html = `<td><thead><tr><th>Личный код</th><th>ФИО</th><th>Дата рожд.</th><th>Тип ГИА</th><th>ОО</th><th>Действие</th></tr></thead><tbody>${
      data.map(u => `<tr><td>${u.personal_code}</td><td>${u.full_name}</td><td>${u.birth_date}</td><td>${u.gia_type}</td><td>${u.educational_org || ''}</td><td><button class="delete-btn" data-id="${u.personal_code}" data-table="registered" data-id-field="personal_code">Удалить</button></td></tr>`).join('')
    }</tbody></table>`;
    document.getElementById('participantsList').innerHTML = html;
    attachDeleteHandlers();
  }
  document.getElementById('participantForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const { error } = await supabase.from('registered').insert([{
      personal_code: document.getElementById('partPersonalCode').value,
      gia_code: document.getElementById('partGiaCode').value,
      full_name: document.getElementById('partFullName').value,
      birth_date: document.getElementById('partBirthDate').value,
      gia_type: document.getElementById('partGiaType').value,
      municipality: document.getElementById('partMunicipality').value,
      educational_org: document.getElementById('partEduOrg').value,
      class_name: document.getElementById('partClass').value
    }]);
    if (error) alert('Ошибка: ' + error.message);
    else {
      showSuccess('participantSuccess', 'Участник добавлен');
      loadParticipants();
      e.target.reset();
    }
  });

  // === Эксперты ===
  async function loadExperts() {
    const { data, error } = await supabase.from('experts').select('*');
    if (error) return;
    const html = `<table><thead><tr><th>Личный код</th><th>ФИО</th><th>Роль</th><th>ППЭ ID</th><th>Действие</th></tr></thead><tbody>${
      data.map(e => `<tr><td>${e.personal_code}</td><td>${e.full_name}</td><td>${e.role}</td><td>${e.ppe_id || ''}</td><td><button class="delete-btn" data-id="${e.personal_code}" data-table="experts" data-id-field="personal_code">Удалить</button></td></tr>`).join('')
    }</tbody></table>`;
    document.getElementById('expertsList').innerHTML = html;
    attachDeleteHandlers();
  }
  document.getElementById('expertForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const { error } = await supabase.from('experts').insert([{
      personal_code: document.getElementById('expPersonalCode').value,
      full_name: document.getElementById('expFullName').value,
      role: document.getElementById('expRole').value,
      ppe_id: parseInt(document.getElementById('expPpeId').value) || null
    }]);
    if (error) alert('Ошибка: ' + error.message);
    else {
      showSuccess('expertSuccess', 'Эксперт добавлен');
      loadExperts();
      e.target.reset();
    }
  });

  // === Регистрация на экзамены ===
  async function loadAssignments() {
    const { data, error } = await supabase.from('exam_assignments').select('*, registered(full_name)');
    if (error) return;
    const html = `<table><thead><tr><th>Участник</th><th>Предмет</th><th>Дата</th><th>Время</th><th>ППЭ ID</th><th>Действие</th></tr></thead><tbody>${
      data.map(a => `<tr><td>${a.registered?.full_name || a.personal_code}</td><td>${a.subject}</td><td>${a.exam_date}</td><td>${a.exam_time}</td><td>${a.ppe_name || ''}</td><td><button class="delete-btn" data-id="${a.id}" data-table="exam_assignments" data-id-field="id">Удалить</button></td></tr>`).join('')
    }</tbody></table>`;
    document.getElementById('assignmentsList').innerHTML = html;
    attachDeleteHandlers();
  }
  document.getElementById('registerExamForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const personalCode = document.getElementById('regPersonalCode').value;
    const subject = document.getElementById('regSubject').value;
    const examDate = document.getElementById('regExamDate').value;
    const examTime = document.getElementById('regExamTime').value;
    const ppeId = document.getElementById('regPpeId').value;
    let ppeName = null;
    if (ppeId) {
      const { data } = await supabase.from('ppe').select('name').eq('id', ppeId).single();
      ppeName = data?.name || null;
    }
    const { error } = await supabase.from('exam_assignments').insert([{
      personal_code: personalCode,
      subject: subject,
      exam_date: examDate,
      exam_time: examTime,
      ppe_name: ppeName,
      audience: document.getElementById('regAudience').value,
      place: document.getElementById('regPlace').value,
      status: 'scheduled'
    }]);
    if (error) alert('Ошибка: ' + error.message);
    else {
      showSuccess('registerSuccess', 'Экзамен назначен');
      loadAssignments();
      e.target.reset();
    }
  });

  // Удаление записей
  async function deleteRecord(table, id, idField = 'id') {
    if (!confirm('Удалить запись?')) return;
    const { error } = await supabase.from(table).delete().eq(idField, id);
    if (error) alert('Ошибка удаления: ' + error.message);
    else {
      alert('Удалено');
      if (table === 'ppe') loadPpe();
      if (table === 'registered') loadParticipants();
      if (table === 'experts') loadExperts();
      if (table === 'exam_assignments') loadAssignments();
    }
  }
  function attachDeleteHandlers() {
    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.removeEventListener('click', window.deleteHandler);
      const handler = () => deleteRecord(btn.dataset.table, btn.dataset.id, btn.dataset.idField || 'id');
      btn.addEventListener('click', handler);
      btn.deleteHandler = handler;
    });
  }
  function showSuccess(elId, msg) {
    const div = document.getElementById(elId);
    div.textContent = msg;
    div.style.display = 'block';
    setTimeout(() => div.style.display = 'none', 3000);
  }

  // Загружаем начальные данные
  loadPpe();
  loadParticipants();
  loadExperts();
  loadAssignments();

  document.getElementById('logoutBtn').addEventListener('click', (e) => {
    e.preventDefault();
    sessionStorage.clear();
    window.location.href = './index.html';
  });
</script>
</body>
</html>
