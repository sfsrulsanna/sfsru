<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Все свидетельства — Админ панель</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script type="importmap">
    { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
  </script>
</head>
<body>
  <header class="admin-header">...</header> <!-- аналогично главной -->

  <main class="admin-main">
    <div class="container">
      <h1 class="page-title">Все свидетельства</h1>

      <div class="filters">
        <select id="typeSelect">
          <option value="birth">Свидетельства о рождении</option>
          <option value="marriage">Свидетельства о браке</option>
          <option value="divorce">Свидетельства о разводе</option>
          <option value="adoption">Свидетельства об усыновлении</option>
        </select>

        <select id="statusFilter">
          <option value="">Все статусы</option>
          <option value="verified">Подтверждено</option>
          <option value="oncheck">На проверке</option>
          <option value="rejected">Отклонено</option>
          <option value="archived">Архивные</option>
        </select>

        <input type="text" id="searchInput" placeholder="Поиск по серии/номеру или ФИО">
        <button id="applyFilters" class="btn-primary">Применить</button>
      </div>

      <div id="loading" class="loading">Загрузка...</div>
      <div id="tableContainer"></div>
    </div>
  </main>

  <footer class="admin-footer">...</footer>

  <script type="module" src="js/certificates-common.js"></script>
  <script type="module" src="js/list.js"></script>
</body>
</html>
