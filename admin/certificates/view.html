    <!-- Общие стили -->
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Дополнительные стили -->
    <style>
        .details-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            margin: 1rem 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .details-table th {
            width: 30%;
            background: #f8f9fa;
            padding: 10px;
            text-align: right;
            font-weight: 600;
            border: 1px solid #dee2e6;
        }
        .details-table td {
            padding: 10px;
            border: 1px solid #dee2e6;
        }
        .actions {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .btn-verify, .btn-reject, .btn-archive, .btn-edit {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-verify { background: #28a745; color: white; }
        .btn-reject { background: #dc3545; color: white; }
        .btn-archive { background: #ffc107; color: #212529; }
        .btn-edit { background: #007bff; color: white; }
        .btn-verify:disabled, .btn-reject:disabled, .btn-archive:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
    <!-- Supabase import map -->
    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
            }
        }
    </script>
</head>
<body>
    <!-- Хедер админки -->
    <header class="admin-header">
        <div class="admin-header-container">
            <div class="admin-logo">
                <img src="../../images/gerb.png" alt="Герб СФСРЮ" height="40">
                <span>СФСРЮ / Просмотр свидетельства</span>
            </div>
            <div class="admin-user">
                <span id="adminEmail"></span>
                <button id="logoutBtn" class="btn-logout" title="Выйти">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="admin-main">
        <div class="container">
            <h1 id="certTitle" class="page-title">Просмотр свидетельства</h1>

            <!-- Индикатор загрузки -->
            <div id="loading" class="loading">Загрузка...</div>

            <!-- Блок ошибки -->
            <div id="error" style="display: none; color: red; text-align: center; padding: 2rem;"></div>

            <!-- Блок отображения данных -->
            <div id="certificateDisplay" style="display: none;"></div>

            <!-- Кнопка назад -->
            <a href="list.html" class="btn-secondary" style="margin-top: 20px; display: inline-block;">← Назад к списку</a>
        </div>
    </main>

    <footer class="admin-footer">
        <p>&copy; 2026 СФСРЮ. Все действия протоколируются.</p>
    </footer>

    <!-- Подключаем модули -->
    <script type="module" src="js/certificates-common.js"></script>
    <script type="module" src="js/view.js"></script>
</body>
</html>
