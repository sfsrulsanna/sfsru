<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Админ панель</title>
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-lock fa-3x"></i>
                <h1>Доступ администратора</h1>
                <p>Используйте учетные данные администратора</p>
            </div>
            
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-user-shield"></i> Администратор
                    </label>
                    <input type="email" id="email" 
                           value="sfsru@admin.su" 
                           readonly
                           class="form-control email-field">
                    <small class="text-muted">Это единственный разрешенный email</small>
                </div>
                
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-key"></i> Пароль
                    </label>
                    <input type="password" id="password" 
                           class="form-control" 
                           placeholder="Введите пароль администратора"
                           required
                           autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-sign-in-alt"></i> Войти в панель управления
                </button>
                
                <div id="errorMessage" class="alert alert-error mt-3" style="display: none;"></div>
                
                <div class="mt-3 text-center text-muted">
                    <small>
                        <i class="fas fa-info-circle"></i>
                        Все действия записываются в лог
                    </small>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
