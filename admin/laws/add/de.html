    <style>
        .admin-form {
            max-width: 800px; margin: 0 auto; background: rgba(255, 250, 250, 0.7);
            backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255, 180, 180, 0.3);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08); padding: 2rem; color: #333;
        }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #a00; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 10px;
            background: rgba(255, 255, 255, 0.8); font-size: 1rem; transition: 0.2s; box-sizing: border-box;
        }
        .form-group input:focus, .form-group select:focus { border-color: #c00; outline: none; box-shadow: 0 0 0 3px rgba(192,0,0,0.1); }
        .form-row { display: flex; gap: 1rem; flex-wrap: wrap; }
        .form-row .form-group { flex: 1; min-width: 200px; }
        .checkbox-group { display: flex; align-items: center; gap: 0.5rem; margin-top: 10px; }
        .checkbox-group input { width: auto; margin: 0; accent-color: #a00; }
        .submit-btn {
            width: 100%; padding: 1rem; background: #a00; color: #fff; border: none; border-radius: 10px;
            font-size: 1.1rem; cursor: pointer; transition: 0.3s; margin-top: 1.5rem;
        }
        .submit-btn:hover { background: #c00; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(192,0,0,0.3); }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
        .msg { padding: 1rem; border-radius: 8px; margin-top: 1rem; display: none; text-align: center; }
        .msg.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .msg.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        @media (max-width: 768px) { .admin-form { padding: 1.5rem; } }
    </style>
</head>
<body>
    <nav>
        <a href="../../../../index.html">Главная</a>
        <a href="../../../../news.html">Новости</a>
        <a href="../../../../wiki/">Википедия</a>
        <a href="../../../../healthcare.html">Здравоохранение</a>

    </nav>

    <div class="main-content">
        <div class="laws-intro">
            <h1>Добавление нового законодательного акта</h1>
            <div style="color:#777; font-size:0.9rem; margin-bottom:15px;">Админ-панель → Загрузка документов</div>
        </div>

        <form id="decreeForm" class="admin-form">
            <div class="form-group">
                <label for="pdfFile">Файл (PDF)</label>
                <input type="file" id="pdfFile" accept=".pdf" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="number">Номер</label>
                    <input type="text" id="number" placeholder="№055" required>
                </div>
                <div class="form-group">
                    <label for="date">Дата подписания</label>
                    <input type="date" id="date" required>
                </div>
            </div>

            <div class="form-group">
                <label for="title">Название</label>
                <input type="text" id="title" placeholder="«О внесении изменений...»" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="year">Год</label>
                    <input type="number" id="year" placeholder="2026" required>
                </div>
                <div class="form-group">
                    <label for="sortOrder">Порядок (sort_order)</label>
                    <input type="number" id="sortOrder" placeholder="Авто" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="bucketName">Бакет хранения</label>
                    <select id="bucketName">
                        <option value="laws-files1">laws-files1 (Основной)</option>
                        <option value="laws-files2">laws-files2 (Архив/Доп)</option>
                        <option value="laws-files3">laws-files3</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="bucketPath">Путь в бакете</label>
                    <input type="text" id="bucketPath" value="de/" placeholder="de/" required>
                </div>
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" id="isActive" checked>
                <label for="isActive" style="margin:0; color:#333; font-weight:500;">Указ действует?</label>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">📤 Загрузить и сохранить</button>
            <div id="statusMsg" class="msg"></div>
        </form>
    </div>

    <footer style="text-align:center; margin-top:40px; padding:20px 0; color:#666; font-size:0.85rem; border-top:1px solid #ddd;">
        © 2026 СФСРЮ. Все права защищены пролетариатом.<br>
        Телефон: +7 (993) 609-81-26 | Почта: <a href="mailto:sfsr.ulsanna@gmail.com" style="color:#666; text-decoration:none;">sfsr.ulsanna@gmail.com</a>
    </footer>
<script>
(function() {
    'use strict';

    // 🔧 ВСТАВЬТЕ СВОИ ДАННЫЕ
const SUPABASE_URL = 'https://qeewwoklmjysactfhrum.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlZXd3b2tsbWp5c2FjdGZocnVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MTI2MTEsImV4cCI6MjA4NjQ4ODYxMX0.gWzqku1cS08v17kfJHJbOWbm-DRpzwQ9omlQsKxc96A';

    // Проверка загрузки CDN
    if (!window.supabase || typeof window.supabase.createClient !== 'function') {
        alert('❌ Supabase не загрузился. Проверьте интернет или отключите блокировщики.');
        return;
    }

    // Инициализация клиента
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        db: { schema: 'laws' }
    });

    // Элементы формы
    const els = {
        form: document.getElementById('decreeForm'),
        file: document.getElementById('pdfFile'),
        number: document.getElementById('number'),
        date: document.getElementById('date'),
        title: document.getElementById('title'),
        year: document.getElementById('year'),
        sortOrder: document.getElementById('sortOrder'),
        bucket: document.getElementById('bucketName'),
        path: document.getElementById('bucketPath'),
        active: document.getElementById('isActive'),
        btn: document.getElementById('submitBtn'),
        msg: document.getElementById('statusMsg')
    };

    // Автозаполнение года из даты
    els.date.addEventListener('change', () => {
        if (els.date.value) els.year.value = els.date.value.split('-')[0];
    });

    // Получение следующего sort_order
    async function getNextSortOrder() {
        try {
            const { data } = await sb.from('president_decrees')
                .select('sort_order')
                .order('sort_order', { ascending: false })
                .limit(1);
            return (data?.[0]?.sort_order || 0) + 1;
        } catch { return 1; }
    }

    // Показать сообщение
    function showMsg(text, type) {
        els.msg.textContent = text;
        els.msg.className = 'msg ' + type;
        els.msg.style.display = 'block';
        setTimeout(() => { els.msg.style.display = 'none'; }, 6000);
    }

    // Очистка строки: только латиница, цифры, дефис, точка, подчёркивание
    function toAscii(str) {
        return str.replace(/[^a-zA-Z0-9-_.]/g, '').toLowerCase();
    }

    // Загрузка файла в Storage
    async function uploadToStorage(bucket, filePath, file) {
        const fileName = filePath.split('/').pop();
        
        // Создаём новый File с чистым именем и типом
        const cleanFile = new File([file], fileName, {
            type: 'application/pdf',
            lastModified: file.lastModified
        });

        // Загружаем с минимальными опциями
        const { data, error } = await sb.storage
            .from(bucket)
            .upload(filePath, cleanFile, {
                upsert: true,
                contentType: 'application/pdf'
            });

        if (error) throw new Error('Storage: ' + error.message);
        return data;
    }

    // Обработчик отправки формы
    els.form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const file = els.file.files?.[0];
        if (!file) { showMsg('❌ Выберите PDF файл', 'error'); return; }
        if (file.type !== 'application/pdf') { showMsg('❌ Только формат PDF', 'error'); return; }

        els.btn.disabled = true;
        els.btn.textContent = '⏳ Загрузка...';
        els.msg.style.display = 'none';

        try {
            // 1. Формируем пути
            const num = toAscii(els.number.value);
            const date = els.date.value.replace(/-/g, '');
            let p = els.path.value.trim().replace(/[^a-zA-Z0-9/_.-]/g, '');
            if (p && !p.endsWith('/')) p += '/';
            
            const fileName = `${date}-${num}.pdf`;
            const fullPath = p + fileName;
            const bucket = els.bucket.value;

            // 2. Загружаем файл
            await uploadToStorage(bucket, fullPath, file);

            // 3. Сохраняем запись в БД
            const { error: dbError } = await sb.from('president_decrees').insert({
                filename: fileName,
                number: els.number.value,
                date_issued: els.date.value,
                title: els.title.value,
                is_active: els.active.checked,
                year: parseInt(els.year.value) || new Date(els.date.value).getFullYear(),
                sort_order: parseInt(els.sortOrder.value) || await getNextSortOrder(),
                bucket_name: bucket,
                bucket_path: p
            });

            if (dbError) {
                // Откат: удаляем файл если запись не удалась
                await sb.storage.from(bucket).remove([fullPath]);
                throw new Error('БД: ' + dbError.message);
            }

            // Успех
            showMsg('✅ Указ добавлен: ' + fullPath, 'success');
            
            // Сброс формы
            els.form.reset();
            els.sortOrder.value = (parseInt(els.sortOrder.value) || 0) + 1;
            els.year.value = '';
            els.active.checked = true;
            els.path.value = 'de/';
            els.file.focus();

        } catch (err) {
            console.error('Admin error:', err);
            showMsg('❌ ' + err.message, 'error');
        } finally {
            els.btn.disabled = false;
            els.btn.textContent = '📤 Загрузить и сохранить';
        }
    });

    // Инициализация
    (async function init() {
        els.sortOrder.value = await getNextSortOrder();
        // Экспорт для отладки в консоли
        window.sb = sb;
    })();

})();
</script>
</body>
