<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход для администратора — СФСРЮ</title>
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Supabase JS (используем import map) -->
    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
            }
        }
    </script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-lock fa-3x"></i>
                <h1>Доступ администратора</h1>
                <p>Введите учётные данные</p>
            </div>
            
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i> Email
                    </label>
                    <input type="email" id="email" class="form-control" 
                           placeholder="admin@example.com" required autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-key"></i> Пароль
                    </label>
                    <input type="password" id="password" class="form-control" 
                           placeholder="Пароль" required autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-sign-in-alt"></i> Войти
                </button>
                
                <div id="errorMessage" class="alert alert-error mt-3" style="display: none;"></div>
            </form>
        </div>
    </div>

    <script type="module">
        import { supabase } from '../../js/supabase-config.js';

        const ADMIN_EMAIL = 'sfsru@admin.su'; // Ожидаемый email администратора

        // Проверяем, не залогинен ли уже администратор
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                // Проверим роль
                const { data: profile } = await supabase
                    .from('users')
                    .select('role')
                    .eq('id', session.user.id)
                    .single();
                    
                if (profile?.role === 'admin') {
                    window.location.href = 'index.html';
                } else {
                    // Если роль не admin, разлогиниваем
                    await supabase.auth.signOut();
                }
            }
        }
        checkSession();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            try {
                // Проверка, что email именно администратора (опционально, можно сделать в БД)
                if (email !== ADMIN_EMAIL) {
                    throw new Error('Доступ разрешён только для администратора');
                }

                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) throw error;

                // После успешного входа проверяем роль в таблице users
                const { data: profile, error: profileError } = await supabase
                    .from('users')
                    .select('role')
                    .eq('id', data.user.id)
                    .single();

                if (profileError || profile?.role !== 'admin') {
                    // Если роль не admin – разлогиниваем и выдаём ошибку
                    await supabase.auth.signOut();
                    throw new Error('Учётная запись не имеет прав администратора');
                }

                // Всё хорошо – перенаправляем на главную админки
                window.location.href = 'index.html';

            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
