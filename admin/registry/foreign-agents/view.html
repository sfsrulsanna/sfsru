    <script type="module">
        import { supabase } from '../../../js/supabase-config.js';
        import { requireAdmin } from '../../certificates/js/certificates-common.js';

        let recordId = null;
        let recordType = null;
        let recordData = null;

        function escapeHTML(unsafe) {
            if (!unsafe) return '';
            return unsafe.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function formatDate(dateStr) {
            if (!dateStr) return '—';
            try {
                return new Date(dateStr).toLocaleDateString('ru-RU');
            } catch {
                return dateStr;
            }
        }

        function linkifyList(text) {
            if (!text || text === '—') return '—';
            let items = text.split(',').map(s => s.trim()).filter(s => s !== '');
            let linked = items.map(item => {
                if (item.includes('@') && !item.startsWith('http')) {
                    return `<a href="mailto:${escapeHTML(item)}">${escapeHTML(item)}</a>`;
                }
                if (/^[\+]?[\d\s\(\)\-]{5,}$/.test(item.replace(/\s/g, ''))) {
                    let cleaned = item.replace(/[^\d+]/g, '');
                    return `<a href="tel:${escapeHTML(cleaned)}">${escapeHTML(item)}</a>`;
                }
                if (/^https?:\/\//i.test(item)) {
                    return `<a href="${escapeHTML(item)}" target="_blank">${escapeHTML(item)}</a>`;
                }
                return escapeHTML(item);
            });
            return linked.join(', ');
        }

        async function loadRecord() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const type = urlParams.get('type');
            if (!id || !type) {
                document.getElementById('error').textContent = 'Не указан ID или тип записи';
                document.getElementById('error').classList.remove('hidden');
                document.getElementById('loading').classList.add('hidden');
                return;
            }
            recordId = id;
            recordType = type;

            const table = type === 'individual' ? 'foreign_agents' : 'foreign_agents_org';
            const { data, error } = await supabase
                .schema('registry')
                .from(table)
                .select('*')
                .eq('id', id)
                .single();

            if (error || !data) {
                document.getElementById('error').textContent = 'Запись не найдена';
                document.getElementById('error').classList.remove('hidden');
                document.getElementById('loading').classList.add('hidden');
                return;
            }
            recordData = data;
            renderDetails(data, type);
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('detailsContainer').classList.remove('hidden');
        }

        function renderDetails(data, type) {
            let fields = [];
            if (type === 'individual') {
                fields = [
                    ['№ п/п', data.serial_number || data.id],
                    ['ФИО', data.full_name],
                    ['Псевдоним', data.alias || '—'],
                    ['Основания для включения', data.reason || '—'],
                    ['Дата включения', formatDate(data.inclusion_date)],
                    ['Дата исключения', formatDate(data.exclusion_date)],
                    ['Доменное имя', linkifyList(data.domain || '—')],
                    ['Тип иностранного агента', data.type || '—'],
                    ['ИНН', data.inn || '—'],
                    ['СНИЛС', data.nss || '—'],
                    ['Дата рождения', data.birth_date ? formatDate(data.birth_date) : '—'],
                    ['Email', linkifyList(data.email || '—')],
                    ['Телефоны', linkifyList(data.phone_number || '—')],
                    ['Номер спецсчета', data.account_number || '—'],
                    ['Банк', data.bank_name || '—'],
                    ['БИК', data.bic || '—'],
                    ['Корр. счёт', data.corr_account || '—'],
                    ['Дата открытия счёта', formatDate(data.account_open_date)],
                    ['Дополнительные данные', data.more || '—']
                ];
            } else {
                fields = [
                    ['№ п/п', data.serial_number || data.id],
                    ['Полное наименование', data.org_name],
                    ['Краткое название', data.org_short_name || '—'],
                    ['ИНН', data.inn || '—'],
                    ['ОГРН', data.ogrn || '—'],
                    ['Дата образования', formatDate(data.establishment_date)],
                    ['Руководитель', data.head || '—'],
                    ['Участники', data.participants || '—'],
                    ['Основания для включения', data.reason || '—'],
                    ['Дата включения', formatDate(data.inclusion_date)],
                    ['Дата исключения', formatDate(data.exclusion_date)],
                    ['Доменное имя', linkifyList(data.domain || '—')],
                    ['Тип иностранного агента', data.type || '—'],
                    ['Адрес', data.address || '—'],
                    ['Email', linkifyList(data.email || '—')],
                    ['Телефоны', linkifyList(data.phone_number || '—')],
                    ['Номер спецсчета', data.account_number || '—'],
                    ['Банк', data.bank_name || '—'],
                    ['БИК', data.bic || '—'],
                    ['Корр. счёт', data.corr_account || '—'],
                    ['Дата открытия счёта', formatDate(data.account_open_date)],
                    ['Дополнительные данные', data.more || '—']
                ];
            }

            const container = document.getElementById('detailsTable');
            container.innerHTML = fields.map(([label, value]) => `
                <tr>
                    <th>${escapeHTML(label)}</th>
                    <td>${value === null || value === undefined ? '—' : value}</td>
                </tr>
            `).join('');
        }

        async function deleteRecord() {
            if (!confirm('Вы уверены, что хотите удалить эту запись? Действие необратимо.')) return;
            const table = recordType === 'individual' ? 'foreign_agents' : 'foreign_agents_org';
            const { error } = await supabase
                .schema('registry')
                .from(table)
                .delete()
                .eq('id', recordId);
            if (error) {
                alert('Ошибка удаления: ' + error.message);
                return;
            }
            alert('Запись удалена');
            window.location.href = 'all.html';
        }

        function editRecord() {
            window.location.href = `edit.html?id=${recordId}&type=${recordType}`;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (!await requireAdmin()) return;

            const { data: { user } } = await supabase.auth.getUser();
            if (user?.email) document.getElementById('adminEmail').textContent = user.email;

            await loadRecord();

            document.getElementById('editBtn').addEventListener('click', editRecord);
            document.getElementById('deleteBtn').addEventListener('click', deleteRecord);
            document.getElementById('logoutBtn').addEventListener('click', async () => {
                await supabase.auth.signOut();
                window.location.href = '../../login.html';
            });
        });
    </script>
