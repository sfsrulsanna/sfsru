<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Голосование — СФСРЮ</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; color: #222; min-height: 100vh; display: flex; flex-direction: column; line-height: 1.6; }
    a { text-decoration: none; color: inherit; }
    ul { list-style: none; }

    .header {
      background: linear-gradient(135deg, #ff6666, #cc0000);
      padding: 1rem 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    .header-container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      padding: 0 2rem;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo img { height: 52px; width: auto; }
    .logo h1 { font-size: 1.7rem; font-weight: 800; color: white; }
    .nav-menu ul { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .nav-menu a {
      padding: 0.6rem 1.2rem;
      border-radius: 50px;
      background: rgba(255,255,255,0.25);
      border: 1px solid rgba(255,255,255,0.3);
      font-weight: 600;
      color: white;
      transition: 0.3s;
    }
    .nav-menu a:hover { background: rgba(255,255,255,0.45); transform: translateY(-2px); }
    .menu-toggle { display: none; }

    .main-content { flex: 1; padding: 2.5rem 1.5rem; }
    .container { max-width: 800px; margin: 0 auto; }

    .back-pill {
      display: inline-block;
      padding: 0.4rem 1.2rem;
      background: #7b0000;
      color: white;
      border-radius: 50px;
      font-weight: 600;
      margin-bottom: 1.5rem;
      cursor: pointer;
      transition: 0.2s;
      border: none;
    }
    .back-pill:hover { opacity: 0.85; }

    .vote-detail {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
      border: 1px solid #eee;
    }
    .vote-detail .vote-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: #7b0000;
      margin-bottom: 0.5rem;
    }
    .vote-detail .vote-meta {
      color: #555;
      margin-bottom: 1rem;
    }
    .vote-detail .vote-meta span {
      display: inline-block;
      margin-right: 1.5rem;
    }
    .vote-detail .vote-description {
      margin: 1.5rem 0;
      padding: 1rem;
      background: #f8f9fa;
      border-radius: 8px;
      border-left: 4px solid #7b0000;
    }

    .candidate-list {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      margin: 2rem 0;
    }
    .candidate-item {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      padding: 1rem;
      border: 1px solid #eee;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
    }
    .candidate-item:hover { background: #f5f5f5; }
    .candidate-item.selected { border-color: #7b0000; background: #fff0f0; }
    .candidate-item img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #ddd;
    }
    .candidate-item .candidate-info {
      flex: 1;
    }
    .candidate-item .candidate-name {
      font-size: 1.2rem;
      font-weight: 700;
    }
    .candidate-item .candidate-desc {
      color: #666;
      font-size: 0.9rem;
    }
    .candidate-item .candidate-percent {
      font-weight: 700;
      color: #7b0000;
      font-size: 1.1rem;
      margin-left: 1rem;
    }
    .candidate-item input[type="radio"] {
      display: none;
    }

    .referendum-question {
      margin: 1.5rem 0;
      padding: 1rem;
      background: #fafafa;
      border-radius: 12px;
      border: 1px solid #eee;
    }
    .referendum-question .question-text {
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 0.8rem;
    }
    .referendum-options {
      display: flex;
      gap: 1rem;
    }
    .referendum-option {
      flex: 1;
      padding: 0.6rem;
      text-align: center;
      border: 2px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
      background: white;
    }
    .referendum-option:hover { background: #f0f0f0; }
    .referendum-option.selected { border-color: #7b0000; background: #fff0f0; }
    .referendum-option .answer-text {
      font-weight: 600;
      font-size: 1.1rem;
    }
    .referendum-option .answer-percent {
      font-size: 0.9rem;
      color: #7b0000;
      margin-top: 0.2rem;
    }
    .referendum-option input[type="radio"] {
      display: none;
    }

    .vote-actions {
      margin-top: 2rem;
      text-align: center;
    }
    .vote-actions .btn-vote {
      padding: 0.8rem 3rem;
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 600;
      background: linear-gradient(135deg, #7b0000, #c41e3a);
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }
    .vote-actions .btn-vote:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .vote-actions .btn-vote:not(:disabled):hover { opacity: 0.85; }
    .vote-actions .already-voted {
      color: #28a745;
      font-weight: 600;
      margin-top: 1rem;
    }
    .vote-actions .error-message {
      color: #dc3545;
      font-weight: 500;
      margin-top: 1rem;
      padding: 0.8rem;
      background: #f8d7da;
      border-radius: 8px;
    }
    .vote-actions .info-message {
      color: #856404;
      font-weight: 500;
      margin-top: 1rem;
      padding: 0.8rem;
      background: #fff3cd;
      border-radius: 8px;
    }

    .footer {
      background: linear-gradient(135deg, #ff6666, #cc0000);
      padding: 1.8rem;
      text-align: center;
      color: white;
      margin-top: auto;
    }
    .footer a { color: #ffdddd; text-decoration: underline; }

    .loading { text-align: center; padding: 3rem; color: #666; }

    @media (max-width: 768px) {
      .header-container { flex-direction: row; justify-content: space-between; padding: 0 1rem; }
      .menu-toggle { display: block; background: transparent; border: none; cursor: pointer; padding: 8px; width: 40px; height: 40px; position: relative; }
      .menu-toggle-line { display: block; width: 100%; height: 3px; background: white; border-radius: 2px; position: absolute; left: 0; transition: 0.3s; }
      .menu-toggle-line:nth-child(1) { top: 10px; }
      .menu-toggle-line:nth-child(2) { top: 18px; }
      .menu-toggle-line:nth-child(3) { top: 26px; }
      .nav-menu { position: fixed; top: 0; right: -100%; width: 80%; max-width: 320px; height: 100vh; background: linear-gradient(135deg, #ff6666, #cc0000); z-index: 99; padding: 80px 20px 40px; transition: right 0.4s; overflow-y: auto; }
      .nav-menu.active { right: 0; }
      .nav-menu ul { flex-direction: column; gap: 0; }
      .nav-menu a { display: block; padding: 16px 20px; margin: 8px 0; background: rgba(255,255,255,0.15); border-radius: 12px; font-size: 1.1rem; text-align: left; border: 1px solid rgba(255,255,255,0.2); }
      .menu-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(3px); z-index: 98; opacity: 0; transition: 0.3s; }
      .menu-overlay.active { display: block; opacity: 1; }
      .candidate-item { flex-wrap: wrap; }
      .referendum-options { flex-direction: column; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-container">
      <div class="logo">
        <img src="/images/gerb.png" alt="Герб СФСРЮ" />
        <h1>СФСРЮ</h1>
      </div>
      <button class="menu-toggle" aria-label="Открыть меню">
        <span class="menu-toggle-line"></span>
        <span class="menu-toggle-line"></span>
        <span class="menu-toggle-line"></span>
      </button>
      <nav class="nav-menu">
        <ul>
          <li><a href="/index.html">Главная</a></li>
          <li><a href="/news.html">Новости</a></li>
          <li><a href="/wiki/">Википедия</a></li>
          <li><a href="/healthcare.html">Здравоохранение</a></li>
          <li><a href="/services.html">Услуги</a></li>
          <li><a href="/profile.html">Личный кабинет</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <div class="menu-overlay"></div>

  <main class="main-content">
    <div class="container">
      <button class="back-pill" onclick="history.back()">← Назад к списку</button>

      <div id="loading" class="loading">Загрузка данных...</div>

      <div id="voteDetail" class="vote-detail" style="display: none;">
        <h2 class="vote-title" id="voteTitle"></h2>
        <div class="vote-meta" id="voteMeta"></div>
        <div class="vote-description" id="voteDescription"></div>

        <div id="optionsContainer"></div>

        <div class="vote-actions" id="voteActions">
          <button class="btn-vote" id="voteBtn" disabled>Проголосовать</button>
          <div id="voteStatus"></div>
        </div>
      </div>

      <div id="errorMessage" class="vote-actions error-message" style="display: none;"></div>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2026 СФСРЮ. Все права защищены пролетариатом.</p>
    <p>Телефон: +7 (993) 609-81-26 | Почта: <a href="mailto:sfsr.ulsanna@gmail.com">sfsr.ulsanna@gmail.com</a></p>
  </footer>

  <script type="importmap">
    { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
  </script>
  <script type="module">
    import { supabase } from '../../js/supabase-config.js';

    const loadingEl = document.getElementById('loading');
    const voteDetailEl = document.getElementById('voteDetail');
    const voteTitleEl = document.getElementById('voteTitle');
    const voteMetaEl = document.getElementById('voteMeta');
    const voteDescriptionEl = document.getElementById('voteDescription');
    const optionsContainer = document.getElementById('optionsContainer');
    const voteBtn = document.getElementById('voteBtn');
    const voteStatus = document.getElementById('voteStatus');
    const errorMessageEl = document.getElementById('errorMessage');

    const urlParams = new URLSearchParams(window.location.search);
    const voteId = urlParams.get('id');

    const PHOTO_BUCKET = 'votes_photo_private';

    function formatDate(dateStr) {
      if (!dateStr) return '—';
      try {
        const d = new Date(dateStr);
        return d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
      } catch { return dateStr; }
    }

    function showError(msg) {
      loadingEl.style.display = 'none';
      voteDetailEl.style.display = 'none';
      errorMessageEl.style.display = 'block';
      errorMessageEl.textContent = msg;
    }

    async function checkRegion(userId, territory) {
      if (territory === 'Вся территория СФСРЮ') return true;
      const { data: permData } = await supabase
        .schema('addresses')
        .from('permanent_registration')
        .select('region_id')
        .eq('user_id', userId)
        .maybeSingle();
      if (!permData?.region_id) return false;
      const { data: regionData } = await supabase
        .schema('addresses')
        .from('regions')
        .select('name')
        .eq('id', permData.region_id)
        .single();
      return regionData?.name === territory;
    }

    async function checkAccountType(userId) {
      const { data } = await supabase
        .from('users')
        .select('account_type')
        .eq('id', userId)
        .single();
      return data?.account_type || 'Не подтверждена';
    }

    function disableVoting() {
      document.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = true);
      document.querySelectorAll('.candidate-item, .referendum-option').forEach(el => el.style.cursor = 'default');
      voteBtn.disabled = true;
      voteStatus.innerHTML = '<div class="already-voted">Вы уже проголосовали</div>';
    }

    async function loadVote() {
      try {
        const { data: { user }, error: userError } = await supabase.auth.getUser();
        if (userError || !user) { showError('Необходимо авторизоваться'); return; }

        // Определяем тип голосования
        const tables = [
          { name: 'federal_elections', type: 'federal_election' },
          { name: 'regional_elections', type: 'regional_election' },
          { name: 'federal_referendums', type: 'federal_referendum' },
          { name: 'regional_referendums', type: 'regional_referendum' }
        ];
        let voteData = null, voteType = null;
        for (const t of tables) {
          const { data } = await supabase
            .schema('votes')
            .from(t.name)
            .select('*')
            .eq('id', voteId)
            .maybeSingle();
          if (data) { voteData = data; voteType = t.type; break; }
        }
        if (!voteData) { showError('Голосование не найдено'); return; }

        const regionOk = await checkRegion(user.id, voteData.territory);
        if (!regionOk) { showError('Ваш регион не соответствует'); return; }
        const accType = await checkAccountType(user.id);
        if (accType !== 'Подтверждённая') { showError('Учётная запись не подтверждена'); return; }

        // Загружаем варианты
        const { data: options, error: optErr } = await supabase
          .schema('votes')
          .from('options')
          .select('*')
          .eq('vote_id', voteId)
          .eq('vote_type', voteType);
        if (optErr) { showError('Ошибка загрузки вариантов'); return; }

        // Проверка, голосовал ли уже
        const { data: userVote } = await supabase
          .schema('votes')
          .from('user_votes')
          .select('option_id')
          .eq('user_id', user.id)
          .eq('vote_id', voteId)
          .maybeSingle();
        const hasVoted = !!userVote;

        // Статистика голосов
        const { data: allVotes } = await supabase
          .schema('votes')
          .from('user_votes')
          .select('option_id')
          .eq('vote_id', voteId);
        const total = allVotes?.length || 0;
        const counts = {};
        allVotes?.forEach(v => { counts[v.option_id] = (counts[v.option_id] || 0) + 1; });

        // Получаем signed URL для фото (если есть)
        const optionsWithPhoto = await Promise.all(options.map(async (opt) => {
          let photoUrl = null;
          if (opt.photo_url) {
            const { data, error } = await supabase
              .storage
              .from(PHOTO_BUCKET)
              .createSignedUrl(opt.photo_url, 60);
            if (!error && data) {
              photoUrl = data.signedUrl;
            } else {
              console.error('Ошибка получения signed URL:', error);
            }
          }
          return { ...opt, photoUrl };
        }));

        // --- Отрисовка ---
        voteTitleEl.textContent = voteData.title;
        voteMetaEl.innerHTML = `
          <span>Регион: ${voteData.territory}</span>
          <span>Начало: ${formatDate(voteData.start_date)}</span>
          <span>Окончание: ${formatDate(voteData.end_date)}</span>
          <span>Статус: ${voteData.status === 'active' ? 'Активно' : 'Завершено'}</span>
        `;
        voteDescriptionEl.textContent = voteData.description || 'Описание отсутствует';

        optionsContainer.innerHTML = '';

        const isElection = voteType.includes('election');
        const isReferendum = voteType.includes('referendum');

        if (isElection) {
          // Выборы – кандидаты
          const list = document.createElement('div');
          list.className = 'candidate-list';
          optionsWithPhoto.forEach(opt => {
            const percent = total > 0 ? Math.round((counts[opt.id] || 0) / total * 100) : 0;
            const div = document.createElement('div');
            div.className = 'candidate-item';
            if (hasVoted && userVote.option_id === opt.id) div.classList.add('selected');
            if (hasVoted || voteData.status !== 'active') div.style.cursor = 'default';

            const radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'voteOption';
            radio.value = opt.id;
            if (hasVoted && userVote.option_id === opt.id) radio.checked = true;
            if (hasVoted || voteData.status !== 'active') radio.disabled = true;

            const img = document.createElement('img');
            img.src = opt.photoUrl || '/images/default-avatar.png';
            img.alt = opt.text;
            img.onerror = () => { img.src = '/images/default-avatar.png'; };

            const info = document.createElement('div');
            info.className = 'candidate-info';
            const name = document.createElement('div');
            name.className = 'candidate-name';
            name.textContent = opt.text;
            const desc = document.createElement('div');
            desc.className = 'candidate-desc';
            desc.textContent = opt.description || '';
            info.appendChild(name);
            info.appendChild(desc);

            const percentSpan = document.createElement('div');
            percentSpan.className = 'candidate-percent';
            percentSpan.textContent = `${percent}%`;

            div.appendChild(radio);
            div.appendChild(img);
            div.appendChild(info);
            div.appendChild(percentSpan);
            list.appendChild(div);

            div.addEventListener('click', () => {
              if (radio.disabled) return;
              document.querySelectorAll('.candidate-item').forEach(el => el.classList.remove('selected'));
              div.classList.add('selected');
              radio.checked = true;
              voteBtn.disabled = false;
            });
          });
          optionsContainer.appendChild(list);
        } else if (isReferendum) {
          // Референдум – группируем по question_text
          const groups = {};
          optionsWithPhoto.forEach(opt => {
            const q = opt.question_text || 'Без вопроса';
            if (!groups[q]) groups[q] = [];
            groups[q].push(opt);
          });
          for (const [question, opts] of Object.entries(groups)) {
            const block = document.createElement('div');
            block.className = 'referendum-question';
            const qText = document.createElement('div');
            qText.className = 'question-text';
            qText.textContent = question;
            block.appendChild(qText);

            const optsDiv = document.createElement('div');
            optsDiv.className = 'referendum-options';
            opts.forEach(opt => {
              const percent = total > 0 ? Math.round((counts[opt.id] || 0) / total * 100) : 0;
              const div = document.createElement('div');
              div.className = 'referendum-option';
              if (hasVoted && userVote.option_id === opt.id) div.classList.add('selected');
              if (hasVoted || voteData.status !== 'active') div.style.cursor = 'default';

              const radio = document.createElement('input');
              radio.type = 'radio';
              radio.name = `voteOption_${opt.id}`;
              radio.value = opt.id;
              if (hasVoted && userVote.option_id === opt.id) radio.checked = true;
              if (hasVoted || voteData.status !== 'active') radio.disabled = true;

              const answerSpan = document.createElement('div');
              answerSpan.className = 'answer-text';
              answerSpan.textContent = opt.text;

              const percentSpan = document.createElement('div');
              percentSpan.className = 'answer-percent';
              percentSpan.textContent = `${percent}%`;

              div.appendChild(radio);
              div.appendChild(answerSpan);
              div.appendChild(percentSpan);
              optsDiv.appendChild(div);

              div.addEventListener('click', () => {
                if (radio.disabled) return;
                optsDiv.querySelectorAll('.referendum-option').forEach(el => el.classList.remove('selected'));
                div.classList.add('selected');
                radio.checked = true;
                voteBtn.disabled = false;
              });
            });
            block.appendChild(optsDiv);
            optionsContainer.appendChild(block);
          }
        }

        // --- Настройка кнопки ---
        if (hasVoted) {
          disableVoting();
        } else if (voteData.status !== 'active') {
          voteBtn.disabled = true;
          voteStatus.innerHTML = '<div class="info-message">Голосование завершено</div>';
        } else {
          voteBtn.disabled = true;
          voteStatus.innerHTML = '';
        }

        // Обработчик голосования
        voteBtn.onclick = async () => {
          const selected = document.querySelector('input[name="voteOption"]:checked') ||
                           document.querySelector('input[type="radio"]:checked');
          if (!selected) { alert('Выберите вариант'); return; }
          const optionId = selected.value;
          const { error } = await supabase
            .schema('votes')
            .from('user_votes')
            .insert([{ user_id: user.id, vote_id: voteId, option_id: optionId }]);
          if (error) { alert('Ошибка: ' + error.message); return; }
          alert('Голос учтён!');
          disableVoting();
          setTimeout(() => window.location.reload(), 1000);
        };

        loadingEl.style.display = 'none';
        voteDetailEl.style.display = 'block';
      } catch (err) {
        console.error(err);
        showError('Произошла ошибка');
      }
    }

    if (voteId) loadVote();
    else showError('Не указан идентификатор');

    document.querySelector('.menu-toggle')?.addEventListener('click', function() {
      document.querySelector('.nav-menu').classList.toggle('active');
      document.querySelector('.menu-overlay').classList.toggle('active');
    });
    document.querySelector('.menu-overlay')?.addEventListener('click', function() {
      document.querySelector('.nav-menu').classList.remove('active');
      document.querySelector('.menu-overlay').classList.remove('active');
    });
  </script>
</body>
</html>
