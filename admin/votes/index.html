<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ — Управление голосованиями</title>
  <style>
    /* ... стили те же, что и раньше ... */
    /* добавим стиль для превью фото */
    .photo-preview {
      max-width: 100px;
      max-height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0.5rem 0;
      border: 2px solid #ddd;
    }
    .option-item-admin {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.5rem 1rem;
      background: #f8f9fa;
      border-radius: 6px;
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
    }
    .option-item-admin .option-photo-thumb {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
    }
    .option-item-admin .option-text {
      flex: 1;
    }
    .option-item-admin .option-actions {
      display: flex;
      gap: 0.4rem;
    }
    .file-input-wrapper {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .file-input-wrapper input[type="file"] {
      flex: 1;
      min-width: 150px;
    }
  </style>
</head>
<body>
  <!-- Шапка как в предыдущей версии, без изменений -->
  <header class="header">
    <div class="header-container">
      <div class="logo">
        <img src="/images/gerb.png" alt="Герб" />
        <h1>СФСРЮ</h1>
      </div>
      <nav class="nav-menu">
        <ul>
          <li><a href="/admin/">Админ-панель</a></li>
          <li><a href="/admin/votes/">Голосования</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="main-content">
    <div class="container">
      <div class="page-header">
        <h2>Управление голосованиями</h2>
        <button class="btn btn-primary" id="createVoteBtn">+ Создать голосование</button>
      </div>

      <div id="loading" class="loading">Загрузка...</div>
      <div id="votesContainer" style="display: none;">
        <table class="vote-table">
          <thead>
            <tr>
              <th>Название</th>
              <th>Тип</th>
              <th>Территория</th>
              <th>Даты</th>
              <th>Статус</th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody id="votesTableBody"></tbody>
        </table>
      </div>
      <div id="noData" class="no-data" style="display: none;">Нет голосований</div>
    </div>
  </main>

  <!-- Модальное окно (расширено) -->
  <div id="voteModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h4 id="modalTitle">Создание голосования</h4>
        <button class="close" id="closeModal">&times;</button>
      </div>
      <div class="modal-body">
        <form id="voteForm">
          <input type="hidden" id="editVoteId" />
          <input type="hidden" id="editVoteType" />

          <div class="form-group">
            <label for="voteType">Тип голосования</label>
            <select id="voteType" required>
              <option value="federal_election">Федеральные выборы</option>
              <option value="regional_election">Региональные выборы</option>
              <option value="federal_referendum">Федеральный референдум</option>
              <option value="regional_referendum">Региональный референдум</option>
            </select>
          </div>

          <div class="form-group">
            <label for="voteTitle">Название</label>
            <input type="text" id="voteTitle" required />
          </div>

          <div class="form-group">
            <label for="voteDescription">Описание</label>
            <textarea id="voteDescription" rows="3"></textarea>
          </div>

          <div class="form-group">
            <label for="voteTerritorySelect">Территория (регион)</label>
            <select id="voteTerritorySelect" required>
              <option value="">Выберите регион</option>
              <!-- будет заполнено из addresses.regions -->
            </select>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="voteStart">Дата начала</label>
              <input type="datetime-local" id="voteStart" required />
            </div>
            <div class="form-group">
              <label for="voteEnd">Дата окончания</label>
              <input type="datetime-local" id="voteEnd" required />
            </div>
          </div>

          <div class="form-group">
            <label for="voteStatus">Статус</label>
            <select id="voteStatus">
              <option value="active">Активно</option>
              <option value="completed">Завершено</option>
            </select>
          </div>

          <hr style="margin: 1.5rem 0;" />

          <h4>Варианты (кандидаты / вопросы)</h4>
          <div id="optionsContainer">
            <div class="options-list" id="optionsList"></div>
            <div style="border:1px solid #ddd; padding:1rem; border-radius:8px; margin-top:1rem;">
              <h5>Добавить новый вариант</h5>
              <div class="form-group">
                <label for="newOptionText">Текст варианта</label>
                <input type="text" id="newOptionText" placeholder="Например: Иванов И.И." />
              </div>
              <div class="form-group">
                <label for="newOptionInfo">Информация о кандидате (кратко)</label>
                <textarea id="newOptionInfo" rows="2" placeholder="Должность, партия, биография..."></textarea>
              </div>
              <div class="form-group">
                <label>Фото кандидата</label>
                <div class="file-input-wrapper">
                  <input type="file" id="newOptionPhoto" accept="image/*" />
                  <button type="button" class="btn btn-secondary btn-sm" id="uploadPhotoBtn">Загрузить фото</button>
                  <span id="photoUploadStatus" style="font-size:0.9rem; color:#666;"></span>
                </div>
                <div id="photoPreview" style="margin-top:0.5rem;"></div>
                <input type="hidden" id="newOptionPhotoUrl" />
              </div>
              <button type="button" class="btn btn-success" id="addOptionBtn">+ Добавить вариант</button>
            </div>
          </div>

          <hr style="margin: 1.5rem 0;" />

          <h4>Статистика голосов</h4>
          <div id="statisticsContainer">
            <div class="statistics" id="statisticsBlock">
              <div class="total-votes">Всего голосов: <span id="totalVotes">0</span></div>
              <div id="statisticsList"></div>
            </div>
          </div>

          <hr style="margin: 1.5rem 0;" />

          <h4>Добавить голос вручную</h4>
          <div class="add-vote-form" id="manualVoteForm">
            <div class="form-group">
              <label for="manualUserId">ID пользователя</label>
              <input type="text" id="manualUserId" placeholder="UUID пользователя" />
            </div>
            <div class="form-group">
              <label for="manualOptionId">Вариант</label>
              <select id="manualOptionId"></select>
            </div>
            <button type="button" class="btn btn-warning btn-sm" id="addManualVoteBtn">Добавить голос</button>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" id="cancelModal">Отмена</button>
            <button type="submit" class="btn btn-primary" id="saveVoteBtn">Сохранить</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
      }
    }
  </script>
  <script type="module">
    import { supabase } from '../../js/supabase-config.js';

    // DOM-элементы (добавляем новые поля)
    const voteTerritorySelect = document.getElementById('voteTerritorySelect');
    const newOptionInfo = document.getElementById('newOptionInfo');
    const newOptionPhoto = document.getElementById('newOptionPhoto');
    const uploadPhotoBtn = document.getElementById('uploadPhotoBtn');
    const photoUploadStatus = document.getElementById('photoUploadStatus');
    const photoPreview = document.getElementById('photoPreview');
    const newOptionPhotoUrl = document.getElementById('newOptionPhotoUrl');

    // Остальные элементы как раньше
    const loading = document.getElementById('loading');
    const votesContainer = document.getElementById('votesContainer');
    const votesTableBody = document.getElementById('votesTableBody');
    const noData = document.getElementById('noData');
    const createVoteBtn = document.getElementById('createVoteBtn');
    const modal = document.getElementById('voteModal');
    const closeModal = document.getElementById('closeModal');
    const cancelModal = document.getElementById('cancelModal');
    const modalTitle = document.getElementById('modalTitle');
    const voteForm = document.getElementById('voteForm');
    const editVoteId = document.getElementById('editVoteId');
    const editVoteType = document.getElementById('editVoteType');
    const voteType = document.getElementById('voteType');
    const voteTitle = document.getElementById('voteTitle');
    const voteDescription = document.getElementById('voteDescription');
    const voteStart = document.getElementById('voteStart');
    const voteEnd = document.getElementById('voteEnd');
    const voteStatus = document.getElementById('voteStatus');
    const optionsList = document.getElementById('optionsList');
    const newOptionText = document.getElementById('newOptionText');
    const addOptionBtn = document.getElementById('addOptionBtn');
    const statisticsBlock = document.getElementById('statisticsBlock');
    const totalVotesSpan = document.getElementById('totalVotes');
    const statisticsList = document.getElementById('statisticsList');
    const manualUserId = document.getElementById('manualUserId');
    const manualOptionId = document.getElementById('manualOptionId');
    const addManualVoteBtn = document.getElementById('addManualVoteBtn');

    const SCHEMA_VOTES = 'votes';
    let currentVoteId = null;
    let currentVoteType = null;
    let allOptions = [];
    let regions = [];

    // --- Загрузка регионов ---
    async function loadRegions() {
      const { data, error } = await supabase
        .schema('addresses')
        .from('regions')
        .select('id, name')
        .order('name');
      if (error) {
        console.error('Ошибка загрузки регионов:', error);
        return [];
      }
      return data || [];
    }

    // --- Заполнение select регионов ---
    function populateRegions(selectedName) {
      voteTerritorySelect.innerHTML = '<option value="">Выберите регион</option>';
      // Добавляем специальное значение "Вся территория СФСРЮ"
      const allOption = document.createElement('option');
      allOption.value = 'Вся территория СФСРЮ';
      allOption.textContent = 'Вся территория СФСРЮ';
      if (selectedName === 'Вся территория СФСРЮ') allOption.selected = true;
      voteTerritorySelect.appendChild(allOption);

      regions.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r.name;
        opt.textContent = r.name;
        if (r.name === selectedName) opt.selected = true;
        voteTerritorySelect.appendChild(opt);
      });
    }

    // --- Проверка администратора ---
    async function checkAdmin() {
      const { data: { user }, error } = await supabase.auth.getUser();
      if (error || !user) {
        alert('Необходимо авторизоваться');
        window.location.href = '/login.html';
        return false;
      }
      const { data: userData, error: roleError } = await supabase
        .from('users')
        .select('role')
        .eq('id', user.id)
        .single();
      if (roleError || !userData || userData.role !== 'admin') {
        alert('У вас нет прав администратора');
        window.location.href = '/profile.html';
        return false;
      }
      return true;
    }

    // --- Загрузка голосований ---
    async function loadVotes() {
      try {
        const { data, error } = await supabase
          .schema(SCHEMA_VOTES)
          .from('all_votes')
          .select('*')
          .order('created_at', { ascending: false });
        if (error) throw error;
        return data || [];
      } catch (err) {
        console.error('Ошибка загрузки голосований:', err);
        return [];
      }
    }

    function renderVotes(votes) {
      votesTableBody.innerHTML = '';
      if (!votes || votes.length === 0) {
        votesContainer.style.display = 'none';
        noData.style.display = 'block';
        return;
      }
      votesContainer.style.display = 'block';
      noData.style.display = 'none';

      votes.forEach(v => {
        const tr = document.createElement('tr');
        const typeLabel = {
          federal_election: 'Фед. выборы',
          regional_election: 'Рег. выборы',
          federal_referendum: 'Фед. референдум',
          regional_referendum: 'Рег. референдум'
        }[v.type] || v.type;
        const statusClass = v.status === 'active' ? 'active' : 'completed';
        const statusLabel = v.status === 'active' ? 'Активно' : 'Завершено';
        tr.innerHTML = `
          <td>${v.title}</td>
          <td>${typeLabel}</td>
          <td>${v.territory}</td>
          <td>${new Date(v.start_date).toLocaleDateString()} – ${new Date(v.end_date).toLocaleDateString()}</td>
          <td><span class="status-badge ${statusClass}">${statusLabel}</span></td>
          <td>
            <button class="btn btn-warning btn-sm edit-vote" data-id="${v.id}" data-type="${v.type}">Редактировать</button>
            <button class="btn btn-danger btn-sm delete-vote" data-id="${v.id}" data-type="${v.type}">Удалить</button>
          </td>
        `;
        votesTableBody.appendChild(tr);
      });

      document.querySelectorAll('.edit-vote').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.id;
          const type = btn.dataset.type;
          openEditModal(id, type);
        });
      });
      document.querySelectorAll('.delete-vote').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Удалить голосование и все связанные данные?')) return;
          const id = btn.dataset.id;
          const type = btn.dataset.type;
          await deleteVote(id, type);
        });
      });
    }

    // --- Загрузка фото в Storage ---
    async function uploadPhoto(file) {
      if (!file) return null;
      const fileExt = file.name.split('.').pop();
      const fileName = `${Date.now()}.${fileExt}`;
      const filePath = `public/${fileName}`;
      const { data, error } = await supabase.storage
        .from('votes_photo')
        .upload(filePath, file, { contentType: file.type });
      if (error) {
        console.error('Ошибка загрузки фото:', error);
        return null;
      }
      const { publicURL } = supabase.storage.from('votes_photo').getPublicUrl(filePath).data;
      return publicURL;
    }

    // --- Обработчик загрузки фото ---
    uploadPhotoBtn.addEventListener('click', async () => {
      const file = newOptionPhoto.files[0];
      if (!file) {
        alert('Выберите файл');
        return;
      }
      photoUploadStatus.textContent = 'Загрузка...';
      const url = await uploadPhoto(file);
      if (url) {
        newOptionPhotoUrl.value = url;
        photoUploadStatus.textContent = 'Фото загружено ✓';
        photoPreview.innerHTML = `<img src="${url}" class="photo-preview" />`;
      } else {
        photoUploadStatus.textContent = 'Ошибка загрузки';
      }
    });

    // --- Открытие модалки для создания ---
    function openCreateModal() {
      modalTitle.textContent = 'Создание голосования';
      voteForm.reset();
      editVoteId.value = '';
      editVoteType.value = '';
      currentVoteId = null;
      currentVoteType = null;
      allOptions = [];
      optionsList.innerHTML = '';
      statisticsBlock.style.display = 'none';
      manualOptionId.innerHTML = '';
      newOptionPhotoUrl.value = '';
      photoPreview.innerHTML = '';
      photoUploadStatus.textContent = '';
      modal.classList.add('active');
    }

    // --- Открытие модалки для редактирования ---
    async function openEditModal(id, type) {
      try {
        const tableName = getTableName(type);
        const { data: vote, error } = await supabase
          .schema(SCHEMA_VOTES)
          .from(tableName)
          .select('*')
          .eq('id', id)
          .single();
        if (error) throw error;

        modalTitle.textContent = 'Редактирование голосования';
        editVoteId.value = id;
        editVoteType.value = type;
        currentVoteId = id;
        currentVoteType = type;

        voteType.value = type;
        voteTitle.value = vote.title;
        voteDescription.value = vote.description || '';
        // Устанавливаем регион
        populateRegions(vote.territory);
        voteStart.value = vote.start_date.slice(0, 16);
        voteEnd.value = vote.end_date.slice(0, 16);
        voteStatus.value = vote.status;

        // Загружаем варианты
        const { data: options, error: optError } = await supabase
          .schema(SCHEMA_VOTES)
          .from('options')
          .select('*')
          .eq('vote_id', id)
          .eq('vote_type', type);
        if (!optError) {
          allOptions = options || [];
        } else {
          allOptions = [];
        }
        renderOptions();

        await loadStatistics(id);

        modal.classList.add('active');
      } catch (err) {
        alert('Ошибка загрузки данных: ' + err.message);
      }
    }

    function getTableName(type) {
      const map = {
        federal_election: 'federal_elections',
        regional_election: 'regional_elections',
        federal_referendum: 'federal_referendums',
        regional_referendum: 'regional_referendums'
      };
      return map[type] || type;
    }

    // --- Рендер вариантов (с фото и инфо) ---
    function renderOptions() {
      optionsList.innerHTML = '';
      allOptions.forEach(opt => {
        const div = document.createElement('div');
        div.className = 'option-item-admin';
        let photoHtml = '';
        if (opt.photo_url) {
          photoHtml = `<img src="${opt.photo_url}" class="option-photo-thumb" />`;
        }
        div.innerHTML = `
          ${photoHtml}
          <span class="option-text">${opt.text}</span>
          <span style="font-size:0.85rem; color:#666; flex:1;">${opt.candidate_info || ''}</span>
          <div class="option-actions">
            <button class="btn btn-danger btn-sm delete-option" data-id="${opt.id}">×</button>
          </div>
        `;
        optionsList.appendChild(div);
      });

      document.querySelectorAll('.delete-option').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Удалить вариант?')) return;
          const id = btn.dataset.id;
          await deleteOption(id);
        });
      });

      // Обновляем select для ручного добавления голосов
      manualOptionId.innerHTML = '';
      allOptions.forEach(opt => {
        const option = document.createElement('option');
        option.value = opt.id;
        option.textContent = opt.text;
        manualOptionId.appendChild(option);
      });
    }

    // --- Добавление варианта с фото и инфо ---
    async function addOption() {
      const text = newOptionText.value.trim();
      if (!text) return alert('Введите текст варианта');
      if (!currentVoteId || !currentVoteType) return alert('Сначала сохраните голосование');

      const candidateInfo = newOptionInfo.value.trim();
      const photoUrl = newOptionPhotoUrl.value;

      const { data, error } = await supabase
        .schema(SCHEMA_VOTES)
        .from('options')
        .insert([{
          vote_id: currentVoteId,
          vote_type: currentVoteType,
          text: text,
          candidate_info: candidateInfo || null,
          photo_url: photoUrl || null
        }])
        .select();

      if (error) {
        alert('Ошибка добавления варианта: ' + error.message);
        return;
      }
      newOptionText.value = '';
      newOptionInfo.value = '';
      newOptionPhotoUrl.value = '';
      newOptionPhoto.value = '';
      photoPreview.innerHTML = '';
      photoUploadStatus.textContent = '';
      // Перезагружаем варианты
      const { data: options, error: optError } = await supabase
        .schema(SCHEMA_VOTES)
        .from('options')
        .select('*')
        .eq('vote_id', currentVoteId)
        .eq('vote_type', currentVoteType);
      if (!optError) {
        allOptions = options || [];
        renderOptions();
        await loadStatistics(currentVoteId);
      }
    }

    // --- Удаление варианта ---
    async function deleteOption(optionId) {
      const { error } = await supabase
        .schema(SCHEMA_VOTES)
        .from('options')
        .delete()
        .eq('id', optionId);
      if (error) {
        alert('Ошибка удаления: ' + error.message);
        return;
      }
      allOptions = allOptions.filter(o => o.id !== optionId);
      renderOptions();
      await loadStatistics(currentVoteId);
    }

    // --- Статистика ---
    async function loadStatistics(voteId) {
      if (!voteId) return;
      const { data: votes, error } = await supabase
        .schema(SCHEMA_VOTES)
        .from('user_votes')
        .select('option_id')
        .eq('vote_id', voteId);

      if (error) {
        console.error('Ошибка статистики:', error);
        return;
      }

      const total = votes ? votes.length : 0;
      totalVotesSpan.textContent = total;

      const counts = {};
      votes.forEach(v => {
        counts[v.option_id] = (counts[v.option_id] || 0) + 1;
      });

      statisticsList.innerHTML = '';
      allOptions.forEach(opt => {
        const count = counts[opt.id] || 0;
        const percent = total > 0 ? Math.round((count / total) * 100) : 0;
        const div = document.createElement('div');
        div.style.display = 'flex';
        div.style.justifyContent = 'space-between';
        div.style.padding = '0.2rem 0';
        div.innerHTML = `
          <span>${opt.text}</span>
          <span>${count} голосов (${percent}%)</span>
        `;
        statisticsList.appendChild(div);
      });
      statisticsBlock.style.display = 'block';
    }

    // --- Сохранение голосования ---
    async function saveVote(e) {
      e.preventDefault();
      const id = editVoteId.value;
      const type = voteType.value;
      const tableName = getTableName(type);
      const territory = voteTerritorySelect.value;
      if (!territory) {
        alert('Выберите территорию');
        return;
      }
      const payload = {
        title: voteTitle.value.trim(),
        description: voteDescription.value.trim(),
        territory: territory,
        start_date: new Date(voteStart.value).toISOString(),
        end_date: new Date(voteEnd.value).toISOString(),
        status: voteStatus.value,
      };

      let result;
      if (id) {
        result = await supabase
          .schema(SCHEMA_VOTES)
          .from(tableName)
          .update(payload)
          .eq('id', id);
      } else {
        result = await supabase
          .schema(SCHEMA_VOTES)
          .from(tableName)
          .insert([payload])
          .select();
      }

      if (result.error) {
        alert('Ошибка сохранения: ' + result.error.message);
        return;
      }

      if (!id && result.data && result.data.length > 0) {
        currentVoteId = result.data[0].id;
        currentVoteType = type;
        editVoteId.value = currentVoteId;
        editVoteType.value = type;
        modalTitle.textContent = 'Редактирование голосования';
      }

      alert('Сохранено!');
      loadAndRender();
    }

    // --- Удаление голосования ---
    async function deleteVote(id, type) {
      const tableName = getTableName(type);
      await supabase.schema(SCHEMA_VOTES).from('options').delete().eq('vote_id', id).eq('vote_type', type);
      await supabase.schema(SCHEMA_VOTES).from('user_votes').delete().eq('vote_id', id);
      const { error } = await supabase.schema(SCHEMA_VOTES).from(tableName).delete().eq('id', id);
      if (error) {
        alert('Ошибка удаления: ' + error.message);
      } else {
        loadAndRender();
      }
    }

    // --- Ручное добавление голоса ---
    async function addManualVote() {
      const userId = manualUserId.value.trim();
      const optionId = manualOptionId.value;
      if (!userId) return alert('Введите ID пользователя');
      if (!optionId) return alert('Выберите вариант');

      const { error } = await supabase
        .schema(SCHEMA_VOTES)
        .from('user_votes')
        .insert([{
          user_id: userId,
          vote_id: currentVoteId,
          option_id: optionId
        }]);

      if (error) {
        alert('Ошибка добавления голоса: ' + error.message);
      } else {
        alert('Голос добавлен');
        await loadStatistics(currentVoteId);
      }
    }

    // --- Общая загрузка ---
    async function loadAndRender() {
      loading.style.display = 'block';
      votesContainer.style.display = 'none';
      noData.style.display = 'none';
      const votes = await loadVotes();
      renderVotes(votes);
      loading.style.display = 'none';
    }

    // --- Инициализация ---
    document.addEventListener('DOMContentLoaded', async () => {
      const isAdmin = await checkAdmin();
      if (!isAdmin) return;

      regions = await loadRegions();
      populateRegions();

      await loadAndRender();

      createVoteBtn.addEventListener('click', openCreateModal);
      closeModal.addEventListener('click', () => modal.classList.remove('active'));
      cancelModal.addEventListener('click', () => modal.classList.remove('active'));
      modal.addEventListener('click', (e) => {
        if (e.target === modal) modal.classList.remove('active');
      });

      voteForm.addEventListener('submit', saveVote);
      addOptionBtn.addEventListener('click', addOption);
      addManualVoteBtn.addEventListener('click', addManualVote);
    });
  </script>
</body>
</html>
