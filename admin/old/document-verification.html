<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Верификация документов — Админка СФСРЮ</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="css/document-verification.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
  <!-- ШАПКА -->
  <header class="header">
    <div class="header-container">
      <div class="logo">
        <img src="../images/gerb.png" alt="Герб СФСРЮ" />
        <h1>СФСРЮ — Админка</h1>
      </div>
    </div>
  </header>

  <!-- Боковое меню -->
  <aside class="sidebar">
    <nav class="sidebar-nav">
      <ul>
        <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Дашборд</a></li>
        <li><a href="user-management.html"><i class="fas fa-id-card"></i> Анкетные данные</a></li>
        <li><a href="add-document.html"><i class="fas fa-file-medical"></i> Добавить документ</a></li>
        <li><a href="address-management.html"><i class="fas fa-home"></i> Изменение адресов</a></li>
        <li><a href="view-users.html"><i class="fas fa-users"></i> Все пользователи</a></li>
        <li><a href="document-verification.html" class="active"><i class="fas fa-file-check"></i> Верификация документов</a></li>
        <li style="margin-top: 30px;">
          <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Выйти</a>
        </li>
      </ul>
    </nav>
  </aside>

  <!-- Основной контент -->
  <main class="admin-main">
    <div class="page-header">
      <h2><i class="fas fa-file-check"></i> Верификация документов</h2>
      <p>Поиск и подтверждение документов граждан</p>
    </div>

    <!-- Поиск -->
    <div class="search-section">
      <div class="form-group">
        <label for="searchCode">Личный код (XXXX-XXXX)</label>
        <input type="text" id="searchCode" class="form-input" placeholder="1234-5678" maxlength="9" />
      </div>
      <div class="form-group">
        <label for="docType">Тип документа</label>
        <select id="docType" class="form-select">
          <option value="passport">Паспорт гражданина СФСРЮ</option>
          <option value="foreign-passport">Заграничный паспорт</option>
          <option value="inn">ИНН</option>
          <option value="nss">Номер социального счёта</option>
          <option value="oms">Полис ОМС</option>
          <option value="military-id">Военный билет</option>
          <option value="driver-license">Водительское удостоверение</option>
          <option value="id-card">ID-карта</option>
          <option value="pensioner-id">Удостоверение пенсионера</option>
          <option value="disability">Инвалидность</option>
        </select>
      </div>
      <button id="searchBtn" class="btn btn-primary">Найти документ</button>
    </div>

<!-- Результат -->
<div id="resultSection" style="display: none; margin-top: 2rem;">
  <div class="document-card">
    <div class="document-header">
      <h3 id="docTitle">—</h3>
      <div class="status-badge" id="statusBadge">—</div>
    </div>
    <div class="document-content" id="docContent">
      <!-- Данные будут загружены сюда -->
    </div>
    <div class="form-group" style="margin-top: 1.5rem;">
      <label>Статус документа</label>
      <select id="statusSelect" class="form-select">
        <option value="verified">✅ Подтверждён</option>
        <option value="oncheck">⏳ На проверке</option>
        <option value="rejected">❌ Отклонён</option>
      </select>
    </div>
    <div class="button-group" style="margin-top: 1.5rem; display: flex; gap: 0.8rem;">
      <button id="editBtn" class="btn btn-secondary">Редактировать</button>
      <button id="saveBtn" class="btn btn-primary" style="display: none;">Сохранить изменения</button>
    </div>
  </div>
</div>

    <div id="alertMessage" class="alert" style="display: none;"></div>
  </main>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="js/document-verification.js"></script>
</body>
</html>
