<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Админ панель</title>
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-lock fa-3x"></i>
                <h1>Доступ администратора</h1>
                <p>Используйте учетные данные администратора</p>
            </div>
            
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-user-shield"></i> Администратор
                    </label>
                    <input type="email" id="email" 
                           value="sfsru@admin.su" 
                           readonly
                           class="form-control email-field">
                    <small class="text-muted">Это единственный разрешенный email</small>
                </div>
                
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-key"></i> Пароль
                    </label>
                    <input type="password" id="password" 
                           class="form-control" 
                           placeholder="Введите пароль администратора"
                           required
                           autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-sign-in-alt"></i> Войти в панель управления
                </button>
                
                <div id="errorMessage" class="alert alert-error mt-3" style="display: none;"></div>
                
                <div class="mt-3 text-center text-muted">
                    <small>
                        <i class="fas fa-info-circle"></i>
                        Все действия записываются в лог
                    </small>
                </div>
            </form>
        </div>
    </div>

<script>
import { auth } from './firebase-config.js';
import { signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js';

const ADMIN_EMAIL = 'sfsru@admin.su';

// На странице входа проверяем, не вошел ли уже админ
auth.onAuthStateChanged((user) => {
    if (user && user.email === ADMIN_EMAIL) {
        // Если уже вошел - на дашборд
        setTimeout(() => {
            window.location.href = 'dashboard.html';
        }, 100);
    }
});

// Обработка формы входа
document.addEventListener('DOMContentLoaded', function() {
    const loginForm = document.getElementById('loginForm');
    
    if (loginForm) {
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            try {
                // Пробуем войти
                await signInWithEmailAndPassword(auth, email, password);
                
                // Проверяем email
                const user = auth.currentUser;
                if (user.email === ADMIN_EMAIL) {
                    window.location.href = 'dashboard.html';
                } else {
                    throw new Error('Доступ только для администратора');
                }
                
            } catch (error) {
                console.log('Ошибка входа:', error.code);
                
                let message = 'Ошибка входа';
                if (error.code === 'auth/user-not-found') {
                    message = 'Пользователь не найден. Создайте sfsru@admin.su в Firebase Console.';
                } else if (error.code === 'auth/wrong-password') {
                    message = 'Неверный пароль';
                } else if (error.code === 'auth/invalid-email') {
                    message = 'Неверный формат email';
                }
                
                if (errorDiv) {
                    errorDiv.textContent = message;
                    errorDiv.style.display = 'block';
                } else {
                    alert(message);
                }
            }
        });
    }
});
</script>
</body>
</html>
