    <script type="module">
import { supabase } from '../../../js/supabase-config.js';
import { requireAdmin } from '../certificates/js/certificates-common.js';

let currentAppId = null;
let applicationNumber = null;
let currentUserId = null;
let uploadedFiles = [];
let mvdMap = {};

const SERVICE_NAME = "Паспорт СФСРЮ";

const statusMap = {
    'submitted': 'Отправлено в ведомство',
    'processing': 'В работе',
    'interim': 'Промежуточные результаты',
    'positive': 'Принято положительное решение',
    'completed': 'Результат выдан',
    'rejected': 'Отказано',
    'cancelled': 'Отменено'
};

const reasonMap = {
    'first_14': 'Первичное получение в 14 лет',
    'expired': 'Истёк срок действия',
    'no_space': 'Закончилось место для штампов',
    'name_changed': 'Изменилось ФИО, дата или место рождения',
    'lost': 'Паспорт утерян или украден',
    'damaged': 'Паспорт стал непригодным к использованию',
    'citizenship': 'Получение гражданства СФСРЮ',
    'appearance': 'Изменилась внешность',
    'error': 'Ошибка в паспорте',
    'first_14': 'Первичное получение в 14 лет',
    'expired': 'Истёк срок действия'
};

async function getSignedUrl(filePath) {
    if (!filePath) return null;
    try {
        const { data, error } = await supabase.storage
            .from('services-files')
            .createSignedUrl(filePath, 3600);
        if (error) throw error;
        return data.signedUrl;
    } catch (e) {
        console.error('Ошибка получения подписанной ссылки для', filePath, e);
        return null;
    }
}

function extractFileNameFromPath(filePath) {
    if (!filePath) return 'файл';
    let parts = filePath.split('/');
    let fullName = parts[parts.length - 1];
    let match = fullName.match(/^\d+_(.+)$/);
    if (match) {
        return decodeURIComponent(match[1]);
    }
    return decodeURIComponent(fullName);
}

// Улучшенная функция форматирования личных данных (для новых данных)
function formatPersonalData(data) {
    if (!data) return '—';
    
    // Проверяем, есть ли хоть какие-то непустые поля
    const hasData = Object.values(data).some(val => val && val !== '');
    if (!hasData) return '—';
    
    const parts = [];
    if (data.surname || data.name || data.patronymic) {
        parts.push(`ФИО: ${data.surname || ''} ${data.name || ''} ${data.patronymic || ''}`.trim());
    }
    if (data.birth_date) {
        parts.push(`Дата рождения: ${new Date(data.birth_date).toLocaleDateString('ru-RU')}`);
    }
    if (data.birth_place) {
        parts.push(`Место рождения: ${data.birth_place}`);
    }
    if (data.gender) {
        parts.push(`Пол: ${data.gender === 'male' ? 'Мужской' : 'Женский'}`);
    }
    return parts.length ? parts.join('<br>') : '—';
}

// Функция форматирования деталей причины (полностью на русском)
function formatReasonDetails(details) {
    if (!details) return '—';
    if (typeof details === 'string') return details;
    
    const typeMap = {
        'marriage': 'Свидетельство о браке',
        'divorce': 'Свидетельство о разводе',
        'name_change': 'Свидетельство о перемене имени',
        'birth_certificate': 'Свидетельство о рождении',  // добавлено
        'first_14': 'Первичное получение в 14 лет',
        'expired': 'Истёк срок действия'
    };
    
    const type = typeMap[details.type] || details.type || '—';
    let result = type;
    
    if (details.number || details.date || details.issuedBy) {
        const parts = [];
        if (details.number) parts.push(`№${details.number}`);
        if (details.date) parts.push(`от ${new Date(details.date).toLocaleDateString('ru-RU')}`);
        if (details.issuedBy) parts.push(`выдан: ${details.issuedBy}`);
        if (parts.length) result += `, ${parts.join(', ')}`;
    }
    
    return result;
}

function safeFileName(name) {
    return name.replace(/[^a-zA-Z0-9а-яА-ЯёЁ_.-]/g, '_').replace(/\s+/g, '_');
}

async function loadMvd() {
    const { data, error } = await supabase
        .from('mvd')
        .select('id, name');
    if (error) {
        console.error('Ошибка загрузки отделений МВД:', error);
        return;
    }
    data.forEach(item => { mvdMap[item.id] = item.name; });
}

async function loadApplication() {
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');
    if (!id) {
        showError('Не указан ID заявления');
        return;
    }
    currentAppId = id;

    await loadMvd();
    
    const { data, error } = await supabase
        .schema('services')
        .from('passport')
        .select('*')
        .eq('id', id)
        .single();

    if (error) {
        console.error('Ошибка загрузки заявления:', error);
        showError('Заявление не найдено');
        return;
    }

    applicationNumber = data.application_number;
    currentUserId = data.user_id;
    document.getElementById('appNumber').textContent = data.application_number;
    renderDetails(data);
    await loadHistory();
    
    document.getElementById('loading').classList.add('hidden');
}

function renderDetails(data) {
    const container = document.getElementById('detailsTable');
    const iconMap = {
        'Номер заявления': 'fa-hashtag',
        'Статус': 'fa-info-circle',
        'Дата создания': 'fa-calendar-alt',
        'Личный код': 'fa-id-card',
        'Причина': 'fa-question-circle',
        'Детали причины': 'fa-file-alt',
        'Личные данные': 'fa-user',
        'Новые данные': 'fa-user-edit',
        'Телефон': 'fa-phone',
        'Email': 'fa-envelope',
        'Отделение МВД': 'fa-building',
        'Последнее обновление': 'fa-clock'
    };
    
    const fields = [
        ['Номер заявления', data.application_number],
        ['Статус', statusMap[data.status] || data.status],
        ['Дата создания', new Date(data.created_at).toLocaleString()],
        ['Личный код', data.personal_code || '—'],
        ['Причина', reasonMap[data.reason] || data.reason],
        ['Детали причины', formatReasonDetails(data.reason_details)],
        ['Личные данные', formatPersonalData(data.personal_data)],
        ['Новые данные', data.new_personal_data ? formatPersonalData(data.new_personal_data) : '—'],
        ['Телефон', data.phone || '—'],
        ['Email', data.email || '—'],
        ['Отделение МВД', mvdMap[data.mvd_id] || data.mvd_id || '—'],
        ['Последнее обновление', new Date(data.updated_at).toLocaleString()]
    ];
    
    let html = '';
    fields.forEach(([label, value]) => {
        const icon = iconMap[label] || 'fa-tag';
        html += `
            <tr>
                <th><i class="fas ${icon}"></i> ${label}</th>
                <td>${value}</td>
            </tr>
        `;
    });
    container.innerHTML = html;
    document.getElementById('appDetails').classList.remove('hidden');
}

async function loadHistory() {
    const { data, error } = await supabase
        .schema('services')
        .from('passport_status_history')
        .select('*')
        .eq('passport_id', currentAppId)
        .order('created_at', { ascending: false });

    const list = document.getElementById('historyList');
    if (error) {
        console.error('Ошибка загрузки истории:', error);
        list.innerHTML = '<p class="error">Ошибка загрузки истории</p>';
        return;
    }

    if (!data || data.length === 0) {
        list.innerHTML = '<p class="no-data">История отсутствует</p>';
        document.getElementById('historySection').classList.remove('hidden');
        return;
    }

    let html = '';
    for (const item of data) {
        const statusText = statusMap[item.status] || item.status;
        const fileLinks = [];
        for (const filePath of (item.attachments || [])) {
            const signedUrl = await getSignedUrl(filePath);
            const fileName = extractFileNameFromPath(filePath);
            if (signedUrl) {
                fileLinks.push(`<a href="${signedUrl}" target="_blank"><i class="fas fa-paperclip"></i> ${fileName}</a>`);
            } else {
                fileLinks.push(`<span><i class="fas fa-exclamation-triangle"></i> ${fileName} (недоступен)</span>`);
            }
        }
        html += `
            <div class="history-item">
                <div class="meta"><i class="far fa-clock"></i> ${new Date(item.created_at).toLocaleString()}</div>
                <div class="status"><i class="fas fa-tag"></i> ${statusText}</div>
                <div>${item.comment || ''}</div>
                <div class="attachments-list">${fileLinks.join(' ')}</div>
            </div>
        `;
    }
    list.innerHTML = html;
    document.getElementById('historySection').classList.remove('hidden');
}

async function sendStatusNotification(newStatus, comment, serviceId) {
    if (!currentUserId) {
        console.warn('Не найден user_id заявления, сообщение не отправлено');
        return;
    }
    const newStatusText = statusMap[newStatus] || newStatus;
    const title = 'Изменение статуса заявления';
    let content = `Статус вашего заявления №${applicationNumber} по получению услуги "${SERVICE_NAME}" изменен на "${newStatusText}".`;
    if (comment && comment.trim()) {
        content += `\n\nКомментарий: ${comment.trim()}`;
    }
    
    const { error } = await supabase
        .schema('messages')
        .from('user_messages')
        .insert({
            user_id: currentUserId,
            title: title,
            content: content,
            type: 'status_change',
            is_read: false,
            service_id: serviceId,
            created_at: new Date().toISOString()
        });
    
    if (error) {
        console.error('Ошибка отправки сообщения пользователю:', error);
    } else {
        console.log('Сообщение пользователю отправлено');
    }
}

async function deleteApplication() {
    if (!confirm('Вы уверены, что хотите полностью удалить это заявление и все связанные с ним данные? Это действие необратимо.')) {
        return;
    }
    
    try {
        // 1. Получить все пути к файлам из основной записи и истории
        const { data: passportData, error: passportFetchError } = await supabase
            .schema('services')
            .from('passport')
            .select('photo_path')
            .eq('id', currentAppId)
            .single();
            
        if (passportFetchError && passportFetchError.code !== 'PGRST116') {
            console.error('Ошибка получения photo_path:', passportFetchError);
            alert('Ошибка при получении данных заявления: ' + passportFetchError.message);
            return;
        }
        
        const photoPath = passportData?.photo_path;
        
        const { data: historyData, error: historyFetchError } = await supabase
            .schema('services')
            .from('passport_status_history')
            .select('attachments')
            .eq('passport_id', currentAppId);
            
        if (historyFetchError) {
            console.error('Ошибка получения истории:', historyFetchError);
            alert('Ошибка при получении истории: ' + historyFetchError.message);
            return;
        }
        
        const allFilePaths = [];
        if (photoPath) allFilePaths.push(photoPath);
        historyData?.forEach(item => {
            if (item.attachments && Array.isArray(item.attachments)) {
                allFilePaths.push(...item.attachments);
            }
        });
        
        // 2. Удалить файлы из хранилища
        if (allFilePaths.length > 0) {
            const { error: storageError } = await supabase.storage
                .from('services-files')
                .remove(allFilePaths);
            if (storageError) {
                console.error('Ошибка удаления файлов:', storageError);
                alert('Ошибка при удалении файлов: ' + storageError.message);
                return;
            }
        }
        
        // 3. Удалить сообщения пользователя
        const { error: messagesError } = await supabase
            .schema('messages')
            .from('user_messages')
            .delete()
            .eq('service_id', currentAppId);
        if (messagesError) {
            console.error('Ошибка удаления сообщений:', messagesError);
            alert('Ошибка при удалении сообщений: ' + messagesError.message);
            return;
        }
        
        // 4. Удалить историю статусов
        const { error: historyError } = await supabase
            .schema('services')
            .from('passport_status_history')
            .delete()
            .eq('passport_id', currentAppId);
        if (historyError) {
            console.error('Ошибка удаления истории:', historyError);
            alert('Ошибка при удалении истории: ' + historyError.message);
            return;
        }
        
        // 5. Удалить основную запись
        const { error: passportError } = await supabase
            .schema('services')
            .from('passport')
            .delete()
            .eq('id', currentAppId);
        if (passportError) {
            console.error('Ошибка удаления заявления:', passportError);
            alert('Ошибка при удалении заявления: ' + passportError.message);
            return;
        }
        
        alert('Заявление и все связанные данные успешно удалены');
        window.location.href = 'index.html';
        
    } catch (err) {
        console.error('Непредвиденная ошибка при удалении:', err);
        alert('Произошла ошибка при удалении: ' + err.message);
    }
}

function showError(msg) {
    const err = document.getElementById('error');
    err.textContent = msg;
    err.classList.remove('hidden');
    document.getElementById('loading').classList.add('hidden');
}

function openStatusModal() {
    document.getElementById('modalComment').value = '';
    document.getElementById('modalFiles').value = '';
    document.getElementById('fileList').innerHTML = '';
    uploadedFiles = [];
    document.getElementById('actionModal').classList.add('active');
}

function closeModal() {
    document.getElementById('actionModal').classList.remove('active');
    document.getElementById('modalComment').value = '';
    document.getElementById('modalFiles').value = '';
    document.getElementById('fileList').innerHTML = '';
    uploadedFiles = [];
}

document.getElementById('modalFiles').addEventListener('change', (e) => {
    const files = Array.from(e.target.files);
    const list = document.getElementById('fileList');
    list.innerHTML = '';
    uploadedFiles = files;
    files.forEach((file, index) => {
        const div = document.createElement('div');
        div.className = 'file-item';
        div.innerHTML = `
            <span><i class="fas fa-file"></i> ${file.name}</span>
            <button type="button" class="btn-small" data-index="${index}">Удалить</button>
        `;
        list.appendChild(div);
    });
    document.querySelectorAll('.file-item .btn-small').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const idx = parseInt(e.target.dataset.index);
            uploadedFiles.splice(idx, 1);
            const dt = new DataTransfer();
            uploadedFiles.forEach(f => dt.items.add(f));
            document.getElementById('modalFiles').files = dt.files;
            e.target.closest('.file-item').remove();
            document.querySelectorAll('.file-item .btn-small').forEach((btn, newIdx) => {
                btn.dataset.index = newIdx;
            });
        });
    });
});

document.getElementById('actionForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const selectedStatus = document.getElementById('statusSelect').value;
    const comment = document.getElementById('modalComment').value.trim();
    const files = uploadedFiles;

    if (!selectedStatus) {
        alert('Выберите статус');
        return;
    }

    const attachmentPaths = [];
    for (const file of files) {
        const safeName = safeFileName(file.name);
        const filePath = `passport/${applicationNumber}/${Date.now()}_${safeName}`;
        const { error } = await supabase.storage
            .from('services-files')
            .upload(filePath, file);
        if (error) {
            alert('Ошибка загрузки файла: ' + error.message);
            console.error('Ошибка загрузки файла:', error);
            return;
        }
        attachmentPaths.push(filePath);
    }

    const { error: historyError } = await supabase
        .schema('services')
        .from('passport_status_history')
        .insert({
            passport_id: currentAppId,
            status: selectedStatus,
            comment: comment,
            attachments: attachmentPaths,
            created_by: (await supabase.auth.getUser()).data.user.id
        });

    if (historyError) {
        alert('Ошибка сохранения истории: ' + historyError.message);
        console.error('Ошибка истории:', historyError);
        return;
    }

    const { error: updateError } = await supabase
        .schema('services')
        .from('passport')
        .update({ status: selectedStatus, updated_at: new Date().toISOString() })
        .eq('id', currentAppId);

    if (updateError) {
        alert('Ошибка обновления статуса: ' + updateError.message);
        console.error('Ошибка обновления статуса:', updateError);
        return;
    }

    await sendStatusNotification(selectedStatus, comment, currentAppId);
    closeModal();
    window.location.reload();
});

document.addEventListener('DOMContentLoaded', async () => {
    if (!await requireAdmin()) return;
    await loadApplication();
    document.getElementById('changeStatusBtn').addEventListener('click', openStatusModal);
    document.getElementById('deleteBtn').addEventListener('click', deleteApplication);
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    window.addEventListener('click', (e) => {
        const modal = document.getElementById('actionModal');
        if (e.target === modal) closeModal();
    });
    document.getElementById('logoutBtn').addEventListener('click', async () => {
        await supabase.auth.signOut();
        window.location.href = '../../login.html';
    });
});
