<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Изменение адресов — Админка СФСРЮ</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="css/address-management.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
  <!-- ШАПКА -->
  <header class="header">
    <div class="header-container">
      <div class="logo">
        <img src="../images/gerb.png" alt="Герб СФСРЮ" />
        <h1>СФСРЮ — Админка</h1>
      </div>
    </div>
  </header>

  <!-- ОСНОВНОЙ КОНТЕНТ -->
  <div class="admin-container">
    <!-- Боковое меню -->
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <ul>
          <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Дашборд</a></li>
          <li><a href="user-management.html"><i class="fas fa-id-card"></i> Анкетные данные</a></li>
          <li><a href="add-document.html"><i class="fas fa-file-medical"></i> Добавить документ</a></li>
          <li><a href="address-management.html" class="active"><i class="fas fa-home"></i> Изменение адресов</a></li>
          <li><a href="view-users.html"><i class="fas fa-users"></i> Все пользователи</a></li>
          <li style="margin-top: 30px;">
            <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Выйти</a>
          </li>
        </ul>
      </nav>
    </aside>

    <!-- Основной контент -->
    <main class="admin-main">
      <div class="page-header">
        <h2><i class="fas fa-home"></i> Изменение адресов граждан</h2>
        <p>Управление регистрацией и местом пребывания</p>
      </div>

      <!-- Поиск по personalCode -->
      <div class="search-section">
        <div class="form-group">
          <label for="searchCode">Личный код (XXXX-XXXX)</label>
          <div class="input-with-btn">
            <input type="text" id="searchCode" class="form-input" placeholder="1234-5678" maxlength="9" />
            <button id="searchBtn" class="btn btn-primary">Найти</button>
          </div>
        </div>
      </div>

      <!-- Результат -->
      <div id="addressesResult" style="display: none;">
        <div class="user-info">
          <h3>Адреса гражданина</h3>
          <p><strong>Личный код:</strong> <span id="resultPersonalCode"></span></p>
        </div>

        <div class="addresses-list" id="addressesList">
          <!-- Адреса будут загружены сюда -->
        </div>

        <div class="form-actions">
          <button id="saveAddressesBtn" class="btn btn-primary">Сохранить изменения</button>
        </div>
      </div>

      <div id="alertMessage" class="alert" style="display: none;"></div>
    </main>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="js/address-management.js"></script>
</body>
</html>
