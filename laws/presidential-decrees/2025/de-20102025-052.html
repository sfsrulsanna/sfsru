<!-- Уникальный скрипт для этого указа -->
<script>
// Устанавливаем путь к worker'у pdf.js
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
document.addEventListener('DOMContentLoaded', function () {
// Элементы управления
const canvas = document.getElementById('pdfCanvas');
const ctx = canvas.getContext('2d');
const prevPageBtn = document.getElementById('prevPage');
const nextPageBtn = document.getElementById('nextPage');
const currentPageSpan = document.getElementById('currentPage');
const totalPagesSpan = document.getElementById('totalPages');
const downloadPdfButton = document.getElementById('downloadPdfButton');
const pdfLoading = document.getElementById('pdfLoading');
// Переменные состояния
let pdfDoc = null;
let currentPage = 1;
const scale = 1.5; // Фиксированный масштаб
let isRendering = false;
// ПУТЬ К PDF - ПРОВЕРЬТЕ ЭТУ СТРОКУ!
const pdfPath = 'pdf/de-20102025-052.pdf';
// Загружаем PDF
function loadPDF() {
if (!pdfPath) {
showError('Путь к PDF не указан');
return;
}
pdfLoading.style.display = 'block';
console.log('Пытаемся загрузить PDF:', pdfPath);
// Очищаем canvas
ctx.clearRect(0, 0, canvas.width, canvas.height);
pdfjsLib.getDocument(pdfPath).promise.then(function(pdf) {
pdfDoc = pdf;
totalPagesSpan.textContent = pdf.numPages;
pdfLoading.style.display = 'none';
console.log('PDF загружен успешно! Страниц:', pdf.numPages);
renderPage(currentPage);
}).catch(function(error) {
console.error('Ошибка загрузки PDF:', error);
showError('Не удалось загрузить документ: ' + error.message);
});
}
function showError(message) {
pdfLoading.innerHTML = `
<div style="text-align: center; color: #cc0000;">
<p style="font-weight: bold; margin-bottom: 10px;">${message}</p>
<p style="font-size: 0.9rem; margin-bottom: 15px;">Путь: ${pdfPath}</p>
<a href="${pdfPath}" download class="action-btn" style="display: inline-block; padding: 8px 16px; background: #cc0000; color: white; text-decoration: none; border-radius: 4px; font-size: 0.9rem;">
Попробовать скачать PDF напрямую
</a>
</div>
`;
}
// Рендерим страницу
function renderPage(num) {
if (isRendering || !pdfDoc) return;
isRendering = true;
pdfDoc.getPage(num).then(function(page) {
const viewport = page.getViewport({ scale: scale });
// Устанавливаем размеры canvas
canvas.height = viewport.height;
canvas.width = viewport.width;
// Рендерим страницу
const renderContext = {
canvasContext: ctx,
viewport: viewport
};
return page.render(renderContext).promise;
}).then(function() {
isRendering = false;
currentPageSpan.textContent = currentPage;
updateButtons();
}).catch(function(error) {
console.error('Ошибка рендеринга:', error);
isRendering = false;
showError('Ошибка отображения страницы: ' + error.message);
});
}
// Обновляем состояние кнопок
function updateButtons() {
if (!pdfDoc) return;
prevPageBtn.disabled = currentPage <= 1;
nextPageBtn.disabled = currentPage >= pdfDoc.numPages;
}
// Следующая страница
nextPageBtn.addEventListener('click', function() {
if (!pdfDoc || currentPage >= pdfDoc.numPages) return;
currentPage++;
renderPage(currentPage);
});
// Предыдущая страница
prevPageBtn.addEventListener('click', function() {
if (!pdfDoc || currentPage <= 1) return;
currentPage--;
renderPage(currentPage);
});
// Скачивание
downloadPdfButton.addEventListener('click', function() {
const link = document.createElement('a');
link.href = pdfPath;
link.download = 'Указ_СФСРЮ_№052_20.10.2025.pdf';
document.body.appendChild(link);
link.click();
document.body.removeChild(link);
});
// Обработка клавиш для навигации
document.addEventListener('keydown', function(e) {
if (!pdfDoc) return;
switch(e.key) {
case 'ArrowLeft':
if (currentPage > 1) {
currentPage--;
renderPage(currentPage);
}
break;
case 'ArrowRight':
if (currentPage < pdfDoc.numPages) {
currentPage++;
renderPage(currentPage);
}
break;
}
});
// Загружаем PDF при старте
loadPDF();
});
</script>
