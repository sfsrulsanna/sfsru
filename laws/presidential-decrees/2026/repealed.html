    <script src="../../../js/mob-menu.js"></script>
<script>
(function() {
    // 🔧 ВСТАВЬТЕ СВОИ ДАННЫЕ
const SUPABASE_URL = 'https://qeewwoklmjysactfhrum.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlZXd3b2tsbWp5c2FjdGZocnVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MTI2MTEsImV4cCI6MjA4NjQ4ODYxMX0.gWzqku1cS08v17kfJHJbOWbm-DRpzwQ9omlQsKxc96A';
    const BUCKET_NAME = 'laws-files1';
    const BUCKET_PATH = 'de/';
    const TABLE = 'laws.president_decrees';

    if (!window.supabase || typeof window.supabase.createClient !== 'function') {
        console.error('❌ Supabase CDN не загружен.');
        return;
    }
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Кэшированные данные
    let decreesCache = null;

    const $grid = document.getElementById('decrees-grid');
    const $viewer = document.getElementById('pdf-viewer');
    const $loader = document.getElementById('pdf-loader');
    const $container = document.getElementById('pdf-container');
    const $frame = document.getElementById('pdf-frame');
    const $error = document.getElementById('pdf-error');
    const $title = document.getElementById('page-title');
    const $meta = document.getElementById('meta-info');
    const $btnBack = document.getElementById('btn-back');
    const $download = document.getElementById('pdf-download');
    const $fallback = document.getElementById('fallback-link');

    const formatDate = (d) => d ? new Date(d).toLocaleDateString('ru-RU') : '';

    // 1. Загрузка списка из БД
    async function fetchDecrees() {
        if (decreesCache) return decreesCache;
        const { data, error } = await sb.from(TABLE).select('*').order('sort_order', { ascending: true });
        if (error) throw new Error(error.message);
        decreesCache = data;
        return data;
    }

    // 2. Рендер сетки (использует ваши CSS-классы)
    async function renderGrid() {
        if (!$grid) return;
        $grid.innerHTML = '<div class="loader"><div class="spinner"></div>Загрузка указов...</div>';
        try {
            const data = await fetchDecrees();
            $grid.innerHTML = '';
            data.forEach(item => {
                const a = document.createElement('a');
                a.className = `law-btn ${item.is_active ? '' : 'archived'}`;
                a.href = `?pdf=${item.filename}`;
                a.innerHTML = `
                    <span class="law-icon">🖋️</span>
                    <h3>Указ ${item.number} от ${formatDate(item.date_issued)}</h3>
                    <p>«${item.title}»</p>
                `;
                if (!item.is_active) a.style.opacity = '0.65';
                a.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.history.pushState({ pdf: item.filename }, '', a.href);
                    handleRoute();
                });
                $grid.appendChild(a);
            });
        } catch (err) {
            $grid.innerHTML = `<div class="error-msg">⚠️ Ошибка загрузки списка: ${err.message}</div>`;
        }
    }

    // 3. Загрузка PDF
    async function loadDecree(filename) {
        if (!$viewer) return;
        $viewer.style.display = 'block';
        $grid.style.display = 'none';
        $loader.style.display = 'block';
        $container.style.display = 'none';
        $error.style.display = 'none';
        $frame.src = '';

        const decree = (decreesCache || []).find(d => d.filename === filename);
        if (decree) {
            $title.textContent = `Указ Президента СФСРЮ ${decree.number} от ${formatDate(decree.date_issued)} «${decree.title}»`;
            $meta.textContent = 'СФСРЮ';
        } else {
            $title.textContent = 'Просмотр документа';
        }

        const filePath = `${BUCKET_PATH}${filename}.pdf`;
        try {
            const { data, error } = await sb.storage.from(BUCKET_NAME).createSignedUrl(filePath, 3600);
            if (error) throw new Error(error.message);

            // Скрываем интерфейс браузера для PDF
            const cleanUrl = `${data.signedUrl}#toolbar=0&navpanes=0&scrollbar=0&statusbar=0&view=FitH`;
            $frame.src = cleanUrl;
            $download.href = data.signedUrl;
            $fallback.href = data.signedUrl;

            $frame.onload = () => { $loader.style.display = 'none'; $container.style.display = 'block'; };
            setTimeout(() => { if ($loader.style.display !== 'none') { $loader.style.display = 'none'; $container.style.display = 'block'; } }, 3000);
        } catch (err) {
            $loader.style.display = 'none';
            $error.style.display = 'block';
            $error.textContent = `⚠️ Ошибка загрузки: ${err.message}`;
        }
    }

    // 4. Роутер
    function handleRoute() {
        const pdf = new URLSearchParams(window.location.search).get('pdf');
        if (pdf) {
            loadDecree(pdf);
        } else {
            $viewer.style.display = 'none';
            $grid.style.display = 'flex'; // соответствует decrees.css
            renderGrid();
            $title.textContent = 'Указы Президента СФСРЮ — 2026 год';
            $meta.textContent = '';
        }
    }

    // 5. Инициализация
    if ($btnBack) $btnBack.addEventListener('click', (e) => { e.preventDefault(); window.history.pushState({}, '', window.location.pathname); handleRoute(); });
    window.addEventListener('DOMContentLoaded', handleRoute);
    window.addEventListener('popstate', handleRoute);
})();
</script>
