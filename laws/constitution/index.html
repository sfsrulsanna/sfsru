<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<!-- Уникальный скрипт для этого закона -->
<script>
// Устанавливаем путь к worker'у pdf.js
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
document.addEventListener('DOMContentLoaded', function () {
// Элементы управления
const canvas = document.getElementById('pdfCanvas');
const ctx = canvas.getContext('2d');
const prevPageBtn = document.getElementById('prevPage');
const nextPageBtn = document.getElementById('nextPage');
const currentPageSpan = document.getElementById('currentPage');
const totalPagesSpan = document.getElementById('totalPages');
const downloadPdfButton = document.getElementById('downloadPdfButton');
const pdfLoading = document.getElementById('pdfLoading');
const editionSelect = document.getElementById('editionSelect');
const directDownloadLink = document.getElementById('directDownloadLink');
// Переменные состояния
let pdfDoc = null;
let currentPage = 1;
let scale = 1.5; // Фиксированный масштаб для просмотра
let isRendering = false;
let currentPdfPath = 'pdf/c14082025-r20012026.pdf'; // Редакция по умолчанию
// Инициализация прямой ссылки для скачивания
directDownloadLink.href = currentPdfPath;
// Инициализация состояния кнопок
function initButtonsState() {
prevPageBtn.disabled = true;
nextPageBtn.disabled = true;
}
// Загружаем PDF
function loadPDF(path) {
if (!path) {
showError('Путь к PDF не указан');
initButtonsState();
return;
}
// Обновляем текущий путь
currentPdfPath = path;
// Обновляем прямую ссылку для скачивания
directDownloadLink.href = currentPdfPath;
pdfLoading.style.display = 'block';
// Очищаем canvas
ctx.clearRect(0, 0, canvas.width, canvas.height);
canvas.height = 0;
canvas.width = 0;
// Блокируем кнопки во время загрузки
initButtonsState();
// Загружаем документ
pdfjsLib.getDocument(currentPdfPath).promise.then(function(pdf) {
pdfDoc = pdf;
totalPagesSpan.textContent = pdf.numPages;
pdfLoading.style.display = 'none';
// Сбрасываем состояние
currentPage = 1;
// Рендерим страницу
renderPage(currentPage);
}).catch(function(error) {
console.error('Ошибка загрузки PDF:', error);
pdfDoc = null;
showError('Не удалось загрузить документ: ' + (error.message || 'неизвестная ошибка'));
initButtonsState();
});
}
function showError(message) {
pdfLoading.innerHTML = `
<div style="text-align: center; color: #cc0000; padding: 20px;">
<p style="font-weight: bold; margin-bottom: 10px; font-size: 1.1rem;">${message}</p>
<p style="font-size: 0.95rem; margin-bottom: 15px; color: #666;">Путь к файлу: ${currentPdfPath}</p>
<a href="${currentPdfPath}" download class="action-btn" style="display: inline-block; padding: 10px 20px; background: #e53935; color: white; text-decoration: none; border-radius: 4px; font-size: 1rem; font-weight: 500; margin-top: 10px;">
Скачать PDF напрямую
</a>
</div>
`;
}
// Рендерим страницу
function renderPage(num) {
if (isRendering || !pdfDoc) return;
isRendering = true;
// Блокируем кнопки во время рендеринга
prevPageBtn.disabled = true;
nextPageBtn.disabled = true;
pdfDoc.getPage(num).then(function(page) {
const viewport = page.getViewport({ scale: scale });
// Устанавливаем размеры canvas
canvas.height = viewport.height;
canvas.width = viewport.width;
// Рендерим страницу
const renderContext = {
canvasContext: ctx,
viewport: viewport
};
return page.render(renderContext).promise;
}).then(function() {
isRendering = false;
currentPageSpan.textContent = currentPage;
updateButtons();
}).catch(function(error) {
console.error('Ошибка рендеринга:', error);
isRendering = false;
showError('Ошибка отображения страницы: ' + (error.message || 'неизвестная ошибка'));
updateButtons();
});
}
// Обновляем состояние кнопок
function updateButtons() {
if (!pdfDoc) {
initButtonsState();
return;
}
prevPageBtn.disabled = currentPage <= 1 || isRendering;
nextPageBtn.disabled = currentPage >= pdfDoc.numPages || isRendering;
}
// Следующая страница
nextPageBtn.addEventListener('click', function() {
if (!pdfDoc || currentPage >= pdfDoc.numPages || isRendering) return;
currentPage++;
renderPage(currentPage);
});
// Предыдущая страница
prevPageBtn.addEventListener('click', function() {
if (!pdfDoc || currentPage <= 1 || isRendering) return;
currentPage--;
renderPage(currentPage);
});
// Обработчик выбора редакции
editionSelect.addEventListener('change', function() {
const selectedValue = editionSelect.value;
const newPath = 'pdf/' + selectedValue;
loadPDF(newPath);
});
// Скачивание документа
downloadPdfButton.addEventListener('click', function() {
if (!currentPdfPath) {
alert('Путь к документу не определен');
return;
}
const link = document.createElement('a');
link.href = currentPdfPath;
// Формируем имя файла для скачивания
const fileName = currentPdfPath.split('/').pop().replace('.pdf', '_СФСРЮ.pdf');
link.download = fileName;
document.body.appendChild(link);
link.click();
document.body.removeChild(link);
});
// Обработка клавиш для навигации
document.addEventListener('keydown', function(e) {
if (!pdfDoc || isRendering) return;
switch(e.key) {
case 'ArrowLeft':
if (currentPage > 1) {
currentPage--;
renderPage(currentPage);
}
break;
case 'ArrowRight':
if (currentPage < pdfDoc.numPages) {
currentPage++;
renderPage(currentPage);
}
break;
}
});
// Инициализация состояния кнопок при загрузке
initButtonsState();
// Загружаем PDF при старте с правильным путем
loadPDF(currentPdfPath);
});
</script>
